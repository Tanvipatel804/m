<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickup BOL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #2a2a2a;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 500;
        }

        .checkmark {
            width: 28px;
            height: 28px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 15px;
            margin-top: 25px;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        .details-box {
            background: #363636;
            border-radius: 12px;
            padding: 15px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .detail-item:last-child {
            margin-bottom: 0;
        }

        .bullet {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .detail-text {
            flex: 1;
            font-size: 15px;
        }

        .check-icon {
            color: #4CAF50;
            font-size: 20px;
            margin-left: 10px;
        }

        .special-instruction {
            background: transparent;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            padding: 12px 15px;
            color: #a0d468;
            font-size: 15px;
            margin-top: 10px;
        }

        .signature-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signature-box img {
            max-width: 100%;
            max-height: 100%;
        }

        .signature-canvas {
            width: 100%;
            height: 100%;
        }

        .approve-btn {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 16px;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            margin-top: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .approve-btn:hover {
            background: #45a049;
        }

        .photo-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
        }

        .camera-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .camera-icon {
            width: 32px;
            height: 32px;
            border: 2px solid white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .home-indicator {
            width: 134px;
            height: 5px;
            background: #666;
            border-radius: 3px;
            margin: 20px auto 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Pickup BOL: #ALC-9982</h1>
            <div class="checkmark">✓</div>
        </div>

        <div class="section-title">Shipment Details</div>
        <div class="details-box">
            <div class="detail-item">
                <div class="bullet"></div>
                <div class="detail-text">50 Crates - Grade A Almonds</div>
                <div class="check-icon">✓</div>
            </div>
            <div class="detail-item">
                <div class="bullet"></div>
                <div class="detail-text">Total Weight: 2,500 lbs</div>
            </div>
            <div class="detail-item">
                <div class="bullet"></div>
                <div class="detail-text">5 Pallets (Shrink-wrapped)</div>
            </div>
        </div>

        <div class="section-title">Special Instructions</div>
        <div class="special-instruction">
            Keep Refrigerated: 34°F
        </div>

        <div class="section-title">Shipper Signature</div>
        <div class="signature-box">
            <svg width="200" height="100" viewBox="0 0 200 100">
                <path d="M 20 80 Q 30 20, 50 60 Q 60 80, 70 40 Q 80 20, 90 50" stroke="#4169E1" stroke-width="3"
                    fill="none" stroke-linecap="round" />
                <path d="M 95 50 L 110 70" stroke="#4169E1" stroke-width="3" fill="none" stroke-linecap="round" />
                <path d="M 100 30 Q 120 50, 140 40 Q 150 35, 160 45" stroke="#4169E1" stroke-width="3" fill="none"
                    stroke-linecap="round" />
            </svg>
        </div>
        <div class="photo-section">
            <button class="camera-btn">
                <div class="camera-icon">📷</div>
                <span>Attach Photo (Optional)</span>
            </button>
            <div class="thumbnail">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23666' width='100' height='100'/%3E%3Cpath fill='%23999' d='M20,30 h15 l5,-8 h20 l5,8 h15 v40 h-60 z M50,65 a12,12 0 1,0 0,-24 a12,12 0 1,0 0,24 z'/%3E%3C/svg%3E"
                    alt="Pallets">
            </div>
        </div>

        <button class="approve-btn" onclick="approveTrip()">Approve & Start Trip</button>
        <!-- <div class="home-indicator"></div> -->
    </div>

    <script>
        function approveTrip() {
            alert('Trip approved! Starting trip...');
        }
    </script>
</body>

</html>
