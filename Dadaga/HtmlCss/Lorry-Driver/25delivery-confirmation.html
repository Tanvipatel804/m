<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery BOL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #2a2a2a;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-top: 10px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .status-badge {
            background: #4CAF50;
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            margin-top: 25px;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        .details-box {
            background: #363636;
            border-radius: 12px;
            padding: 18px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
        }

        .detail-item:last-child {
            margin-bottom: 0;
        }

        .bullet {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .detail-text {
            flex: 1;
            font-size: 15px;
            color: #e0e0e0;
        }

        .check-icon {
            color: #4CAF50;
            font-size: 20px;
            margin-left: 10px;
            font-weight: bold;
        }

        .condition-box {
            background: #363636;
            border-radius: 12px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .condition-icon {
            width: 28px;
            height: 28px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }

        .condition-text {
            font-size: 15px;
            color: #e0e0e0;
        }

        .signature-section {
            margin-top: 25px;
        }

        .signature-box {
            background: #363636;
            border-radius: 12px;
            padding: 50px 20px;
            text-align: center;
            color: #888;
            font-size: 15px;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.3s;
            border: 2px dashed #555;
        }

        .signature-box:hover {
            background: #3a3a3a;
        }

        .signature-canvas {
            background: #363636;
            border-radius: 12px;
            margin-top: 10px;
            cursor: crosshair;
            touch-action: none;
        }

        .photo-box {
            background: #363636;
            border-radius: 12px;
            padding: 80px 20px;
            text-align: center;
            margin-top: 20px;
            border: 2px dashed #555;
        }

        .confirm-btn {
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .confirm-btn:hover {
            background: #1976D2;
        }

        .confirm-btn:active {
            transform: scale(0.98);
        }

        .home-indicator {
            width: 134px;
            height: 5px;
            background: #555;
            border-radius: 3px;
            margin: 20px auto 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">Delivery BOL: #ALC-9982</div>
            <div class="status-badge">Delivered</div>
        </div>

        <div class="section-title">Receipt Details</div>
        <div class="details-box">
            <div class="detail-item">
                <div class="bullet"></div>
                <div class="detail-text">50 Crates - Grade A Almonds</div>
                <div class="check-icon">✓</div>
            </div>
            <div class="detail-item">
                <div class="bullet"></div>
                <div class="detail-text">Total Weight: 2,500 lbs</div>
                <div class="check-icon">✓</div>
            </div>
            <div class="detail-item">
                <div class="bullet"></div>
                <div class="detail-text">5 Pallets (Shrink-wrapped)</div>
                <div class="check-icon">✓</div>
            </div>
        </div>

        <div class="section-title">Condition of Goods</div>
        <div class="condition-box">
            <div class="condition-icon">✓</div>
            <div class="condition-text">Received in Full, No Damage</div>
        </div>

        <div class="signature-section">
            <div class="section-title">Receiver Signature</div>
            <canvas id="signatureCanvas" class="signature-canvas" width="360" height="150"></canvas>
            <button onclick="clearSignature()" style="margin-top: 10px; padding: 8px 16px; background: #555; color: white; border: none; border-radius: 6px; cursor: pointer;">Clear</button>
        </div>

        <div class="photo-box">
            <!-- Photo upload area -->
             <img src="C:\Users\DADAGA\Pictures\Saved Pictures\box.jpg" alt="Delivery Photo" style="width:100%; height:100%; object-fit:cover; border-radius:8px;">
        </div>

        <button class="confirm-btn" onclick="confirmDelivery()">Confirm Delivery & Finalize</button>

        <!-- <div class="home-indicator"></div> -->
    </div>

    <script>
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // Set canvas styling
        ctx.strokeStyle = '#4169E1';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            lastX = x;
            lastY = y;
        }

        function draw(e) {
            if (!isDrawing) return;
            
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();

            lastX = x;
            lastY = y;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // Mouse events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch events
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        function clearSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function confirmDelivery() {
            alert('Delivery confirmed and finalized!');
        }
    </script>
</body>
</html>
