<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚛 Truck Driver Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.8;
            font-size: 14px;
        }

        .content {
            padding: 0;
        }

        .section {
            border-bottom: 1px solid #f0f0f0;
        }

        .section:last-child {
            border-bottom: none;
        }

        .section-header {
            background: #f8f9fa;
            padding: 15px 20px;
            border-left: 4px solid #3498db;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header:hover {
            background: #e9ecef;
        }

        .section-header h3 {
            color: #2c3e50;
            font-size: 16px;
            font-weight: 600;
        }

        .section-number {
            background: #3498db;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .section-content {
            padding: 20px;
            display: none;
        }

        .section.active .section-content {
            display: block;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
            transition: all 0.2s ease;
        }

        .option:last-child {
            border-bottom: none;
        }

        .option:hover {
            background: #f8f9fa;
            margin: 0 -20px;
            padding-left: 20px;
            padding-right: 20px;
        }

        .checkbox, .radio {
            margin-right: 12px;
            transform: scale(1.2);
            accent-color: #3498db;
        }

        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 14px;
            color: #2c3e50;
        }

        .dropdown, .input-field {
            padding: 8px 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            background: white;
            font-size: 14px;
            transition: border-color 0.3s ease;
            min-width: 120px;
        }

        .dropdown:focus, .input-field:focus {
            outline: none;
            border-color: #3498db;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .expand-icon {
            transition: transform 0.3s ease;
        }

        .section.active .expand-icon {
            transform: rotate(180deg);
        }

        .status-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 10px 15px;
            border-radius: 25px;
            font-size: 12px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }

        .status-indicator.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .container {
                margin: 0;
                border-radius: 0;
            }
            
            body {
                padding: 0;
            }
            
            .radio-group {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="status-indicator" id="statusIndicator">Settings saved!</div>
    
    <div class="container">
        <div class="header">
            <h1>🚛 Filter / Settings Menu</h1>
            <p>Customize your truck driving experience</p>
        </div>
        
        <div class="content">
            <!-- Section 1: Route Preferences -->
            <div class="section active">
                <div class="section-header" onclick="toggleSection(this)">
                    <h3>Route Preferences</h3>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="section-number">1</div>
                        <span class="expand-icon">▼</span>
                    </div>
                </div>
                <div class="section-content">
                    <div class="option">
                        <input type="checkbox" id="toll" class="checkbox" onchange="saveSettings()">
                        <label for="toll">Avoid toll roads</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="restricted" class="checkbox" onchange="saveSettings()">
                        <label for="restricted">Avoid restricted roads (low bridge, weight limits)</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="highways" class="checkbox" onchange="saveSettings()">
                        <label for="highways">Prefer highways</label>
                    </div>
                    <div class="option">
                        <div class="radio-group">
                            <div>
                                <input type="radio" id="fastest" name="route" class="radio" value="fastest" onchange="saveSettings()">
                                <label for="fastest">Fastest route</label>
                            </div>
                            <div>
                                <input type="radio" id="shortest" name="route" class="radio" value="shortest" onchange="saveSettings()">
                                <label for="shortest">Shortest route</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Section 2: Map Display -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <h3>Map Display</h3>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="section-number">2</div>
                        <span class="expand-icon">▼</span>
                    </div>
                </div>
                <div class="section-content">
                    <div class="option">
                        <input type="checkbox" id="traffic" class="checkbox" onchange="saveSettings()">
                        <label for="traffic">Show live traffic</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="weather" class="checkbox" onchange="saveSettings()">
                        <label for="weather">Show weather overlay</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="satellite" class="checkbox" onchange="saveSettings()">
                        <label for="satellite">Satellite view</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="night" class="checkbox" onchange="saveSettings()">
                        <label for="night">Night mode</label>
                    </div>
                </div>
            </div>

            <!-- Section 3: Safety & Rest Options -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <h3>Safety & Rest Options</h3>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="section-number">3</div>
                        <span class="expand-icon">▼</span>
                    </div>
                </div>
                <div class="section-content">
                    <div class="option">
                        <input type="checkbox" id="truckstops" class="checkbox" onchange="saveSettings()">
                        <label for="truckstops">Show nearest truck stops</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="fuel" class="checkbox" onchange="saveSettings()">
                        <label for="fuel">Show fuel stations (Diesel / LNG / AdBlue)</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="parking" class="checkbox" onchange="saveSettings()">
                        <label for="parking">Show parking availability</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="emergency" class="checkbox" onchange="saveSettings()">
                        <label for="emergency">Emergency services</label>
                    </div>
                </div>
            </div>

            <!-- Section 4: Notifications & Reminders -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <h3>Notifications & Reminders</h3>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="section-number">4</div>
                        <span class="expand-icon">▼</span>
                    </div>
                </div>
                <div class="section-content">
                    <div class="option">
                        <input type="checkbox" id="speed" class="checkbox" onchange="saveSettings()">
                        <label for="speed">Speed alerts</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="geofence" class="checkbox" onchange="saveSettings()">
                        <label for="geofence">Geofence alerts</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="maintenance" class="checkbox" onchange="saveSettings()">
                        <label for="maintenance">Maintenance reminders</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="delivery" class="checkbox" onchange="saveSettings()">
                        <label for="delivery">Delivery time alerts</label>
                    </div>
                </div>
            </div>

            <!-- Section 5: General Settings -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <h3>General Settings</h3>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="section-number">5</div>
                        <span class="expand-icon">▼</span>
                    </div>
                </div>
                <div class="section-content">
                    <div class="option">
                        <label>Language:</label>
                        <select class="dropdown" id="language" onchange="saveSettings()">
                            <option value="en">English</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                            <option value="de">German</option>
                        </select>
                    </div>
                    <div class="option">
                        <label>Units:</label>
                        <div class="radio-group">
                            <div>
                                <input type="radio" id="kmpl" name="units" class="radio" value="kmpl" onchange="saveSettings()">
                                <label for="kmpl">km/l</label>
                            </div>
                            <div>
                                <input type="radio" id="mpg" name="units" class="radio" value="mpg" onchange="saveSettings()">
                                <label for="mpg">miles/gal</label>
                            </div>
                        </div>
                    </div>
                    <div class="option">
                        <label>Currency:</label>
                        <select class="dropdown" id="currency" onchange="saveSettings()">
                            <option value="usd">USD ($)</option>
                            <option value="eur">EUR (€)</option>
                            <option value="gbp">GBP (£)</option>
                            <option value="cad">CAD ($)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Section 6: Trip & Load Tools -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <h3>Trip & Load Tools</h3>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="section-number">6</div>
                        <span class="expand-icon">▼</span>
                    </div>
                </div>
                <div class="section-content">
                    <div class="option">
                        <input type="checkbox" id="delivery-status" class="checkbox" onchange="saveSettings()">
                        <label for="delivery-status">Update delivery status</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="scan-docs" class="checkbox" onchange="saveSettings()">
                        <label for="scan-docs">Scan and upload documents (BOL, receipts)</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="report-issues" class="checkbox" onchange="saveSettings()">
                        <label for="report-issues">Report issues or delays</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="fuel-logger" class="checkbox" onchange="saveSettings()">
                        <label for="fuel-logger">Fuel logger / expense tracker</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="hos-timer" class="checkbox" onchange="saveSettings()">
                        <label for="hos-timer"><strong>HOS (Hours of Service) timer</strong></label>
                    </div>
                </div>
            </div>

            <!-- Section 7: Personalization -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <h3>Personalization</h3>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="section-number">7</div>
                        <span class="expand-icon">▼</span>
                    </div>
                </div>
                <div class="section-content">
                    <div class="option">
                        <input type="checkbox" id="rest-chains" class="checkbox" onchange="saveSettings()">
                        <label for="rest-chains">Preferred rest stop chains</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="fuel-brands" class="checkbox" onchange="saveSettings()">
                        <label for="fuel-brands">Preferred fuel brands</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="vehicle-profile" class="checkbox" onchange="saveSettings()">
                        <label for="vehicle-profile">Vehicle profile (e.g., height, weight, axle count)</label>
                    </div>
                    <div class="option">
                        <input type="checkbox" id="audio-settings" class="checkbox" onchange="saveSettings()">
                        <label for="audio-settings"><strong>Audio settings (voice assistant, alerts)</strong></label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle section visibility
        function toggleSection(header) {
            const section = header.parentElement;
            const allSections = document.querySelectorAll('.section');
            
            // Close all other sections
            allSections.forEach(s => {
                if (s !== section) {
                    s.classList.remove('active');
                }
            });
            
            // Toggle current section
            section.classList.toggle('active');
        }

        // Save settings and show confirmation
        function saveSettings() {
            // Collect all form data
            const settings = {};
            
            // Checkboxes
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => {
                settings[cb.id] = cb.checked;
            });
            
            // Radio buttons
            const radios = document.querySelectorAll('input[type="radio"]:checked');
            radios.forEach(radio => {
                settings[radio.name] = radio.value;
            });
            
            // Dropdowns
            const dropdowns = document.querySelectorAll('select');
            dropdowns.forEach(dropdown => {
                settings[dropdown.id] = dropdown.value;
            });
            
            // Store in memory (since localStorage is not available)
            window.truckSettings = settings;
            
            // Show confirmation
            showStatusMessage('Settings saved!');
            
            console.log('Settings saved:', settings);
        }

        // Show status message
        function showStatusMessage(message) {
            const indicator = document.getElementById('statusIndicator');
            indicator.textContent = message;
            indicator.classList.add('show');
            
            setTimeout(() => {
                indicator.classList.remove('show');
            }, 2000);
        }

        // Load saved settings on page load
        function loadSettings() {
            if (window.truckSettings) {
                const settings = window.truckSettings;
                
                // Restore checkboxes
                Object.keys(settings).forEach(key => {
                    const element = document.getElementById(key);
                    if (element && element.type === 'checkbox') {
                        element.checked = settings[key];
                    } else if (element && element.type === 'radio' && settings[element.name] === element.value) {
                        element.checked = true;
                    } else if (element && element.tagName === 'SELECT') {
                        element.value = settings[key];
                    }
                });
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
            
            // Set default values
            document.getElementById('fastest').checked = true;
            document.getElementById('kmpl').checked = true;
        });

        // Add keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                // Close all sections
                document.querySelectorAll('.section').forEach(s => {
                    s.classList.remove('active');
                });
            }
        });
    </script>
</body>
</html>
