<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIN Code Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .modal {
            background-color: #f5f5f5;
            border-radius: 12px;
            padding: 40px 35px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: fadeIn 0.4s ease-out;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 32px;
            color: #666;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 300;
            line-height: 1;
        }

        .close-btn:hover {
            color: #333;
            transform: rotate(90deg);
        }

        .modal-content {
            margin-top: 20px;
        }

        .message {
            text-align: center;
            font-size: 18px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 35px;
            padding: 0 10px;
        }

        .pin-input-container {
            background-color: #ffecd1;
            border: 2px solid #ff8c42;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .pin-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 24px;
            color: #666;
            letter-spacing: 8px;
            font-weight: 500;
        }

        .pin-input::placeholder {
            color: #999;
            letter-spacing: 8px;
        }

        .resend-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        .resend-text {
            color: #666;
            font-size: 16px;
        }

        .timer-badge {
            background-color: #ff8c42;
            color: white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }

        .btn-login {
            width: 100%;
            background: #ff8c42;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 18px 30px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 140, 66, 0.3);
        }

        .btn-login:hover {
            background: #ff7a28;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 140, 66, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .modal {
                padding: 35px 25px;
            }

            .message {
                font-size: 16px;
            }

            .pin-input {
                font-size: 20px;
                letter-spacing: 6px;
            }

            .btn-login {
                font-size: 20px;
                padding: 16px 25px;
            }
        }

        @media (max-width: 480px) {
            .modal {
                padding: 30px 20px;
            }

            .close-btn {
                font-size: 28px;
                top: 15px;
                right: 15px;
            }

            .message {
                font-size: 15px;
                margin-bottom: 25px;
            }

            .pin-input-container {
                padding: 16px;
            }

            .pin-input {
                font-size: 18px;
                letter-spacing: 4px;
            }

            .resend-text {
                font-size: 14px;
            }

            .timer-badge {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .btn-login {
                font-size: 18px;
                padding: 15px 20px;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes ripple-effect {
            from {
                transform: scale(0);
                opacity: 1;
            }
            to {
                transform: scale(2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="modal">
        <button class="close-btn" onclick="handleClose()">✕</button>
        
        <div class="modal-content">
            <p class="message">
                We have sent you a pin code on your contact. Verify your account with the provided pin code.
            </p>

            <div class="pin-input-container">
                <input 
                    type="text" 
                    class="pin-input" 
                    id="pinInput"
                    placeholder="XXXX"
                    maxlength="4"
                    autocomplete="off"
                >
            </div>

            <div class="resend-container">
                <span class="resend-text">Didn't receive code?</span>
                <div class="timer-badge" id="timer">53</div>
            </div>

            <button class="btn-login" id="loginBtn" onclick="handleLogin()">Login</button>
        </div>
    </div>

    <script>
        const pinInput = document.getElementById('pinInput');
        const loginBtn = document.getElementById('loginBtn');
        const timerElement = document.getElementById('timer');
        
        let timeLeft = 53;

        // Focus input on load
        window.addEventListener('load', () => {
            pinInput.focus();
        });

        // PIN input handling
        pinInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            e.target.value = value;
            
            // Enable/disable login button
            loginBtn.disabled = value.length !== 4;
        });

        // Timer countdown
        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.textContent = '0';
                timerElement.style.cursor = 'pointer';
                timerElement.onclick = handleResend;
            } else {
                timeLeft--;
                timerElement.textContent = timeLeft;
            }
        }, 1000);

        // Handle resend
        function handleResend() {
            if (timeLeft > 0) {
                alert('Please wait for the timer to expire before resending');
                return;
            }
            
            console.log('Resending PIN code');
            alert('New PIN code sent to your contact!');
            
            // Reset timer
            timeLeft = 53;
            timerElement.textContent = timeLeft;
            timerElement.style.cursor = 'default';
            timerElement.onclick = null;
            
            // Clear input
            pinInput.value = '';
            loginBtn.disabled = true;
            pinInput.focus();
        }

        // Handle login
        function handleLogin() {
            const pin = pinInput.value;
            
            if (pin.length !== 4) {
                alert('Please enter complete 4-digit PIN code');
                return;
            }
            
            console.log('Logging in with PIN:', pin);
            //alert('Login successful! Redirecting...');
             window.location.href = '8set-pin.html';
        }

        // Handle close
        function handleClose() {
            if (confirm('Are you sure you want to close? You will need to verify again.')) {
                console.log('Modal closed');
                // window.history.back();
                alert('Closing verification...');
            }
        }

        // Allow Enter key to submit
        pinInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && pinInput.value.length === 4) {
                handleLogin();
            }
        });

        // Add ripple effect to button
        loginBtn.addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.style.position = 'absolute';
            ripple.style.borderRadius = '50%';
            ripple.style.background = 'rgba(255, 255, 255, 0.4)';
            ripple.style.width = ripple.style.height = '100px';
            ripple.style.left = e.clientX - rect.left - 50 + 'px';
            ripple.style.top = e.clientY - rect.top - 50 + 'px';
            ripple.style.pointerEvents = 'none';
            ripple.style.animation = 'ripple-effect 0.6s ease-out';
            
            this.style.position = 'relative';
            this.style.overflow = 'hidden';
            this.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        });

        // Initially disable login button
        loginBtn.disabled = true;
    </script>
</body>
</html>
