<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TruckUp - Driver Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Arial', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background-image: url("C:/Users/DADAGA/Pictures/Saved Pictures/lorrypilot.png");
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            margin-top: 40px;
            font-size: 48px;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
        }

        .logo .up {
            color: #ff8c42;
        }

        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .button-container {
            position: absolute;
            bottom: 60px;
            width: 100%;
            max-width: 450px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 1s ease-out 0.3s backwards;
        }

        .btn {
            width: 100%;
            padding: 18px 30px;
            font-size: 20px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-signin {
            background: #ff8c42;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 140, 66, 0.4);
        }

        .btn-signin:hover {
            background: #ff7a28;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 140, 66, 0.5);
        }

        .btn-driver {
            background: white;
            color: #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-driver:hover {
            background: #f5f5f5;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 40px;
            font-size: 18px;
            color: white;
        }

        .login-link a {
            color: #ff8c42;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #666;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 36px;
                margin-top: 30px;
            }

            .button-container {
                max-width: 90%;
                bottom: 40px;
            }

            .btn {
                padding: 16px 25px;
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 28px;
                margin-top: 20px;
            }

            .btn {
                padding: 14px 20px;
                font-size: 16px;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Iframe overlay (signup) */
        .iframe-overlay {
            display: none;
            /* hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            align-items: stretch;
            justify-content: center;
        }

        .iframe-overlay.active {
            display: flex;
        }

        /* Container for the iframe so we can style a card-like area */
        .iframe-card {
            position: relative;
            width: 100%;
            height: 100%;
            /* max-width: 900px;
            max-height: 800px; */
            margin: 40px;
            background: #222;
            border-radius: 12px;
            overflow: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        /* actual iframe */
        #signupFrame {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: white;
        }

        /* close/back button shown above iframe */
        .iframe-topbar {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10000;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .close-btn {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .close-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        /* small responsive adjustments for iframe-card */
        @media (max-width: 520px) {
            .iframe-card {
                margin: 10px;
                border-radius: 6px;
            }
        }
    </style>
</head>

<body>
    <div class="container" id="mainContainer">
        <div class="logo">LORRY <span class="up">Pilot</span></div>

        <div class="content">
            <!-- Main visual content area -->
        </div>

        <div class="button-container">
            <button class="btn btn-signin" id="signInBtn" onclick="handleSignUp()">Sign Up</button>
            <button class="btn btn-driver" id="becomeBtn" onclick="handleBecomeDriver()">Become a Transporter</button>
        </div>

        <div class="login-link">
            Already have your account? <a href="C:\Users\DADAGA\Desktop\Dadaga\HtmlCss\Lorry Pilot\2signin.html"
                onclick="handleLogin(event)">Log in</a>
        </div>
    </div>

    <!-- iframe overlay that will load 2signup.html -->
    <div class="iframe-overlay" id="iframeOverlay" aria-hidden="true">
        <div class="iframe-card" role="dialog" aria-modal="true" aria-label="Signup">
            <div class="iframe-topbar">
                <!-- <button class="close-btn" id="closeIframeBtn" onclick="closeSignup()">Back</button> -->
            </div>

            <!-- Load the 2signup.html file here -->
            <iframe id="signupFrame" src="" title="Signup"></iframe>
        </div>
    </div>

    <script>
        // cache DOM nodes
        const mainContainer = document.getElementById('mainContainer');
        const iframeOverlay = document.getElementById('iframeOverlay');
        const signupFrame = document.getElementById('signupFrame');
        const signUpBtn = document.getElementById('signUpBtn');
        const becomeBtn = document.getElementById('becomeBtn');
        const closeIframeBtn = document.getElementById('closeIframeBtn');

        /**
         * Opens 2signup.html inside the iframe overlay.
         * This is the function requested: handleSignIn()
         */
        function handleSignUp() {
            signupFrame.src = '3register.html';
            // show overlay and hide main container
            iframeOverlay.classList.add('active');
            // optional: hide background for visual clarity
            mainContainer.style.display = 'none';
            // focus into iframe once loaded
            signupFrame.focus();
        }

        /**
         * Also let Become a Transporter open the same signup page
         */
        function handleBecomeDriver() {
            signupFrame.src = '3register.html';
            // show overlay and hide main container
            iframeOverlay.classList.add('active');
            // optional: hide background for visual clarity
            mainContainer.style.display = 'none';
            // focus into iframe once loaded
            signupFrame.focus();
        }

        /**
         * close the iframe overlay and restore main page
         */
        function closeSignup() {
            // hide overlay
            iframeOverlay.classList.remove('active');
            // clear iframe src to stop any running scripts in it
            signupFrame.src = '';
            // show main container again
            mainContainer.style.display = 'flex';
            // return focus to Sign in button
            signInBtn.focus();
        }

        /**
         * When the user presses ESC, close the overlay
         */
        window.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && iframeOverlay.classList.contains('active')) {
                closeSignup();
            }
        });

        /**
         * If the user clicks outside the iframe-card (on overlay background), close it.
         */
        iframeOverlay.addEventListener('click', function (e) {
            // only close when clicking directly on the overlay (not inside the card)
            if (e.target === iframeOverlay) {
                closeSignup();
            }
        });

        /**
         * Ripple effect for buttons (keeps original behavior)
         */
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', function (e) {
                // create ripple
                const rect = this.getBoundingClientRect();
                const ripple = document.createElement('span');
                const size = Math.max(rect.width, rect.height) * 1.2;
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.background = 'rgba(255,255,255,0.35)';
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left) - size / 2 + 'px';
                ripple.style.top = (e.clientY - rect.top) - size / 2 + 'px';
                ripple.style.pointerEvents = 'none';
                ripple.style.opacity = '0.95';
                ripple.style.transform = 'scale(0)';
                ripple.style.transition = 'transform 600ms cubic-bezier(.2,.7,.2,1), opacity 600ms linear';
                this.appendChild(ripple);
                requestAnimationFrame(() => {
                    ripple.style.transform = 'scale(1)';
                    ripple.style.opacity = '0';
                });
                setTimeout(() => ripple.remove(), 650);
            });
        });

        /**
         * Optional: if 2signup.html posts a message "goBack" to parent, close overlay.
         * This allows child page to trigger closing if you later add postMessage to 2signup.html.
         */
        window.addEventListener('message', function (event) {
            // be permissive but check simple string message
            if (event.data === 'goBack') {
                closeSignup();
            }
        });
    </script>
</body>

</html>
