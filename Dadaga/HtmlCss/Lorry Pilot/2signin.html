<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LorryPilot - Get on the Road</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #2d2d2d;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .logo {
            margin-top: 30px;
            margin-bottom: 60px;
            font-size: 32px;
            font-weight: bold;
            /* text-transform: uppercase; */
            letter-spacing: 2px;
        }

        .logo .lorry {
            color: white;
        }

        .logo .pilot {
            color: #ff8c42;
        }

        .truck-icon {
            display: inline-block;
            margin-left: 5px;
            color: #ff8c42;
            font-size: 28px;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .welcome-text h1 {
            font-size: 36px;
            font-weight: bold;
            line-height: 1.3;
            margin-bottom: 10px;
        }

        .welcome-text .highlight {
            color: white;
        }

        .permission-container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .permission-card {
            background-color: #3d3d3d;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 25px;
            color: #ff8c42;
        }

        .permission-text {
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #e0e0e0;
        }

        .btn {
            width: 100%;
            max-width: 300px;
            padding: 16px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
           margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .btn-allow {
            background: #ff8c42;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 140, 66, 0.4);
        }

        .btn-allow:hover {
            background: #ff7a28;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 140, 66, 0.5);
        }

        .btn-deny {
            background: #ff8c42;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 140, 66, 0.4);
        }

        .btn-deny:hover {
            background: #ff7a28;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 140, 66, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .welcome-text h1 {
                font-size: 28px;
            }

            .logo {
                font-size: 28px;
                margin-bottom: 40px;
            }

            .permission-card {
                padding: 35px 25px;
            }

            .icon {
                font-size: 56px;
            }

            .permission-text {
                font-size: 16px;
            }

            .btn {
                font-size: 16px;
                padding: 14px 25px;
            }
        }

        @media (max-width: 480px) {
            .welcome-text h1 {
                font-size: 24px;
            }

            .logo {
                font-size: 24px;
            }

            .permission-card {
                padding: 30px 20px;
            }

            .icon {
                font-size: 48px;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            animation: fadeIn 0.6s ease-out;
        }

        .welcome-text {
            animation: fadeIn 0.8s ease-out 0.2s backwards;
        }

        .permission-card:nth-child(1) {
            animation: fadeIn 0.8s ease-out 0.4s backwards;
        }

        .permission-card:nth-child(2) {
            animation: fadeIn 0.8s ease-out 0.6s backwards;
        }
    </style>
</head>
<body>
    <div class="logo">
        <span class="lorry">LORRY</span> <span class="pilot">Pilot</span> 
    </div>

    <div class="welcome-text">
        <h1><span class="highlight">Welcome to LORRY Pilot!</span><br>Get on the Road.</h1>
    </div>

    <div class="permission-container">
        <div class="permission-card">
            <div class="icon">📍</div>
            <div class="permission-text">
                Allow LORRY Pilot to  access this device's Location?
            </div>
            <button class="btn btn-allow" onclick="handlePhonePermission(true)">While using the App</button>
            <button class="btn btn-allow" onclick="handleNotificationPermission(true)">Only this time</button>
             <button class="btn btn-deny" onclick="handleNotificationPermission(false)">Don't allow</button>
        </div>

        <div class="permission-card">
            <div class="icon">📸    </div>
            <div class="permission-text">
                Allow LORRY Pilot to access this device's Camera and Gallery?
            </div>
            <button class="btn btn-allow" onclick="handlePhonePermission(true)">While using the App</button>
            <button class="btn btn-allow" onclick="handleNotificationPermission(true)">Only this time</button>
             <button class="btn btn-deny" onclick="handleNotificationPermission(false)">Don't allow</button>
        </div>
    </div>

    <script>
        function handlePhonePermission(allowed) {
            if (allowed) {
                console.log('Phone permission granted');
                alert('Phone call permission granted!');
                // Request actual phone permission here
                // navigator.permissions.query({name: 'phone'})
            }
        }

        function handleNotificationPermission(allowed) {
            if (!allowed) {
                console.log('Notification permission denied');
                alert('Notification permission denied. You can change this later in settings.');
            } else {
                console.log('Notification permission granted');
                alert('Notification permission granted!');
                // Request actual notification permission here
                // Notification.requestPermission()
            }
        }

        // Add ripple effect to buttons
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.background = 'rgba(255, 255, 255, 0.4)';
                ripple.style.width = ripple.style.height = '100px';
                ripple.style.left = e.clientX - rect.left - 50 + 'px';
                ripple.style.top = e.clientY - rect.top - 50 + 'px';
                ripple.style.pointerEvents = 'none';
                ripple.style.animation = 'ripple-effect 0.6s ease-out';
                
                this.style.position = 'relative';
                this.style.overflow = 'hidden';
                this.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple-effect {
                from {
                    transform: scale(0);
                    opacity: 1;
                }
                to {
                    transform: scale(2);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
