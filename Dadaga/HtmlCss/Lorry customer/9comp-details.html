<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #2d2d2d;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: #ffffff;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .divider {
            height: 1px;
            background-color: #404040;
            margin-bottom: 25px;
        }

        .section-title {
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            background-color: #999;
            border-radius: 50%;
        }

        input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background-color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: box-shadow 0.3s;
        }

        input::placeholder {
            color: #666;
        }

        input:focus {
            box-shadow: 0 0 0 2px rgba(255, 152, 67, 0.3);
        }

        .section-spacing {
            margin-top: 30px;
        }

        .next-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff9843 0%, #ff6b35 100%);
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .next-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 53, 0.4);
        }

        .next-button:active {
            transform: translateY(0);
        }

        .cursor-pointer {
            position: fixed;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c239b3 50%, #ff9843 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }

            h1 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="cursor-pointer" id="cursor"></div>
    
    <div class="container">
        <h1>COMPANY DETAILS</h1>
        <div class="divider"></div>

        <div class="section-title">SUPPLIER INFORMATION</div>
        
        <div class="form-group">
            <div class="input-wrapper">
                <div class="input-icon"></div>
                <input type="text" placeholder="Supplier Name" id="supplierName">
            </div>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <div class="input-icon"></div>
                <input type="tel" placeholder="Contact Number" id="contactNumber">
            </div>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <div class="input-icon"></div>
                <input type="email" placeholder="Email ID" id="emailId">
            </div>
        </div>

        <div class="section-spacing">
            <div class="section-title">RECEIVER INFORMATION</div>
            
            <div class="form-group">
                <div class="input-wrapper">
                    <div class="input-icon"></div>
                    <input type="text" placeholder="Receiver Name" id="receiverName">
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <div class="input-icon"></div>
                    <input type="number" placeholder="Receiver Contact Number" id="receiverContactNumber">
                </div>
            </div>
        </div>

        <button class="next-button" onclick="handleNext()">NEXT</button>
    </div>

    <script>
        // Custom cursor effect
        const cursor = document.getElementById('cursor');
        let mouseX = 0;
        let mouseY = 0;
        let cursorX = 0;
        let cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.display = 'block';
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.15;
            cursorY += (mouseY - cursorY) * 0.15;
            
            cursor.style.left = cursorX - 20 + 'px';
            cursor.style.top = cursorY - 20 + 'px';
            
            requestAnimationFrame(animateCursor);
        }

        animateCursor();

        // Handle form submission
        function handleNext() {
            const supplierName = document.getElementById('supplierName').value;
            const contactNumber = document.getElementById('contactNumber').value;
            const emailId = document.getElementById('emailId').value;
            const receiverName = document.getElementById('receiverName').value;

            if (!supplierName || !contactNumber || !emailId || !receiverName) {
                alert('Please fill in all fields');
                return;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailId)) {
                alert('Please enter a valid email address');
                return;
            }

            console.log('Form Data:', {
                supplierName,
                contactNumber,
                emailId,
                receiverName
            });

            alert('Form submitted successfully!');
        }

        // Enter key submission
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleNext();
                }
            });
        });
    </script>
</body>
</html>
