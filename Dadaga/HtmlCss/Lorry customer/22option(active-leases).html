<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Leases - FleetTrack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Section */
        .header {
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-badge span {
            font-weight: 700;
            color: #10b981;
        }

        /* Filter Section */
        .filter-section {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease 0.2s backwards;
        }

        .filter-btn, .search-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .filter-btn:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: #10b981;
            border-color: #10b981;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            width: 100%;
            font-size: 0.95rem;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Lease Cards Grid */
        .leases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .lease-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease backwards;
            position: relative;
            overflow: hidden;
        }

        .lease-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #10b981, #34d399);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .lease-card:hover::before {
            transform: scaleX(1);
        }

        .lease-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .lease-card.delayed {
            border-color: rgba(251, 191, 36, 0.4);
        }

        .lease-card.delayed::before {
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
        }

        /* Card Header */
        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 20px;
        }

        .driver-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #34d399);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            border: 3px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .driver-info {
            flex: 1;
        }

        .driver-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .truck-type {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid #10b981;
        }

        .status-badge.delayed {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border: 1px solid #fbbf24;
        }

        /* Progress Section */
        .progress-section {
            margin-bottom: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .progress-percentage {
            font-weight: 700;
            color: #10b981;
        }

        .progress-bar-container {
            background: rgba(255, 255, 255, 0.1);
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            border-radius: 10px;
            transition: width 1s ease;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Route Details */
        .route-details {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .route-path {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: 500;
        }

        .route-icon {
            color: #10b981;
        }

        .dates {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .delay-warning {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .action-btn {
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn.primary {
            background: #10b981;
            color: #fff;
        }

        .action-btn.primary:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        .action-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .action-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Secondary Actions */
        .secondary-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .secondary-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .secondary-link:hover {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            color: #10b981;
        }

        .close-modal {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
        }

        .modal-body p {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .leases-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .header-stats {
                width: 100%;
            }

            .filter-section {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .lease-card {
                padding: 20px;
            }

            .driver-avatar {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-top">
                <h1>Active / In-Progress Leases</h1>
                <div class="header-stats">
                    <div class="stat-badge">
                        <span id="activeCount">3</span> Active Contracts
                    </div>
                    <div class="stat-badge">
                        <span id="delayedCount">1</span> Delayed
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All Leases</button>
            <button class="filter-btn" data-filter="active">Active Only</button>
            <button class="filter-btn" data-filter="delayed">Delayed Only</button>
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Search by driver name, route, or truck type...">
            </div>
        </div>

        <!-- Leases Grid -->
        <div class="leases-grid" id="leasesGrid">
            <!-- Loading state -->
            <div class="loading" id="loadingState">
                <div class="spinner"></div>
                <p>Loading active leases...</p>
            </div>
        </div>

        <!-- No Results -->
        <div class="no-results" id="noResults" style="display: none;">
            <div class="no-results-icon">📭</div>
            <h3>No leases found</h3>
            <p>Try adjusting your filters or search criteria</p>
        </div>
    </div>

    <!-- Modal for Tracking -->
    <div class="modal" id="trackingModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Live Tracking</h2>
                <button class="close-modal" onclick="closeModal('trackingModal')">×</button>
            </div>
            <div class="modal-body" id="trackingModalBody">
                <p>Loading tracking information...</p>
            </div>
        </div>
    </div>

    <!-- Modal for Contact -->
    <div class="modal" id="contactModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Contact Driver</h2>
                <button class="close-modal" onclick="closeModal('contactModal')">×</button>
            </div>
            <div class="modal-body" id="contactModalBody">
                <p>Loading contact information...</p>
            </div>
        </div>
    </div>

    <script>
        // Sample lease data
        const leasesData = [
            {
                id: 1,
                driverName: "Rajesh K.",
                truckType: "14-ft Tata Ace",
                status: "active",
                progress: 95,
                route: "Mumbai > Delhi",
                startDate: "01 Jan 2026",
                endDate: "31 Jan 2026",
                phone: "+91 98765 43210",
                email: "rajesh.k@email.com",
                currentLocation: "Near Vadodara, Gujarat",
                estimatedArrival: "29 Jan 2026"
            },
            {
                id: 2,
                driverName: "Amit S.",
                truckType: "Eicher Pro 1059",
                status: "active",
                progress: 45,
                route: "Mumbai > Delhi",
                startDate: "01 Jan 2026",
                endDate: "31 Jan 2026",
                phone: "+91 98765 43211",
                email: "amit.s@email.com",
                currentLocation: "Near Surat, Gujarat",
                estimatedArrival: "30 Jan 2026"
            },
            {
                id: 3,
                driverName: "Preti Desai",
                truckType: "BharatBenz 3528",
                status: "delayed",
                progress: 60,
                route: "Chennai > Banglore",
                startDate: "01 Jan 2026",
                endDate: "25 Jan 2026",
                delayReason: "Expected Delay: 12 hrs due to weather",
                phone: "+91 98765 43212",
                email: "preti.d@email.com",
                currentLocation: "Near Vellore, Tamil Nadu",
                estimatedArrival: "30 Jan 2026"
            },
            {
                id: 4,
                driverName: "Vikram M.",
                truckType: "Ashok Leyland 2518",
                status: "active",
                progress: 78,
                route: "Bangalore > Hyderabad",
                startDate: "15 Jan 2026",
                endDate: "28 Jan 2026",
                phone: "+91 98765 43213",
                email: "vikram.m@email.com",
                currentLocation: "Near Kurnool, Andhra Pradesh",
                estimatedArrival: "28 Jan 2026"
            },
            {
                id: 5,
                driverName: "Suresh P.",
                truckType: "Mahindra Blazo X",
                status: "active",
                progress: 30,
                route: "Pune > Ahmedabad",
                startDate: "20 Jan 2026",
                endDate: "05 Feb 2026",
                phone: "+91 98765 43214",
                email: "suresh.p@email.com",
                currentLocation: "Near Nashik, Maharashtra",
                estimatedArrival: "03 Feb 2026"
            }
        ];

        let currentFilter = 'all';
        let searchQuery = '';

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                renderLeases();
                updateStats();
            }, 800);

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderLeases();
                });
            });

            // Search functionality
            document.getElementById('searchInput').addEventListener('input', function(e) {
                searchQuery = e.target.value.toLowerCase();
                renderLeases();
            });
        });

        // Render leases
        function renderLeases() {
            const grid = document.getElementById('leasesGrid');
            const loadingState = document.getElementById('loadingState');
            const noResults = document.getElementById('noResults');
            
            loadingState.style.display = 'none';
            
            let filteredLeases = leasesData.filter(lease => {
                const matchesFilter = currentFilter === 'all' || lease.status === currentFilter;
                const matchesSearch = lease.driverName.toLowerCase().includes(searchQuery) ||
                                    lease.route.toLowerCase().includes(searchQuery) ||
                                    lease.truckType.toLowerCase().includes(searchQuery);
                return matchesFilter && matchesSearch;
            });

            if (filteredLeases.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            
            grid.innerHTML = filteredLeases.map((lease, index) => `
                <div class="lease-card ${lease.status}" style="animation-delay: ${index * 0.1}s">
                    <div class="card-header">
                        <div class="driver-avatar">${getInitials(lease.driverName)}</div>
                        <div class="driver-info">
                            <div class="driver-name">
                                ${lease.driverName}
                                <span class="status-badge ${lease.status}">${lease.status}</span>
                            </div>
                            <div class="truck-type">${lease.truckType}</div>
                        </div>
                    </div>

                    <div class="progress-section">
                        <div class="progress-header">
                            <span>Journey Progress</span>
                            <span class="progress-percentage">${lease.progress}% Complete</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: ${lease.progress}%"></div>
                        </div>
                    </div>

                    <div class="route-details">
                        <div class="route-path">
                            <span class="route-icon">📍</span>
                            <strong>${lease.route}</strong>
                        </div>
                        <div class="dates">
                            📅 ${lease.startDate} - ${lease.endDate}
                        </div>
                        ${lease.delayReason ? `
                            <div class="delay-warning">
                                ⚠️ ${lease.delayReason}
                            </div>
                        ` : ''}
                    </div>

                    <div class="action-buttons">
                        <button class="action-btn primary" onclick="trackLocation(${lease.id})">
                            📍 Track Live Location
                        </button>
                        <button class="action-btn secondary" onclick="contactDriver(${lease.id})">
                            📞 Contact Driver
                        </button>
                    </div>

                    <div class="secondary-actions">
                        <a href="#" class="secondary-link" onclick="viewContract(${lease.id}); return false;">View Contract</a>
                        <a href="#" class="secondary-link" onclick="reportIssue(${lease.id}); return false;">Report an Issue</a>
                        <a href="#" class="secondary-link" onclick="viewDocuments(${lease.id}); return false;">Documents</a>
                    </div>
                </div>
            `).join('');
        }

        // Update statistics
        function updateStats() {
            const activeCount = leasesData.filter(l => l.status === 'active').length;
            const delayedCount = leasesData.filter(l => l.status === 'delayed').length;
            
            document.getElementById('activeCount').textContent = leasesData.length;
            document.getElementById('delayedCount').textContent = delayedCount;
        }

        // Get initials from name
        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase();
        }

        // Track location
        function trackLocation(leaseId) {
            const lease = leasesData.find(l => l.id === leaseId);
            const modal = document.getElementById('trackingModal');
            const body = document.getElementById('trackingModalBody');
            
            body.innerHTML = `
                <div style="margin-bottom: 15px;">
                    <strong>Driver:</strong> ${lease.driverName}
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>Current Location:</strong> ${lease.currentLocation}
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>Route:</strong> ${lease.route}
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>Progress:</strong> ${lease.progress}%
                </div>
                <div style="margin-bottom: 20px;">
                    <strong>Estimated Arrival:</strong> ${lease.estimatedArrival}
                </div>
                <div style="background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 10px; text-align: center; color: #10b981;">
                    🗺️ Live tracking map would be integrated here
                </div>
            `;
            
            modal.classList.add('active');
        }

        // Contact driver
        function contactDriver(leaseId) {
            const lease = leasesData.find(l => l.id === leaseId);
            const modal = document.getElementById('contactModal');
            const body = document.getElementById('contactModalBody');
            
            body.innerHTML = `
                <div style="margin-bottom: 15px;">
                    <strong>Driver Name:</strong><br>
                    ${lease.driverName}
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>Phone Number:</strong><br>
                    <a href="tel:${lease.phone}" style="color: #10b981; text-decoration: none;">${lease.phone}</a>
                </div>
                <div style="margin-bottom: 20px;">
                    <strong>Email:</strong><br>
                    <a href="mailto:${lease.email}" style="color: #10b981; text-decoration: none;">${lease.email}</a>
                </div>
                <div style="display: grid; gap: 10px;">
                    <button class="action-btn primary" onclick="window.location.href='tel:${lease.phone}'">
                        📞 Call Now
                    </button>
                    <button class="action-btn secondary" onclick="window.location.href='mailto:${lease.email}'">
                        ✉️ Send Email
                    </button>
                </div>
            `;
            
            modal.classList.add('active');
        }

        // Close modal
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // View contract
        function viewContract(leaseId) {
            alert(`Opening contract details for lease #${leaseId}`);
        }

        // Report issue
        function reportIssue(leaseId) {
            alert(`Opening issue report form for lease #${leaseId}`);
        }

        // View documents
        function viewDocuments(leaseId) {
            alert(`Opening documents for lease #${leaseId}`);
        }

        // Close modal on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
