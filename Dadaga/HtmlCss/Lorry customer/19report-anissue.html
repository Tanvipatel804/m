<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report an Issue</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: #2d2d2d;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .header {
            background-color: #3a3a3a;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 500;
        }

        .form-content {
            padding: 24px 20px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .context-text {
            font-size: 14px;
            color: #ffffff;
            padding: 12px;
            background-color: #1a1a1a;
            border-radius: 6px;
        }

        .select-wrapper {
            position: relative;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            background-color: #1a1a1a;
            border: 1px solid #404040;
            border-radius: 6px;
            color: #9ca3af;
            font-size: 14px;
            appearance: none;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: #10b981;
        }

        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #9ca3af;
            font-size: 12px;
        }

        textarea {
            width: 100%;
            padding: 12px 16px;
            background-color: #1a1a1a;
            border: 1px solid #404040;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
            outline: none;
        }

        textarea::placeholder {
            color: #6b7280;
        }

        textarea:focus {
            border-color: #10b981;
        }

        .attach-section {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .icon-btn {
            width: 48px;
            height: 48px;
            background-color: #1a1a1a;
            border: 1px solid #404040;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .icon-btn:hover {
            background-color: #252525;
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            stroke: #9ca3af;
        }

        .attach-btn {
            flex: 1;
            padding: 12px 16px;
            background-color: #1a1a1a;
            border: 1px solid #404040;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: left;
        }

        .attach-btn:hover {
            background-color: #252525;
        }

        .urgency-group {
            display: flex;
            gap: 8px;
        }

        .urgency-btn {
            flex: 1;
            padding: 12px;
            background-color: #1a1a1a;
            border: 1px solid #404040;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .urgency-btn:hover {
            background-color: #252525;
        }

        .urgency-btn.active {
            background-color: #10b981;
            border-color: #10b981;
            font-weight: 500;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #10b981;
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 24px;
        }

        .submit-btn:hover {
            background-color: #059669;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }

            .form-content {
                padding: 20px 16px;
            }

            .urgency-group {
                gap: 6px;
            }

            .urgency-btn {
                padding: 10px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.history.back()">←</button>
            <h1>Report an Issue</h1>
        </div>

        <div class="form-content">
            <div class="form-group">
                <label class="form-label">Context</label>
                <div class="context-text">For Contract ID: L-789012</div>
            </div>

            <div class="form-group">
                <label class="form-label">Select Issue Category</label>
                <div class="select-wrapper">
                    <select id="category">
                        <option value="">Select a category...</option>
                        <option value="technical">Technical Issue</option>
                        <option value="billing">Billing Problem</option>
                        <option value="contract">Contract Error</option>
                        <option value="delivery">Delivery Issue</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea id="description" placeholder="Describe the issue in detail..."></textarea>
            </div>

            <div class="attach-section">
                <button class="icon-btn" onclick="handleCamera()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </button>
                <button class="icon-btn" onclick="handleAttachment()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path>
                    </svg>
                </button>
                <button class="attach-btn" onclick="handleAttachment()">Attach Photo/Document</button>
            </div>

            <div class="form-group">
                <label class="form-label">Urgency Level</label>
                <div class="urgency-group">
                    <button class="urgency-btn" onclick="setUrgency(this, 'low')">Low</button>
                    <button class="urgency-btn active" onclick="setUrgency(this, 'medium')">Medium</button>
                    <button class="urgency-btn" onclick="setUrgency(this, 'high')">High</button>
                </div>
            </div>

            <button class="submit-btn" onclick="handleSubmit()">Submit Report</button>
        </div>
    </div>

    <script>
        let selectedUrgency = 'medium';

        function setUrgency(btn, level) {
            document.querySelectorAll('.urgency-btn').forEach(b => {
                b.classList.remove('active');
            });
            btn.classList.add('active');
            selectedUrgency = level;
        }

        function handleCamera() {
            alert('Camera functionality would open here');
        }

        function handleAttachment() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,.pdf,.doc,.docx';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    alert(`File selected: ${file.name}`);
                }
            };
            input.click();
        }

        function handleSubmit() {
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;

            if (!category) {
                alert('Please select an issue category');
                return;
            }

            if (!description.trim()) {
                alert('Please provide a description');
                return;
            }

            const report = {
                contractId: 'L-789012',
                category: category,
                description: description,
                urgency: selectedUrgency,
                timestamp: new Date().toISOString()
            };

            console.log('Report submitted:', report);
            alert('Report submitted successfully!');
            
            // Reset form
            document.getElementById('category').value = '';
            document.getElementById('description').value = '';
        }
    </script>
</body>
</html>
