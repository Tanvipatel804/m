<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porter Partner – Language Selection</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --orange: #FF6B2C;
      --orange-light: #FF8F5E;
      --orange-soft: rgba(255, 107, 44, 0.12);
      --purple: #5B2D8E;
      --purple-mid: #7B4DB0;
      --purple-light: #A87DD6;
      --purple-soft: rgba(91, 45, 142, 0.10);
      --white: #FFFFFF;
      --off-white: #F8F4FF;
      --text-dark: #1E0A40;
      --text-mid: #5A4870;
      --text-light: #9585AE;
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --radius-pill: 50px;
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--off-white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      position: relative;
      overflow: hidden;
    }

    /* ── Background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 65% 55% at 10% 5%, rgba(255, 107, 44, 0.13) 0%, transparent 65%),
        radial-gradient(ellipse 55% 50% at 90% 90%, rgba(91, 45, 142, 0.15) 0%, transparent 65%),
        radial-gradient(ellipse 45% 40% at 55% 45%, rgba(168, 125, 214, 0.07) 0%, transparent 60%);
      z-index: 0;
      animation: bgDrift 14s ease-in-out infinite alternate;
    }

    @keyframes bgDrift {
      0% {
        transform: scale(1) translate(0, 0);
      }

      100% {
        transform: scale(1.05) translate(-10px, 6px);
      }
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(65px);
      opacity: 0.5;
      z-index: 0;
      pointer-events: none;
      animation: blobFloat linear infinite alternate;
    }

    .blob-1 {
      width: 280px;
      height: 280px;
      background: var(--orange-light);
      top: -90px;
      left: -70px;
      animation-duration: 10s;
    }

    .blob-2 {
      width: 220px;
      height: 220px;
      background: var(--purple-light);
      bottom: -70px;
      right: -60px;
      animation-duration: 12s;
      animation-delay: -5s;
    }

    .blob-3 {
      width: 130px;
      height: 130px;
      background: var(--orange);
      bottom: 25%;
      left: 3%;
      animation-duration: 8s;
      animation-delay: -3s;
      opacity: .28;
    }

    @keyframes blobFloat {
      0% {
        transform: translateY(0) rotate(0deg);
      }

      100% {
        transform: translateY(28px) rotate(12deg);
      }
    }

    /* ── Wrapper ── */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: wrapIn 0.65s var(--ease-smooth) both;
    }

    @keyframes wrapIn {
      from {
        opacity: 0;
        transform: translateY(36px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Glass card base ── */
    .glass {
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 40px rgba(91, 45, 142, 0.11), 0 2px 8px rgba(255, 107, 44, 0.06);
    }

    /* ── Header card ── */
    .header-card {
      border-radius: var(--radius-lg);
      padding: 28px 28px 24px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--orange), var(--purple-mid));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px var(--orange-soft);
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 18px;
      height: 18px;
    }

    .logo-text {
      font-family: 'Sora', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-dark);
    }

    .logo-text span {
      color: var(--orange);
    }

    /* ── Country selector ── */
    .country-chip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .flag {
      font-size: 1.25rem;
      line-height: 1;
    }

    .country-name {
      font-family: 'Sora', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    .change-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--orange);
      padding: 3px 10px;
      border-radius: 20px;
      transition: background 0.2s, color 0.2s;
    }

    .change-btn:hover {
      background: var(--orange-soft);
    }

    /* ── Phone field ── */
    .field-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .phone-row {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1.5px solid rgba(91, 45, 142, 0.2);
      border-radius: var(--radius-sm);
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
      background: #fff;
    }

    .phone-row:focus-within {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px var(--orange-soft);
    }

    .dial-code {
      padding: 13px 14px;
      font-family: 'Sora', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-dark);
      border-right: 1.5px solid rgba(91, 45, 142, 0.12);
      background: var(--purple-soft);
      white-space: nowrap;
    }

    .phone-input {
      flex: 1;
      border: none;
      outline: none;
      padding: 13px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text-dark);
      background: transparent;
    }

    .phone-input::placeholder {
      color: var(--text-light);
    }

    /* ── Checkboxes ── */
    .checks {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
    }

    .check-box {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      border-radius: 6px;
      border: 2px solid rgba(91, 45, 142, 0.3);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      margin-top: 1px;
      cursor: pointer;
    }

    .check-row input {
      display: none;
    }

    .check-row input:checked+.check-box {
      background: linear-gradient(135deg, var(--orange), var(--purple-mid));
      border-color: transparent;
      box-shadow: 0 3px 10px rgba(255, 107, 44, 0.3);
    }

    .check-row input:checked+.check-box svg {
      opacity: 1;
    }

    .check-box svg {
      opacity: 0;
      transition: opacity 0.2s;
      width: 11px;
      height: 11px;
    }

    .check-text {
      font-size: 0.82rem;
      color: var(--text-mid);
      line-height: 1.5;
    }

    .check-text a {
      color: var(--orange);
      text-decoration: none;
      font-weight: 500;
    }

    .check-text a:hover {
      text-decoration: underline;
    }

    /* ── Language sheet ── */
    .lang-card {
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .lang-header {
      padding: 20px 24px 14px;
      border-bottom: 1px solid rgba(91, 45, 142, 0.08);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lang-header-icon {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--purple) 0%, var(--orange) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .lang-header-icon svg {
      width: 16px;
      height: 16px;
    }

    .lang-header-title {
      font-family: 'Sora', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .lang-header-sub {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-left: auto;
      font-weight: 400;
    }

    /* Search */
    .lang-search {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(91, 45, 142, 0.07);
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--purple-soft);
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      border: 1.5px solid transparent;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .search-wrap:focus-within {
      border-color: rgba(91, 45, 142, 0.25);
      box-shadow: 0 0 0 3px var(--purple-soft);
    }

    .search-wrap svg {
      width: 16px;
      height: 16px;
      opacity: .5;
      flex-shrink: 0;
    }

    .search-input {
      border: none;
      outline: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text-dark);
      width: 100%;
    }

    .search-input::placeholder {
      color: var(--text-light);
    }

    /* Language list */
    .lang-list {
      list-style: none;
      max-height: 320px;
      overflow-y: auto;
    }

    .lang-list::-webkit-scrollbar {
      width: 4px;
    }

    .lang-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .lang-list::-webkit-scrollbar-thumb {
      background: rgba(91, 45, 142, 0.2);
      border-radius: 4px;
    }

    .lang-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 24px;
      cursor: pointer;
      border-bottom: 1px solid rgba(91, 45, 142, 0.05);
      transition: background 0.18s;
      position: relative;
      overflow: hidden;
    }

    .lang-item:last-child {
      border-bottom: none;
    }

    .lang-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--orange), var(--purple-mid));
      transform: scaleY(0);
      transform-origin: center;
      border-radius: 0 2px 2px 0;
      transition: transform 0.25s var(--ease-spring);
    }

    .lang-item:hover {
      background: rgba(255, 107, 44, 0.04);
    }

    .lang-item.selected {
      background: linear-gradient(90deg, rgba(255, 107, 44, 0.08) 0%, rgba(91, 45, 142, 0.05) 100%);
    }

    .lang-item.selected::before {
      transform: scaleY(1);
    }

    .lang-item.hidden {
      display: none;
    }

    .lang-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .lang-native {
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dark);
      transition: color 0.2s;
    }

    .lang-item.selected .lang-native {
      color: var(--orange);
    }

    .lang-english {
      font-size: 0.75rem;
      color: var(--text-light);
      font-weight: 400;
    }

    .lang-radio {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid rgba(91, 45, 142, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .lang-item.selected .lang-radio {
      background: linear-gradient(135deg, var(--orange), var(--purple-mid));
      border-color: transparent;
      box-shadow: 0 3px 12px rgba(255, 107, 44, 0.35);
    }

    .lang-radio-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fff;
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.2s, transform 0.2s var(--ease-spring);
    }

    .lang-item.selected .lang-radio-dot {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Continue button ── */
    .continue-btn {
      width: 100%;
      padding: 17px;
      border: none;
      border-radius: var(--radius-pill);
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--orange) 0%, #C84FD6 100%);
      box-shadow: 0 8px 28px rgba(255, 107, 44, 0.38), 0 3px 10px rgba(91, 45, 142, 0.22);
      transition: transform 0.25s var(--ease-spring), box-shadow 0.25s;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.01em;
    }

    .continue-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.15);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .continue-btn:hover::after {
      opacity: 1;
    }

    .continue-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(255, 107, 44, 0.45), 0 5px 16px rgba(91, 45, 142, 0.28);
    }

    .continue-btn:active {
      transform: scale(0.97);
    }

    .continue-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0);
      animation: ripple 0.55s linear;
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: linear-gradient(135deg, var(--purple) 0%, var(--orange) 100%);
      color: #fff;
      padding: 11px 22px;
      border-radius: 50px;
      font-family: 'Sora', sans-serif;
      font-size: 0.84rem;
      font-weight: 600;
      box-shadow: 0 8px 26px rgba(91, 45, 142, 0.3);
      z-index: 999;
      opacity: 0;
      white-space: nowrap;
      transition: transform 0.42s var(--ease-smooth), opacity 0.42s;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 390px) {
      .header-card {
        padding: 22px 20px 20px;
      }

      .lang-item {
        padding: 13px 18px;
      }

      .lang-list {
        max-height: 260px;
      }
    }

    @media (min-width: 640px) {
      .wrapper {
        gap: 20px;
      }

      .header-card {
        padding: 36px 36px 30px;
      }

      .lang-list {
        max-height: 380px;
      }
    }
  </style>
</head>

<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="wrapper">

    <!-- ── Header Card ── -->
    <div class="header-card glass">

      <!-- Logo -->
      <div class="logo-row">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#fff" />
            <circle cx="12" cy="9" r="2.5" fill="rgba(255,107,44,0.85)" />
          </svg>
        </div>
        <div class="logo-text"><span>PORTER</span> Partner</div>
      </div>

      <!-- Country -->
      <div class="country-chip">
        <span class="flag">🇮🇳</span>
        <span class="country-name">India</span>
        <button class="change-btn" id="changeCountry">Change</button>
      </div>

      <!-- Phone -->
      <div class="field-label">Mobile number</div>
      <div class="phone-row">
        <div class="dial-code">+91</div>
        <input class="phone-input" type="tel" placeholder="Enter your mobile number" maxlength="10"
          inputmode="numeric" />
      </div>

      <!-- Checkboxes -->
      <div class="checks">
        <label class="check-row">
          <input type="checkbox" checked />
          <div class="check-box">
            <svg viewBox="0 0 12 12" fill="none">
              <path d="M2 6.2L5 9.5L10 3" stroke="#fff" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </div>
          <span class="check-text">I have read and agreed to <a href="#">Terms and Conditions</a> and <a
              href="#">Privacy Policy</a></span>
        </label>
        <label class="check-row">
          <input type="checkbox" checked />
          <div class="check-box">
            <svg viewBox="0 0 12 12" fill="none">
              <path d="M2 6.2L5 9.5L10 3" stroke="#fff" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </div>
          <span class="check-text">I have read and hereby provide my consent</span>
        </label>
      </div>

    </div>

    <!-- ── Language Card ── -->
    <div class="lang-card glass">

      <!-- Header -->
      <div class="lang-header">
        <div class="lang-header-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
              stroke="#fff" stroke-width="1.8" />
            <path d="M8 12C8 16 10 20 12 20C14 20 16 16 16 12C16 8 14 4 12 4C10 4 8 8 8 12Z" stroke="#fff"
              stroke-width="1.8" />
            <path d="M2.5 9H21.5M2.5 15H21.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </div>
        <div class="lang-header-title">Select your app language</div>
        <div class="lang-header-sub" id="selectedCount">7 languages</div>
      </div>

      <!-- Search -->
      <div class="lang-search">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" />
            <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          <input class="search-input" id="langSearch" type="text" placeholder="Search language…" />
        </div>
      </div>

      <!-- List -->
      <ul class="lang-list" id="langList" role="listbox" aria-label="Language options">
        <!-- Items injected by JS -->
      </ul>

    </div>

    <!-- ── Continue ── -->
    <button class="continue-btn" id="continueBtn">
      <span id="continueBtnText">Continue</span>
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 12H19M13 6L19 12L13 18" stroke="#fff" stroke-width="2.2" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
    </button>

  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const languages = [
      { native: 'हिंदी', english: 'Hindi', code: 'hi' },
      { native: 'ಕನ್ನಡ', english: 'Kannada', code: 'kn' },
      { native: 'தமிழ்', english: 'Tamil', code: 'ta' },
      { native: 'తెలుగు', english: 'Telugu', code: 'te' },
      { native: 'मराठी', english: 'Marathi', code: 'mr' },
      { native: 'മലയാളം', english: 'Malayalam', code: 'ml' },
      { native: 'English', english: 'English', code: 'en' },
    ];

    let selected = 'en';

    const list = document.getElementById('langList');
    const searchInput = document.getElementById('langSearch');
    const toast = document.getElementById('toast');
    const continueBtn = document.getElementById('continueBtn');
    const continueBtnText = document.getElementById('continueBtnText');

    /* ── Render list ── */
    function renderList(query = '') {
      list.innerHTML = '';
      const q = query.trim().toLowerCase();
      languages.forEach(lang => {
        const matches = !q
          || lang.native.toLowerCase().includes(q)
          || lang.english.toLowerCase().includes(q);
        const li = document.createElement('li');
        li.className = 'lang-item' + (lang.code === selected ? ' selected' : '') + (!matches ? ' hidden' : '');
        li.setAttribute('role', 'option');
        li.setAttribute('aria-selected', lang.code === selected ? 'true' : 'false');
        li.setAttribute('data-code', lang.code);
        li.innerHTML = `
        <div class="lang-info">
          <div class="lang-native">${lang.native}</div>
          ${lang.english !== lang.native ? `<div class="lang-english">${lang.english}</div>` : ''}
        </div>
        <div class="lang-radio"><div class="lang-radio-dot"></div></div>`;
        li.addEventListener('click', () => selectLang(lang));
        list.appendChild(li);
      });
    }

    function selectLang(lang) {
      selected = lang.code;
      renderList(searchInput.value);
      continueBtnText.textContent = `Continue in ${lang.english}`;
    }

    /* ── Search ── */
    searchInput.addEventListener('input', e => renderList(e.target.value));

    /* ── Continue ── */
    continueBtn.addEventListener('click', function (e) {
      // ripple
      const r = document.createElement('span');
      r.className = 'ripple';
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size / 2}px;top:${e.clientY - rect.top - size / 2}px`;
      this.appendChild(r);
      setTimeout(() => r.remove(), 600);

      const lang = languages.find(l => l.code === selected);
      showToast(`✓ Language set to ${lang.native} (${lang.english})`);
    });

    /* ── Country change ── */
    document.getElementById('changeCountry').addEventListener('click', () => {
      showToast('🌍 Country selector coming soon');
    });

    /* ── Checkbox toggle ── */
    document.querySelectorAll('.check-row input').forEach(inp => {
      inp.addEventListener('change', function () {
        /* visual is handled by CSS :checked */
      });
    });

    /* ── Phone number: digits only ── */
    document.querySelector('.phone-input').addEventListener('input', function () {
      this.value = this.value.replace(/\D/g, '').slice(0, 10);
    });

    /* ── Toast ── */
    let toastTimer;
    function showToast(msg) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
    }

    /* ── Init ── */
    renderList();
  </script>
</body>

</html>
