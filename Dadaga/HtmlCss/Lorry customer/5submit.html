<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long-Term Contract Reservation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 560px;
            background: #2d3748;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            background: #1a202c;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            color: white;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .header-title {
            color: white;
            font-size: 20px;
            font-weight: 500;
            flex: 1;
        }

        .profile-icon {
            width: 40px;
            height: 40px;
            background: #4a5568;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .nav-tabs {
            display: flex;
            background: #1a202c;
            overflow-x: auto;
        }

        .nav-tab {
            flex: 1;
            min-width: 140px;
            padding: 16px 12px;
            background: #4a5568;
            color: #a0aec0;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            border-right: 1px solid #2d3748;
            white-space: nowrap;
        }

        .nav-tab:last-child {
            border-right: none;
        }

        .nav-tab.active {
            background: #3182ce;
            color: white;
        }

        .nav-tab:hover:not(.active) {
            background: #5a6c7d;
        }

        .content {
            padding: 24px;
            max-height: 600px;
            overflow-y: auto;
        }

        .section-title {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .input-field {
            width: 100%;
            padding: 18px;
            background: #e2e8f0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            color: #2d3748;
        }

        .input-field::placeholder {
            color: #4a5568;
        }

        .budget-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
            margin-bottom: 24px;
        }

        .budget-label {
            color: white;
            font-size: 16px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .budget-input {
            width: 180px;
            padding: 14px 18px;
            background: #e2e8f0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            color: #2d3748;
        }

        .toggle-switch {
            width: 56px;
            height: 32px;
            background: #cbd5e0;
            border-radius: 16px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease;
            flex-shrink: 0;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s ease;
        }

        .toggle-switch.active {
            background: #3182ce;
        }

        .toggle-switch.active::after {
            transform: translateX(24px);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: #3182ce;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: #2c5aa0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.4);
        }

        @media (max-width: 600px) {
            body {
                padding: 0;
            }

            .container {
                max-width: 100%;
                border-radius: 0;
                min-height: 100vh;
            }

            .content {
                max-height: none;
            }

            .nav-tab {
                min-width: 120px;
                font-size: 13px;
            }

            .budget-section {
                flex-wrap: wrap;
            }

            .budget-input {
                width: 140px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn">←</button>
            <h1 class="header-title">Long-Term Contract Reservation</h1>
            <div class="profile-icon">👤</div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab" data-tab="company-info">Company Info</button>
            <button class="nav-tab" data-tab="contract-route">Contract & Route</button>
            <button class="nav-tab" data-tab="cargo">Cargo</button>
            <button class="nav-tab" data-tab="services">Service & Submit</button>
            <button class="nav-tab active" data-tab="submission">Submission</button>
        </div>

        <div class="content">
            <h2 class="section-title">Pricing & Payment</h2>

            <div class="form-group">
                <input type="text" class="input-field" placeholder="Preferred Billing Cycle (e..g. Monthly, Weekly)">
            </div>

            <div class="form-group">
                <input type="text" class="input-field" placeholder="Primact Phone Number">
            </div>

            <div class="form-group">
                <input type="text" class="input-field" placeholder="Preferred Payment Terms (e.el, Net 30 days)">
            </div>

            <div class="form-group">
                <input type="text" class="input-field" placeholder="Email Address or Contact Number">
            </div>

            <div class="budget-section">
                <span class="budget-label">Budget Indication (In ₹)</span>
                <input type="text" class="budget-input" value="1">
                <div class="toggle-switch" id="budgetToggle"></div>
            </div>

             <h2 class="section-title">Additional Notes & submission</h2>
              <div class="form-group">
                <textarea type="text" class="input-field" placeholder="Any other Notes/Special Instructions"></textarea>
            </div>

            <button class="submit-btn">Review & Submit Request</button>
       </div>
    </div>

    <script>
        // Navigation tabs
        const navTabs = document.querySelectorAll('.nav-tab');

        navTabs.forEach(tab => {
            tab.addEventListener('click', function() {
                navTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Toggle switch
        const budgetToggle = document.getElementById('budgetToggle');
        
        budgetToggle.addEventListener('click', function() {
            this.classList.toggle('active');
        });
    </script>
</body>
</html>
