<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long-Term Contract Reservation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding-bottom: 30px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: #2a2a2a;
        }

        .back-btn {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .back-btn svg {
            fill: #fff;
            width: 24px;
            height: 24px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
            text-align: center;
            margin: 0 10px;
        }

        .profile-icon {
            width: 30px;
            height: 30px;
            background: #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .profile-icon svg {
            fill: #fff;
            width: 20px;
            height: 20px;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            padding: 15px 20px;
            overflow-x: auto;
            background: #1a1a1a;
        }

        .nav-tab {
            padding: 10px 16px;
            border-radius: 8px;
            background: #3a3a3a;
            color: #aaa;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-weight: 500;
        }

        .nav-tab.active {
            background: #4a90e2;
            color: #fff;
        }

        .content {
            padding: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 14px;
            background: #3a3a3a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
        }

        .form-input::placeholder {
            color: #888;
        }

        .form-input:focus {
            outline: none;
            background: #444;
        }

        .section {
            margin-top: 30px;
        }

        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .select-wrapper {
            position: relative;
        }

        .form-select {
            width: 100%;
            padding: 14px;
            background: #3a3a3a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            appearance: none;
            cursor: pointer;
        }

        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #fff;
            font-size: 12px;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 10px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .radio-input {
            width: 20px;
            height: 20px;
            border: 2px solid #666;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
        }

        .radio-input.checked::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: #4a90e2;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .upload-section {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            background: #3a3a3a;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }

        .upload-icon {
            width: 20px;
            height: 20px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #666;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .checkbox.checked {
            background: #4a90e2;
            border-color: #4a90e2;
        }

        .checkbox.checked::after {
            content: '✓';
            position: absolute;
            color: #fff;
            font-size: 16px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #4a90e2;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin-top: 30px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #3a7bc8;
        }

        .route-type-row {
            display: block;
            margin-top: 10px;
        }

        .route-type-label {
            font-size: 14px;
            color: #aaa;
            min-width: 100px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn">
            <svg viewBox="0 0 24 24">
                <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
            </svg>
        </div>
        <div class="header-title">Long-Term Contract Reservation</div>
        <div class="profile-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="nav-tab active" data-tab="company">Company Info</button>
        <button class="nav-tab" data-tab="contract">Contract & Route</button>
        <button class="nav-tab" data-tab="cargo">Cargo</button>
        <button class="nav-tab" data-tab="services">Services & Submit</button>
        <button class="nav-tab" data-tab="submission">Submission</button>
    </div>

    <div class="content">
        <div class="section-title">Company & Contact Information</div>
        <div class="form-group">
            <label class="form-label">Company Name</label>
            <input type="text" class="form-input" placeholder="Company Name">
        </div>
        <div class="form-group">
            <input type="text" class="form-input" placeholder="Primary Contact Name">
        </div>
        <div class="form-group">
            <input type="text" class="form-input" placeholder="Contact Phone Number">
        </div>
        <div class="form-group">
            <input type="email" class="form-input" placeholder="Contact Email Address">
        </div>
        <div class="form-group">
            <input type="text" class="form-input" placeholder="Company Address/HQ Location">
        </div>

        <div class="section">
            <div class="section-title">Contract & Route Details</div>
            <div class="form-label">Contract Duration (in Year/s)<input type="text" class="form-input" placeholder="End Date"></div>
            <div class="date-row">
                <div class="form-group">
                    <label class="form-label">Contract Start Date</label>
                    <div class="select-wrapper">
                        <select class="form-select">
                            <option>20 m : 20 /0 m</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Contract End Date</label>
                    <input type="text" class="form-input" placeholder="End Date">
                </div>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label class="form-label">Estimated Monthly Trips/Volume</label>
                <input type="text" class="form-input">
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label class="form-label">Frequency of Trips</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <div class="radio-input" data-name="frequency"></div>
                        <span>Daily</span>
                    </label>
                    <label class="radio-label">
                        <div class="radio-input checked" data-name="frequency"></div>
                        <span>On-Demand</span>
                    </label>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <div class="route-type-row">
                    <div class="route-type-label">Route Type</div>
                    <div class="radio-group">
                        <label class="radio-label">
                            <div class="radio-input" data-name="route"></div>
                            <span>Bi-weekly</span>
                        </label>
                        <label class="radio-label">
                            <div class="radio-input" data-name="route"></div>
                            <span>Multi-drop</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="upload-section">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="#888">
                    <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                </svg>
                <span>Upload Attachments (Draft Agreements)</span>
            </div>

            <div class="checkbox-group">
                <div class="checkbox"></div>
                <label class="form-label" style="margin: 0;">Dedicated Fleet Need (Yes/No)</label>
            </div>
        </div>

        <button class="submit-btn">Review & Submit Request</button>
    </div>

    <script>
        // Tab navigation
        const tabs = document.querySelectorAll('.nav-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Radio buttons
        const radioInputs = document.querySelectorAll('.radio-input');
        radioInputs.forEach(radio => {
            radio.addEventListener('click', function() {
                const name = this.dataset.name;
                document.querySelectorAll(`.radio-input[data-name="${name}"]`).forEach(r => {
                    r.classList.remove('checked');
                });
                this.classList.add('checked');
            });
        });

        // Checkbox
        const checkbox = document.querySelector('.checkbox');
        checkbox.addEventListener('click', function() {
            this.classList.toggle('checked');
        });

        // Upload section
        const uploadSection = document.querySelector('.upload-section');
        uploadSection.addEventListener('click', function() {
            alert('File upload functionality would be implemented here');
        });

        // Submit button
        const submitBtn = document.querySelector('.submit-btn');
        submitBtn.addEventListener('click', function() {
            alert('Form submitted!');
        });
    </script>
</body>
</html>
