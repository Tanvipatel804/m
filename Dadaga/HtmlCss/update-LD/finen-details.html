<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Future Trip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: #4a4a4a;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .content {
            padding: 30px 25px;
        }

        .main-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .date-section {
            margin-bottom: 40px;
        }

        .date-options {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .date-input {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 180px;
        }

        .date-input:hover {
            border-color: #5cb85c;
        }

        .calendar-icon {
            font-size: 24px;
        }

        .option-btn {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-btn:hover {
            border-color: #5cb85c;
        }

        .option-btn.active {
            background: #5cb85c;
            color: white;
            border-color: #5cb85c;
        }

        .money-section {
            margin-bottom: 30px;
        }

        .money-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .money-input {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 600;
        }

        .rupee-icon {
            font-size: 24px;
            font-weight: 700;
        }

        .money-input input {
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
        }

        .payment-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .payment-btn {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
        }

        .payment-btn:hover {
            border-color: #5cb85c;
        }

        .payment-btn.active {
            background: #5cb85c;
            color: white;
            border-color: #5cb85c;
        }

        .next-btn {
            background: #5cb85c;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            margin-top: 30px;
        }

        .next-btn:hover {
            background: #4a9d4a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(92, 184, 92, 0.3);
        }

        .next-btn:active {
            transform: translateY(0);
        }

        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 30px 0;
        }

        @media (max-width: 480px) {
            .money-inputs {
                grid-template-columns: 1fr;
            }
            
            .date-options {
                flex-direction: column;
            }
            
            .date-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="history.back()">‹</button>
            <h1>Post Future Trip</h1>
        </div>

        <div class="content">
            <h2 class="main-title">When Are You Available & How How Much Money? 📅🗺️📍</h2>

            <div class="date-section">
                <h3 class="section-title">Available Dates</h3>
                <div class="date-options">
                    <div class="date-input" onclick="document.getElementById('dateInput').showPicker()">
                        <span class="calendar-icon">📅</span>
                        <span>Start Date</span>
                        <input type="date" id="dateInput" style="display:none;">
                    </div>
                    <button class="option-btn" onclick="toggleActive(this)">1-2 Days</button>
                    <button class="option-btn active" onclick="toggleActive(this)">3-5</button>
                </div>
            </div>

            <div class="divider"></div>

            <div class="money-section">
                <h3 class="section-title">Freight Payment?</h3>
                <!-- <div class="money-inputs">
                    <div class="money-input">
                        <span class="rupee-icon">₹</span>
                        <input type="text" placeholder="Min. Rate Per KM (₹)" id="rateInput">
                    </div>
                    <div class="money-input">
                        <input type="text" placeholder="Anywhere" id="locationInput">
                    </div>
                </div> -->

                <div class="payment-options">
                    <button class="payment-btn" onclick="togglePayment(this)">Cash Preferred</button>
                    <!-- <button class="payment-btn active" onclick="togglePayment(this)">Cash Preferred</button> -->
                    <button class="payment-btn" onclick="togglePayment(this)">Digital Pay</button>
                </div>
            </div>

            <button class="next-btn" onclick="handleNext()">Next: Finen & Details</button>
        </div>
    </div>

    <script>
        function toggleActive(btn) {
            const buttons = btn.parentElement.querySelectorAll('.option-btn');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function togglePayment(btn) {
            const buttons = btn.parentElement.querySelectorAll('.payment-btn');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function handleNext() {
            const rate = document.getElementById('rateInput').value;
            const location = document.getElementById('locationInput').value;
            const date = document.getElementById('dateInput').value;
            
            alert('Proceeding to next step...\nThis is a demo - form data would be submitted here.');
        }

        document.getElementById('dateInput').addEventListener('change', function(e) {
            const dateInput = document.querySelector('.date-input span:last-child');
            if(this.value) {
                const date = new Date(this.value);
                dateInput.textContent = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }
        });
    </script>
</body>
</html>
