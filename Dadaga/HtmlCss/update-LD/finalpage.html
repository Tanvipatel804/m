<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long-Term Contract Reservation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #2a2a2a;
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #1e1e1e;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background-color: #2d2d2d;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
        }

        .header-title {
            flex: 1;
            font-size: 18px;
            font-weight: 500;
        }

        .profile-icon {
            width: 32px;
            height: 32px;
            background-color: #555;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 8px;
            padding: 15px;
            overflow-x: auto;
            background-color: #1e1e1e;
            position: sticky;
            top: 62px;
            z-index: 99;
        }

        .nav-tab {
            background-color: #3a3a3a;
            color: #888;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .nav-tab.active {
            background-color: #4a90e2;
            color: #ffffff;
        }

        .nav-tab.completed {
            background-color: #2d2d2d;
            color: #ffffff;
        }

        /* Content Area */
        .content {
            padding: 20px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .section-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }

        .form-input {
            width: 100%;
            padding: 14px;
            background-color: #3a3a3a;
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
        }

        .form-input::placeholder {
            color: #888;
        }

        /* Radio/Checkbox Groups */
        .option-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .option-btn {
            background-color: #3a3a3a;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .option-btn.selected {
            background-color: #4a90e2;
        }

        /* Toggle Switch */
        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #3a3a3a;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 28px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #666;
            transition: 0.4s;
            border-radius: 28px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: #4a90e2;
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(22px);
        }

        /* Checkbox */
        .checkbox-group {
            background-color: #3a3a3a;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 2px;
        }

        .checkbox-label {
            flex: 1;
        }

        .checkbox-sublabel {
            color: #888;
            font-size: 13px;
            margin-top: 4px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background-color: #4a90e2;
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #3a7bc8;
        }

        /* Date Picker Row */
        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        /* Upload Button */
        .upload-btn {
            width: 100%;
            background-color: #4a90e2;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .subsection-title {
            font-size: 18px;
            font-weight: 600;
            margin: 25px 0 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <button class="back-btn" onclick="goBack()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <div class="header-title">Long-Term Contract Reservation</div>
            <div class="profile-icon">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab(0)">1. Company Info</button>
            <button class="nav-tab" onclick="switchTab(1)">2. Contract & Route</button>
            <button class="nav-tab" onclick="switchTab(2)">3. Cargo</button>
            <button class="nav-tab" onclick="switchTab(3)">4. Service & Submit</button>
            <button class="nav-tab" onclick="switchTab(4)">5. Billing Cycle & Payment</button>
        </div>

        <!-- Content Sections -->
        <div class="content">
            <!-- Section 1: Company Info -->
            <div class="section active" id="section-0">
                <div class="section-title">Company & Contact Information</div>
                
                <div class="form-group">
                    <label class="form-label">Company Name</label>
                    <input type="text" class="form-input" placeholder="Enter company name">
                </div>

                <div class="form-group">
                    <label class="form-label">Primary Contact Name</label>
                    <input type="text" class="form-input" placeholder="Enter contact name">
                </div>

                <div class="form-group">
                    <label class="form-label">Contact Phone Number</label>
                    <input type="tel" class="form-input" placeholder="Enter phone number">
                </div>

                <div class="form-group">
                    <label class="form-label">Contact Email Address</label>
                    <input type="email" class="form-input" placeholder="Enter email address">
                </div>

                <div class="form-group">
                    <label class="form-label">Company Address/HQ Location</label>
                    <input type="text" class="form-input" placeholder="Enter address">
                </div>

                <button class="submit-btn" onclick="nextTab()">Continue to Contract & Route</button>
            </div>

            <!-- Section 2: Contract & Route -->
            <div class="section" id="section-1">
                <div class="section-title">Contract & Route Details</div>
                
                <div class="form-group">
                    <label class="form-label">Contract Duration (e.g.90 days,365 days)</label>
                    <input type="text" class="form-input" placeholder="Enter duration">
                </div>

                <div class="date-row">
                    <div class="form-group">
                        <label class="form-label">Contract Start Date</label>
                        <input type="date" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Contract End Date</label>
                        <input type="date" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Estimated Monthly Trips/Volume</label>
                    <input type="text" class="form-input" placeholder="Enter estimated trips">
                </div>

                <div class="form-group">
                    <label class="form-label">Frequency of Trips</label>
                    <div class="option-group">
                         <button class="option-btn" onclick="toggleOption(this)">Daily</button>
                        <button class="option-btn" onclick="toggleOption(this)">Weekly</button>
                        <button class="option-btn" onclick="toggleOption(this)">Bi-weekly</button>
                        <button class="option-btn" onclick="toggleOption(this)">On-Demand</button>
                    </div>
                </div>

                <div class="subsection-title">Route Type</div>
                <div class="option-group">
                    <!-- <button class="option-btn" onclick="toggleOption(this)">Daily</button> -->
                    <button class="option-btn" onclick="toggleOption(this)">One-way Haulage</button>
                    <button class="option-btn" onclick="toggleOption(this)">Round-trip</button>
                    <button class="option-btn" onclick="toggleOption(this)">Multi-drop</button>
                </div>

                <button class="upload-btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    Upload Attachments (Draft Agreements)
                </button>

                <div class="checkbox-group">
                    <input type="checkbox" id="dedicated-fleet">
                    <label for="dedicated-fleet" class="checkbox-label">
                        <div>Dedicated Fleet Need (Yes/No)</div>
                    </label>
                </div>

                <button class="submit-btn" onclick="nextTab()">Continue to Cargo Requirements</button>
            </div>

            <!-- Section 3: Cargo -->
            <div class="section" id="section-2">
                <div class="section-title">Cargo & Truck Requirements</div>
                
                <div class="form-group">
                    <label class="form-label">Number of Trucks Required</label>
                    <input type="number" class="form-input" placeholder="Enter number of trucks">
                </div>

                <div class="toggle-group">
                    <div>
                        <div style="font-weight: 500;">Driver Requirement</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-label">Truck Type Required (e.g. Flatbed, Reefer)</label>
                    <input type="text" class="form-input" placeholder="Enter truck type">
                </div>

                <div class="form-group">
                    <label class="form-label">Desired Size/Capacity (e.g. 40 MT, 32 ft)</label>
                    <input type="text" class="form-input" placeholder="Enter size/capacity">
                </div>

                <div class="form-group">
                    <label class="form-label">Type of Goods (e.g. HAZMAT, Perishables)</label>
                    <input type="text" class="form-input" placeholder="Enter goods type">
                </div>

                <div class="form-group">
                    <label class="form-label">Special Cargo Notes (e.g. Fragile, ODC)</label>
                    <input type="text" class="form-input" placeholder="Enter special notes">
                </div>

                <div class="form-group">
                    <label class="form-label">Loading/Unloading Facilities</label>
                    <input type="text" class="form-input" placeholder="Describe facilities">
                </div>

                <button class="submit-btn" onclick="nextTab()">Continue to Service & Submit</button>
            </div>

            <!-- Section 4: Service & Submit -->
            <div class="section" id="section-3">
                <div class="section-title">Service Level & Compliance</div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="transit-time">
                    <label for="transit-time" class="checkbox-label">
                        <div>Required Transit Time (SLA)</div>
                        <div class="checkbox-sublabel">(e.g. 48 hours)</div>
                    </label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="certifications" checked>
                    <label for="certifications" class="checkbox-label">
                        <div>Required Certifications/Permits</div>
                        <div class="checkbox-sublabel">(e.g. ADR, FDA)</div>
                    </label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="insurance">
                    <label for="insurance" class="checkbox-label">
                        <div>Insurance Requirements</div>
                        <div class="checkbox-sublabel">(e.g. All-Risk Transit Policy)</div>
                    </label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="api-tracking">
                    <label for="api-tracking" class="checkbox-label">
                        <div>API Tracking Integration</div>
                    </label>
                </div>

                <div class="toggle-group">
                    <div>
                        <div style="font-weight: 500;">Dedicated Fleet Need (Yes/No)</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <button class="submit-btn" onclick="nextTab()">Continue to Pricing</button>
            </div>

            <!-- Section 5: Pricing -->
            <div class="section" id="section-4">
                <div class="section-title">Pricing & Payment</div>
                
                <div class="form-group">
                    <label class="form-label">Preferred Billing Cycle (e.g. Monthly, Weekly)</label>
                    <input type="text" class="form-input" placeholder="Enter billing cycle">
                </div>

                <div class="form-group">
                    <label class="form-label">Primary Contact Phone Number</label>
                    <input type="tel" class="form-input" placeholder="Enter phone number">
                </div>

                <div class="form-group">
                    <label class="form-label">Preferred Payment Terms (e.g. Net 30 days)</label>
                    <input type="text" class="form-input" placeholder="Enter payment terms">
                </div>

                <div class="form-group">
                    <label class="form-label">Contact Email Number</label>
                    <input type="email" class="form-input" placeholder="Enter email">
                </div>

                <div class="toggle-group">
                    <div>
                        <div style="font-weight: 500;">Budget Indication (USD)</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <button class="submit-btn" onclick="submitForm()">Review & Submit Request</button>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 0;

        function switchTab(index) {
            // Hide all sections
            const sections = document.querySelectorAll('.section');
            sections.forEach(section => section.classList.remove('active'));
            
            // Remove active class from all tabs
            const tabs = document.querySelectorAll('.nav-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            
            // Mark previous tabs as completed
            tabs.forEach((tab, i) => {
                if (i < index) {
                    tab.classList.add('completed');
                } else {
                    tab.classList.remove('completed');
                }
            });
            
            // Show selected section and mark tab as active
            document.getElementById(`section-${index}`).classList.add('active');
            tabs[index].classList.add('active');
            
            currentTab = index;
            
            // Scroll to top
            window.scrollTo(0, 0);
        }

        function nextTab() {
            if (currentTab < 4) {
                switchTab(currentTab + 1);
            }
        }

        function goBack() {
            if (currentTab > 0) {
                switchTab(currentTab - 1);
            } else {
                alert('Going back to previous page...');
            }
        }

        function toggleOption(btn) {
            // For single selection in a group
            const group = btn.parentElement;
            const buttons = group.querySelectorAll('.option-btn');
            buttons.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function submitForm() {
            alert('Form submitted successfully! Your request has been received.');
        }
    </script>
</body>
</html>
