<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Preferences</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111111;
    --surface: #1c1c1c;
    --surface-hover: #242424;
    --border: #2e2e2e;
    --text: #ffffff;
    --text-muted: #7a7a7a;
    --accent: #276EF1;
    --toggle-off: #3c3c3c;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* Top App Bar */
  .app-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(17,17,17,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 16px;
    height: 60px;
  }

  @media (min-width: 600px) { .app-bar { padding: 0 24px; } }
  @media (min-width: 1024px) { .app-bar { padding: 0 40px; } }

  .back-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--surface);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .back-btn:hover { background: var(--surface-hover); }
  .back-btn:active { transform: scale(0.91); }
  .back-btn svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  .app-bar-title {
    font-size: 27px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  /* Page */
  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 16px 72px;
  }

  @media (min-width: 600px) { .page { padding: 36px 24px 80px; } }
  @media (min-width: 1024px) { .page { padding: 48px 24px 80px; } }

  .page-title {
    font-size: clamp(22px, 5vw, 28px);
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 26px;
  }

  .section-label {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.9px;
    margin: 28px 0 10px 2px;
  }

  /* Toggle group */
  .toggle-group {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    gap: 14px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-row:hover { background: var(--surface-hover); }
  .toggle-row:active { background: #262626; }

  .row-info {
    display: flex;
    align-items: center;
    gap: 13px;
    flex: 1;
    min-width: 0;
  }

  .row-icon {
    width: 40px; height: 40px;
    border-radius: 11px;
    background: #252525;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.25s;
  }

  .row-icon svg {
    width: 19px; height: 19px;
    stroke: #666;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.25s;
  }

  .toggle-row.is-on .row-icon { background: rgba(39,110,241,0.13); }
  .toggle-row.is-on .row-icon svg { stroke: var(--accent); }

  .row-text { min-width: 0; }
  .row-label { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Toggle switch */
  .toggle { position: relative; width: 50px; height: 28px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

  .slider {
    position: absolute;
    inset: 0;
    background: var(--toggle-off);
    border-radius: 28px;
    transition: background 0.22s cubic-bezier(0.34,1.2,0.64,1);
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.22s cubic-bezier(0.34,1.2,0.64,1);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  input:checked + .slider { background: var(--accent); }
  input:checked + .slider::before { transform: translateX(22px); }

  /* Area card */
  .area-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    gap: 14px;
    -webkit-tap-highlight-color: transparent;
  }
  .area-card:hover { background: var(--surface-hover); }
  .area-card:active { background: #262626; transform: scale(0.99); }

  .area-left { display: flex; align-items: center; gap: 13px; }

  .area-icon-wrap {
    width: 40px; height: 40px;
    border-radius: 11px;
    background: rgba(39,110,241,0.13);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .area-icon-wrap svg { width: 19px; height: 19px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  .area-label { font-size: 15px; font-weight: 500; }
  .area-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .chevron { width: 17px; height: 17px; stroke: #555; fill: none; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: #f5f5f5;
    color: #111;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 40px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="app-bar">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <span class="app-bar-title">Trip Preferences</span>
</div>

<div class="page">
  <div class="page-title"> Preferences</div>

  <div class="section-label">Available Trip Types</div>

  <div class="toggle-group">

    <label class="toggle-row is-on">
      <div class="row-info">
        <div class="row-icon">
          <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        </div>
        <div class="row-text">
          <div class="row-label">Lorry Usual</div>
          <div class="row-desc">Affordable everyday rides</div>
        </div>
      </div>
      <div class="toggle">
        <input type="checkbox" checked onchange="onToggle(this,'Lorry Usual')">
        <span class="slider"></span>
      </div>
    </label>

    <label class="toggle-row is-on">
      <div class="row-info">
        <div class="row-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <div class="row-text">
          <div class="row-label">Lorry Express</div>
          <div class="row-desc">Lorry express service provide</div>
        </div>
      </div>
      <div class="toggle">
        <input type="checkbox" checked onchange="onToggle(this,'Lorry Express')">
        <span class="slider"></span>
      </div>
    </label>

    <label class="toggle-row">
      <div class="row-info">
        <div class="row-icon">
          <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <div class="row-text">
          <div class="row-label">Pool</div>
          <div class="row-desc">Under pull Membership</div>
        </div>
      </div>
      <div class="toggle">
        <input type="checkbox" onchange="onToggle(this,'Pool')">
        <span class="slider"></span>
      </div>
    </label>
  </div>

  <div class="section-label">Driving Preferences</div>

  <div class="area-card" onclick="showToast('Opening Area Preferences…')">
    <div class="area-left">
      <div class="area-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div>
        <div class="area-label">Area Preferences</div>
        <div class="area-desc">Set your preferred driving zones</div>
      </div>
    </div>
    <svg class="chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  function onToggle(input, name) {
    const row = input.closest('.toggle-row');
    if (input.checked) {
      row.classList.add('is-on');
      showToast(name + ' enabled');
    } else {
      row.classList.remove('is-on');
      showToast(name + ' disabled');
    }
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
