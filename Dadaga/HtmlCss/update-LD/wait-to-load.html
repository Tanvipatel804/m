<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting to Load</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #3a3a3a;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .trip-id {
            font-size: 18px;
            font-weight: 500;
        }

        .menu-icon {
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .main-content {
            flex: 1;
            background: #2a2a2a;
            padding: 30px 20px 20px;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
        }

        .status-bar {
            display: flex;
            background: #555;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .status-segment {
            padding: 15px 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            flex: 1;
        }

        .status-active {
            background: #76c043;
        }

        .status-inactive {
            color: #fff;
        }

        .timer-card {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .timer {
            font-size: 80px;
            font-weight: 700;
            color: #000;
            letter-spacing: 2px;
            margin-bottom: 20px;
            line-height: 1;
        }

        .timer-label {
            font-size: 18px;
            color: #333;
            margin-bottom: 40px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            padding: 18px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #2196F3;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1976D2;
        }

        .btn-secondary {
            background: #FF9800;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #F57C00;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .location-info {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .location-icon {
            font-size: 28px;
            color: #666;
        }

        .location-text {
            color: #000;
            font-size: 17px;
            font-weight: 600;
        }

        .bottom-nav {
            background: #1a1a1a;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            padding: 12px 0 20px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            flex: 1;
            color: #888;
            transition: color 0.3s;
            position: relative;
        }

        .nav-item.active {
            color: #76c043;
        }

        .nav-icon {
            font-size: 28px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .nav-label {
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .badge {
            position: absolute;
            top: -2px;
            right: -5px;
            background: #f44336;
            color: #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        @media (max-width: 480px) {
            .timer {
                font-size: 64px;
            }

            .page-title {
                font-size: 28px;
            }

            .btn {
                font-size: 14px;
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="trip-id">TRIP ID: #TRP-12345</div>
        <div class="menu-icon">⋮</div>
    </div>

    <div class="main-content">
        <h1 class="page-title">2. Waiting to Load</h1>

        <div class="status-bar">
            <div class="status-segment status-active">At Pickup</div>
            <div class="status-segment status-inactive">Waiting</div>
        </div>

        <div class="timer-card">
            <div class="timer" id="timer">00:05:30</div>
            <div class="timer-label">Waiting for customer to meet...</div>

            <div class="action-buttons">
                <button class="btn btn-primary" onclick="startLoading()">Start Loading</button>
                <button class="btn btn-secondary" onclick="callSupplier()">Call Supplier</button>
            </div>
        </div>

        <div class="location-info">
            <div class="location-icon">📍</div>
            <div class="location-text">PICK UP: Industrial Zone A | 08:00 AM</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="setActive(0)">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">Home</div>
        </div>
        <div class="nav-item" onclick="setActive(1)">
            <div class="nav-icon">📦</div>
            <div class="nav-label">Order</div>
        </div>
        <div class="nav-item" onclick="setActive(2)">
            <div class="nav-icon">
                👤
                <span class="badge">1</span>
            </div>
            <div class="nav-label">Account</div>
        </div>
    </div>

    <script>
        // Timer functionality - counts up
        let totalSeconds = 330; // Starting at 5 minutes 30 seconds

        function updateTimer() {
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            const display = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            document.getElementById('timer').textContent = display;
            
            totalSeconds++;
        }

        // Update timer every second
        setInterval(updateTimer, 1000);

        // Navigation functionality
        function setActive(index) {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach((item, i) => {
                if (i === index) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // Button functions
        function startLoading() {
            alert('Starting loading process...');
        }

        function callSupplier() {
            alert('Calling supplier...');
        }
    </script>
</body>
</html>
