<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick-up Location</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #f5f5f5;
            padding: 40px;
            border-radius: 20px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .location-section {
            margin-bottom: 40px;
        }

        .location-section:last-child {
            margin-bottom: 0;
        }

        .heading {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        .location-type {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .location-icon {
            width: 50px;
            height: 50px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .location-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .location-text {
            font-size: 20px;
            color: #666;
            font-weight: 400;
        }

        .radius-control {
            background: #2a2a2a;
            padding: 20px 30px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 20px;
        }

        .radius-btn {
            width: 45px;
            height: 45px;
            background: transparent;
            border: 2px solid #555;
            color: white;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radius-btn:hover {
            background: #3a3a3a;
            border-color: #777;
        }

        .radius-value {
            color: white;
            font-size: 36px;
            font-weight: 600;
            min-width: 140px;
            text-align: center;
        }

        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 20px 60px 20px 20px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s ease;
            color: #666;
        }

        .search-input:focus {
            border-color: #667eea;
        }

        .search-input::placeholder {
            color: #999;
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        .search-icon svg {
            width: 28px;
            height: 28px;
            fill: #666;
        }

        .location-input {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 12px;
            transition: border-color 0.3s ease;
        }

        .location-input:focus-within {
            border-color: #667eea;
        }

        .location-input-icon {
            width: 24px;
            height: 24px;
        }

        .location-input-icon svg {
            width: 100%;
            height: 100%;
            fill: #999;
        }

        .location-input input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 18px;
            color: #666;
        }

        .location-input input::placeholder {
            color: #999;
        }

        .location-input .search-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .location-input .search-btn svg {
            width: 28px;
            height: 28px;
            fill: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Pick-up Location Section -->
        <div class="location-section">
            <h1 class="heading">Pick-up Location</h1>
            
            <div class="location-type">
                <div class="location-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                </div>
                <span class="location-text">Near Me (Radius)</span>
            </div>

            <div class="radius-control">
                <button class="radius-btn" id="decreaseRadius">−</button>
                <div class="radius-value" id="radiusValue">25 KM</div>
                <button class="radius-btn" id="increaseRadius">+</button>
            </div>

            <div class="search-container">
                <input type="text" class="search-input" placeholder="[Search for City]" id="citySearch">
                <div class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Drop-off Location Section -->
        <div class="location-section">
            <h1 class="heading">Drop-off Location</h1>
            
            <div class="location-input">
                <div class="location-input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                </div>
                <input type="text" placeholder="Anywhere" id="dropoffSearch">
                <button class="search-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let radius = 25;
        const radiusValue = document.getElementById('radiusValue');
        const decreaseBtn = document.getElementById('decreaseRadius');
        const increaseBtn = document.getElementById('increaseRadius');

        decreaseBtn.addEventListener('click', () => {
            if (radius > 5) {
                radius -= 5;
                radiusValue.textContent = radius + ' KM';
            }
        });

        increaseBtn.addEventListener('click', () => {
            if (radius < 100) {
                radius += 5;
                radiusValue.textContent = radius + ' KM';
            }
        });

        // Search functionality
        document.querySelectorAll('.search-icon, .search-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.closest('.search-container, .location-input').querySelector('input');
                if (input.value) {
                    console.log('Searching for:', input.value);
                    alert('Searching for: ' + input.value);
                }
            });
        });

        // Enter key search
        document.querySelectorAll('input[type="text"]').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    if (this.value) {
                        console.log('Searching for:', this.value);
                        alert('Searching for: ' + this.value);
                    }
                }
            });
        });
    </script>
</body>
</html>
