<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Capture Aadhaar Card</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --orange: #F97316;
      --dark: #111827;
      --white: #FFFFFF;
      --gray: #9CA3AF;
    }

    html,
    body {
      min-height: 100%;
      background: #1c1c2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }

    .phone {
      width: 100%;
      max-width: 390px;
      min-height: 100dvh;
      max-height: 844px;
      background: #111;
      border-radius: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.7);
      position: relative;
    }

    @media (max-width: 430px) {
      .phone {
        border-radius: 0;
        max-height: 100dvh;
      }

      html,
      body {
        background: #111;
      }
    }

    /* ── Status bar ── */


    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px 12px;
      background: #fff;
      flex-shrink: 0;
      border-bottom: 1px solid #E5E7EB;
      z-index: 10;
    }

    .back-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 8px;
      color: #111;
      font-size: 22px;
      font-weight: 300;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: #F3F4F6;
    }

    .top-bar-title {
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #111;
      flex: 1;
      text-align: center;
    }

    /* Camera icon pill (green, top-right) */
    .cam-pill {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #22C55E;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── Camera viewfinder area ── */
    .viewfinder-wrap {
      flex: 0 0 auto;
      background: #2a2a2a;
      position: relative;
      width: 100%;
      aspect-ratio: 16/10;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Live camera stream (simulated) */
    .cam-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #d4c5b0 0%, #c8b99a 40%, #e8dcc8 70%, #d4c5b0 100%);
      opacity: 0.85;
    }

    /* subtle texture lines */
    .cam-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.04) 0px, rgba(255, 255, 255, 0.04) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 20px);
    }

    /* Card frame overlay */
    .frame-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame-box {
      position: relative;
      width: 86%;
      aspect-ratio: 85/54;
      /* credit card ratio */
    }

    /* Corner brackets */
    .corner {
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: var(--orange);
      border-style: solid;
    }

    .corner.tl {
      top: 0;
      left: 0;
      border-width: 3px 0 0 3px;
    }

    .corner.tr {
      top: 0;
      right: 0;
      border-width: 3px 3px 0 0;
    }

    .corner.bl {
      bottom: 0;
      left: 0;
      border-width: 0 0 3px 3px;
    }

    .corner.br {
      bottom: 0;
      right: 0;
      border-width: 0 3px 3px 0;
    }

    /* Vertical scan line animation */
    .scan-line {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent 0%, var(--orange) 50%, transparent 100%);
      animation: scan 2.5s ease-in-out infinite;
      opacity: 0.7;
    }

    @keyframes scan {
      0% {
        left: 2px;
        opacity: 0;
      }

      10% {
        opacity: 0.7;
      }

      90% {
        opacity: 0.7;
      }

      100% {
        left: calc(100% - 2px);
        opacity: 0;
      }
    }

    /* ── Lower dark section ── */
    .lower-section {
      flex: 1;
      background: #1f1f1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 16px;
      gap: 16px;
      overflow-y: auto;
    }

    .lower-section::-webkit-scrollbar {
      width: 0;
    }

    .sample-label {
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
    }

    /* Sample Aadhaar card */
    .aadhaar-card {
      width: 100%;
      max-width: 300px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      padding: 14px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    /* Top strip row */
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .emblem {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid #ddd;
      overflow: hidden;
    }

    .card-stripes {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding-top: 2px;
    }

    .stripe {
      height: 8px;
      border-radius: 3px;
    }

    .stripe-orange {
      background: #F97316;
      width: 55%;
    }

    .stripe-green {
      background: #16A34A;
      width: 80%;
    }

    .aadhaar-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .aadhaar-logo-icon {
      width: 32px;
      height: 32px;
      position: relative;
    }

    /* Middle rows – data lines */
    .card-data {
      display: flex;
      gap: 10px;
      margin-top: 2px;
    }

    .data-lines {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
    }

    .data-line {
      height: 7px;
      border-radius: 3px;
      background: #E5E7EB;
    }

    .dl-full {
      width: 90%;
    }

    .dl-med {
      width: 70%;
    }

    .dl-short {
      width: 50%;
    }

    /* SAMPLE stamp */
    .sample-stamp {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      border: 2.5px solid #E53E3E;
      border-radius: 4px;
      padding: 4px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      opacity: 0.85;
    }

    .stamp-stars {
      font-size: 9px;
      color: #E53E3E;
      letter-spacing: 3px;
    }

    .stamp-text {
      font-size: 13px;
      font-weight: 700;
      color: #E53E3E;
      letter-spacing: 2px;
    }

    /* QR code side */
    .qr-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .qr-box {
      width: 54px;
      height: 54px;
      background: #fff;
      border: 1.5px solid #ccc;
      border-radius: 4px;
      padding: 3px;
    }

    .qr-inner {
      width: 100%;
      height: 100%;
      background:
        repeating-linear-gradient(0deg, #333 0px, #333 3px, transparent 3px, transparent 6px),
        repeating-linear-gradient(90deg, #333 0px, #333 3px, transparent 3px, transparent 6px);
      background-size: 6px 6px;
      border-radius: 2px;
    }

    /* Aadhaar number row */
    .card-number {
      text-align: center;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #111;
      font-family: 'Sora', sans-serif;
      border-top: 2px solid #E53E3E;
      padding-top: 8px;
      margin-top: 2px;
    }

    /* bottom dots on the sample card */
    .card-dots {
      display: flex;
      justify-content: space-between;
      padding: 0 4px;
    }

    .card-dot-group {
      display: flex;
      gap: 3px;
    }

    .card-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #ccc;
    }

    /* ── Camera controls bar ── */
    .cam-controls {
      background: #111;
      padding: 14px 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-shrink: 0;
    }

    .gallery-btn {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid #555;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .gallery-btn:hover {
      border-color: #888;
    }

    .shutter-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s, background 0.15s;
      position: relative;
    }

    .shutter-btn:active {
      transform: scale(0.93);
      background: #ddd;
    }

    .shutter-inner {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #ccc;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      height: 52px;
      border-top: 1px solid #E5E7EB;
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: #fff;
      flex-shrink: 0;
    }

    .nav-sq {
      width: 22px;
      height: 22px;
      border: 2px solid #374151;
      border-radius: 3px;
      cursor: pointer;
    }

    .nav-circ {
      width: 24px;
      height: 24px;
      border: 2px solid #374151;
      border-radius: 50%;
      cursor: pointer;
    }

    .nav-tri {
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-right: 18px solid #374151;
      cursor: pointer;
    }

    /* ── Flash overlay ── */
    .flash {
      position: absolute;
      inset: 0;
      z-index: 99;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.08s;
      border-radius: inherit;
    }

    .flash.snap {
      opacity: 1;
    }

    /* ── Captured preview ── */
    .captured-banner {
      position: absolute;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(34, 197, 94, 0.95);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 50;
    }

    .captured-banner.show {
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="phone">

    <!-- Flash overlay -->
    <div class="flash" id="flash"></div>

    <!-- Captured banner -->
    <div class="captured-banner" id="capturedBanner">✓ Aadhaar (Back) Captured!</div>

    <!-- Status bar -->

      <span class="status-time">4:05</span>

    <!-- Top bar -->
    <div class="top-bar">
      <div class="back-btn" onclick="window.history.back()">&#8249;</div>
      <span class="top-bar-title">Capture Aadhaar Card (Back Side)</span>
      <div class="cam-pill">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
          <circle cx="12" cy="13" r="4" />
        </svg>
      </div>
    </div>

    <!-- Camera viewfinder -->
    <div class="viewfinder-wrap">
      <div class="cam-bg"></div>

      <!-- Frame overlay -->
      <div class="frame-overlay">
        <div class="frame-box" id="frameBox">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>

    <!-- Lower dark section -->
    <div class="lower-section">
      <p class="sample-label">Aadhaar Card (Back Side)</p>

      <!-- Sample Aadhaar Card -->
      <div class="aadhaar-card">

        <!-- Top row: emblem + stripes + aadhaar logo -->
        <div class="card-top">
          <!-- India Emblem -->
          <div class="emblem">
            <svg width="28" height="28" viewBox="0 0 60 60" fill="none">
              <circle cx="30" cy="30" r="28" fill="#f5f5f5" stroke="#ddd" stroke-width="1" />
              <!-- simplified ashoka wheel -->
              <circle cx="30" cy="30" r="10" fill="none" stroke="#1a3a6b" stroke-width="1.5" />
              <circle cx="30" cy="30" r="3" fill="#1a3a6b" />
              <!-- spokes -->
              <line x1="30" y1="20" x2="30" y2="40" stroke="#1a3a6b" stroke-width="1" />
              <line x1="20" y1="30" x2="40" y2="30" stroke="#1a3a6b" stroke-width="1" />
              <line x1="22.9" y1="22.9" x2="37.1" y2="37.1" stroke="#1a3a6b" stroke-width="1" />
              <line x1="37.1" y1="22.9" x2="22.9" y2="37.1" stroke="#1a3a6b" stroke-width="1" />
              <!-- lions -->
              <text x="30" y="16" text-anchor="middle" font-size="8" fill="#8B6914">🦁</text>
            </svg>
          </div>

          <div class="card-stripes">
            <div class="stripe stripe-orange"></div>
            <div class="stripe stripe-green"></div>
          </div>

          <!-- Aadhaar logo -->
          <div class="aadhaar-logo">
            <svg width="38" height="38" viewBox="0 0 80 80">
              <!-- fingerprint style aadhaar logo approximate -->
              <ellipse cx="40" cy="38" rx="18" ry="22" fill="none" stroke="#E53E3E" stroke-width="3" />
              <ellipse cx="40" cy="38" rx="12" ry="15" fill="none" stroke="#E53E3E" stroke-width="2.5" />
              <ellipse cx="40" cy="38" rx="6" ry="8" fill="none" stroke="#E53E3E" stroke-width="2" />
              <ellipse cx="40" cy="38" rx="2" ry="3" fill="#E53E3E" />
              <!-- top curve -->
              <path d="M22 30 Q40 5 58 30" fill="none" stroke="#E53E3E" stroke-width="3" />
              <text x="40" y="68" text-anchor="middle" font-size="9" font-weight="700" fill="#E53E3E"
                font-family="sans-serif">AADHAAR</text>
            </svg>
          </div>
        </div>

        <!-- Data + sample stamp + QR -->
        <div class="card-data">
          <div class="data-lines">
            <div class="data-line dl-full"></div>
            <div class="data-line dl-med"></div>
            <div class="data-line dl-short"></div>
            <div class="data-line dl-med"></div>

            <!-- SAMPLE stamp -->
            <div class="sample-stamp">
              <span class="stamp-stars">★ ★ ★</span>
              <span class="stamp-text">SAMPLE</span>
              <span class="stamp-stars">★ ★ ★</span>
            </div>
          </div>

          <div class="qr-side">
            <div class="qr-box">
              <div class="qr-inner"></div>
            </div>
          </div>
        </div>

        <!-- Number -->
        <div class="card-number">XXXX XXXX XXXX</div>

        <!-- Bottom dots -->
        <div class="card-dots">
          <div class="card-dot-group">
            <div class="card-dot"></div>
            <div class="card-dot"></div>
            <div class="card-dot"></div>
            <div class="card-dot"></div>
          </div>
          <div class="card-dot-group">
            <div class="card-dot"></div>
            <div class="card-dot"></div>
            <div class="card-dot"></div>
            <div class="card-dot"></div>
          </div>
          <div class="card-dot-group">
            <div class="card-dot"></div>
            <div class="card-dot"></div>
            <div class="card-dot"></div>
            <div class="card-dot"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- Camera controls -->
    <div class="cam-controls">
      <!-- Gallery -->
      <div class="gallery-btn" onclick="openGallery()" title="Open gallery">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <polyline points="21 15 16 10 5 21" />
        </svg>
        <input type="file" id="galleryInput" accept="image/*" style="display:none" onchange="handleGalleryPick(this)">
      </div>

      <!-- Shutter -->
      <div class="shutter-btn" onclick="capturePhoto()" title="Capture">
        <div class="shutter-inner"></div>
      </div>

      <!-- Flip / front camera placeholder -->
      <div style="width:46px;height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;"
        onclick="flipCamera()">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6" />
          <path d="M23 20v-6h-6" />
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10" />
          <path d="M3.51 15a9 9 0 0 0 14.85 3.36L23 14" />
        </svg>
      </div>
    </div>

  </div>

  <script>
    function capturePhoto() {
      const flash = document.getElementById('flash');
      const banner = document.getElementById('capturedBanner');

      // Flash effect
      flash.classList.add('snap');
      setTimeout(() => flash.classList.remove('snap'), 180);

      // Banner
      banner.classList.add('show');
      setTimeout(() => banner.classList.remove('show'), 2200);

      // Stop scan line momentarily
      const scanLine = document.querySelector('.scan-line');
      if (scanLine) {
        scanLine.style.animationPlayState = 'paused';
        setTimeout(() => { scanLine.style.animationPlayState = 'running'; }, 800);
      }
    }

    function openGallery() {
      document.getElementById('galleryInput').click();
    }

    function handleGalleryPick(input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      const banner = document.getElementById('capturedBanner');
      const name = file.name.length > 22 ? file.name.slice(0, 22) + '…' : file.name;
      banner.textContent = '✓ Selected: ' + name;
      banner.classList.add('show');
      setTimeout(() => {
        banner.classList.remove('show');
        banner.textContent = '✓ Aadhaar (Back) Captured!';
      }, 2500);
    }

    function flipCamera() {
      const bg = document.querySelector('.cam-bg');
      bg.style.transition = 'opacity 0.2s';
      bg.style.opacity = '0';
      setTimeout(() => {
        bg.style.background = 'linear-gradient(160deg, #87a8c8 0%, #6b90b0 40%, #a0bdd4 70%, #87a8c8 100%)';
        bg.style.opacity = '0.85';
      }, 200);
    }
  </script>

</body>
