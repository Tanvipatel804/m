<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Owner Details</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #1A56DB;
      --blue-light: #EBF2FF;
      --green: #16A34A;
      --green-bg: #F0FDF4;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --dark: #111827;
      --red: #EF4444;
      --white: #FFFFFF;
    }

    html,
    body {
      min-height: 100%;
      background: #1c1c2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }

    .phone {
      width: 100%;
      /* max-width: 90%; */
      min-height: 100dvh;
      max-height: 844px;
      background: #F9FAFB;
      border-radius: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.55);
      position: relative;
    }

    /* @media (max-width: 430px) {
      .phone {
        border-radius: 0;
        max-height: 100dvh;
      }

      html,
      body {
        background: #F9FAFB;
      }
    } */

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 14px;
      background: #fff;
      flex-shrink: 0;
      border-bottom: 1px solid var(--gray-200);
    }

    .top-bar h1 {
      font-family: 'Sora', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
    }

    .headset-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.15s;
      color: var(--dark);
    }

    .headset-btn:hover {
      background: var(--gray-100);
    }

    /* ── Stepper ── */
    .stepper {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 24px 16px;
      background: #fff;
      flex-shrink: 0;
      gap: 0;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      flex: 1;
    }

    .step-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
      position: relative;
      z-index: 1;
      transition: all 0.3s ease;
    }

    .step.active .step-circle {
      border: 2.5px solid var(--blue);
      color: var(--blue);
      background: #fff;
    }

    .step.inactive .step-circle {
      border: 2px solid var(--gray-400);
      color: var(--gray-400);
      background: #fff;
    }

    .step.done .step-circle {
      background: var(--blue);
      color: #fff;
      border: 2.5px solid var(--blue);
    }

    .step-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-500);
    }

    .step.active .step-label {
      color: var(--blue);
    }

    .step.done .step-label {
      color: var(--blue);
    }

    /* Dashed connector */
    .step-line {
      flex: 1;
      height: 2px;
      margin-top: 17px;
      background-image: repeating-linear-gradient(to right,
          var(--gray-300, #D1D5DB) 0,
          var(--gray-300, #D1D5DB) 5px,
          transparent 5px,
          transparent 10px);
      position: relative;
    }

    .step-line.done-line {
      background-image: repeating-linear-gradient(to right,
          var(--blue) 0,
          var(--blue) 5px,
          transparent 5px,
          transparent 10px);
    }

    /* ── Scrollable body ── */
    .body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .body::-webkit-scrollbar {
      width: 0;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .req {
      color: var(--red);
      font-size: 15px;
    }

    /* ── Name input ── */
    .input-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 14px 16px;
    }

    .name-input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 16px;
      font-weight: 500;
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      background: transparent;
    }

    .name-input::placeholder {
      color: var(--gray-400);
      font-weight: 400;
    }

    /* ── Upload cards ── */
    .upload-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .upload-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 16px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .upload-card:hover {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.07);
    }

    .upload-card.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.08);
    }

    .upload-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .upload-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .upload-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .upload-status.uploaded {
      color: var(--green);
    }

    .upload-status.pending {
      color: var(--gray-400);
    }

    .edit-icon {
      color: var(--blue);
      flex-shrink: 0;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .edit-icon:hover {
      background: var(--blue-light);
    }

    /* Hidden file input */
    .file-input {
      display: none;
    }

    /* Ripple on upload card */
    .upload-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(26, 86, 219, 0.06);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .upload-card:active::after {
      opacity: 1;
    }

    /* ── Fixed bottom submit ── */
    .bottom-bar {
      position: absolute;
      bottom: 54px;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #F9FAFB 80%, transparent);
      padding: 12px 16px 14px;
    }

    .btn-submit {
      width: 100%;
      padding: 17px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #2563EB 0%, #1447B4 100%);
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(26, 86, 219, 0.38);
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(26, 86, 219, 0.45);
    }

    .btn-submit:active {
      transform: scale(0.97);
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      flex-shrink: 0;
      height: 54px;
      border-top: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: #fff;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
    }

    .nav-sq {
      width: 22px;
      height: 22px;
      border: 2px solid var(--gray-700);
      border-radius: 3px;
      cursor: pointer;
    }

    .nav-circ {
      width: 24px;
      height: 24px;
      border: 2px solid var(--gray-700);
      border-radius: 50%;
      cursor: pointer;
    }

    .nav-tri {
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-right: 18px solid var(--gray-700);
      cursor: pointer;
    }

    /* ── Toast ── */
    .toast {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 50;
    }

    .toast.show {
      opacity: 1;
    }

    /* ── Success overlay ── */
    .success-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 60;
      background: rgba(22, 163, 74, 0.96);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      border-radius: inherit;
    }

    .success-overlay.show {
      display: flex;
      animation: flashIn 0.35s ease;
    }

    @keyframes flashIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .success-overlay p {
      font-family: 'Sora', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .success-overlay span {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>

<body>

  <div class="phone">

    <!-- Success overlay -->
    <div class="success-overlay" id="successOverlay">
      <svg width="68" height="68" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <polyline points="9 12 11 14 15 10" />
      </svg>
      <p>Details Submitted!</p>
      <span>Proceeding to Vehicle Details…</span>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Top bar -->
    <div class="top-bar">
      <h1>Owner Details</h1>
      <div class="headset-btn" onclick="showToast('Support coming soon')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6" />
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z" />
          <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" />
        </svg>
      </div>
    </div>

    <!-- Stepper -->
    <div class="stepper">
      <div class="step active" id="step1">
        <div class="step-circle">1</div>
        <span class="step-label">Owner</span>
      </div>
      <div class="step-line" id="line1"></div>
      <div class="step inactive" id="step2">
        <div class="step-circle">2</div>
        <span class="step-label">Vehicle</span>
      </div>
      <div class="step-line" id="line2"></div>
      <div class="step inactive" id="step3">
        <div class="step-circle">3</div>
        <span class="step-label">Driver</span>
      </div>
    </div>

    <!-- Scrollable body -->
    <div class="body">

      <!-- Name -->
      <div>
        <p class="section-label">Name <span class="req">*</span></p>
        <div class="input-card" style="margin-top:10px;">
          <input class="name-input" type="text" id="nameInput" placeholder="Enter owner name" />
        </div>
      </div>

      <!-- Upload section -->
      <div>
        <p class="section-label">Upload the following <span class="req">*</span></p>
        <div class="upload-cards" style="margin-top:10px;">

          <!-- Aadhaar Card -->
          <div class="upload-card" id="card-aadhaar" onclick="triggerUpload('aadhaar')">
            <div class="upload-info">
              <span class="upload-title">Owner Aadhaar Card</span>
              <div class="upload-status uploaded" id="status-aadhaar">
                <!-- cloud-upload icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="16 16 12 12 8 16" />
                  <line x1="12" y1="12" x2="12" y2="21" />
                  <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
                </svg>
                Uploaded
              </div>
            </div>
            <div class="edit-icon" onclick="event.stopPropagation(); triggerUpload('aadhaar')">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
              </svg>
            </div>
            <input class="file-input" type="file" id="file-aadhaar" accept="image/*,.pdf"
              onchange="handleUpload('aadhaar', this)">
          </div>

          <!-- PAN Card -->
          <div class="upload-card" id="card-pan" onclick="triggerUpload('pan')">
            <div class="upload-info">
              <span class="upload-title">Owner PAN Card</span>
              <div class="upload-status uploaded" id="status-pan">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="16 16 12 12 8 16" />
                  <line x1="12" y1="12" x2="12" y2="21" />
                  <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
                </svg>
                Uploaded
              </div>
            </div>
            <div class="edit-icon" onclick="event.stopPropagation(); triggerUpload('pan')">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
              </svg>
            </div>
            <input class="file-input" type="file" id="file-pan" accept="image/*,.pdf"
              onchange="handleUpload('pan', this)">
          </div>

          <!-- Selfie -->
          <div class="upload-card" id="card-selfie" onclick="triggerUpload('selfie')">
            <div class="upload-info">
              <span class="upload-title">Owner Selfie</span>
              <div class="upload-status uploaded" id="status-selfie">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="16 16 12 12 8 16" />
                  <line x1="12" y1="12" x2="12" y2="21" />
                  <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
                </svg>
                Uploaded
              </div>
            </div>
            <div class="edit-icon" onclick="event.stopPropagation(); triggerUpload('selfie')">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
              </svg>
            </div>
            <input class="file-input" type="file" id="file-selfie" accept="image/*" capture="user"
              onchange="handleUpload('selfie', this)">
          </div>

        </div>
      </div>

    </div>

    <!-- Submit bar -->
    <div class="bottom-bar">
      <button class="btn-submit" onclick="handleSubmit()">Submit</button>
    </div>

    <!-- Bottom nav -->
    <!-- <div class="bottom-nav">
      <div class="nav-sq"></div>
      <div class="nav-circ"></div>
      <div class="nav-tri"></div>
    </div> -->

  </div>

  <script>
    // Track upload state — pre-set as uploaded to match screenshot
    const uploadState = { aadhaar: true, pan: true, selfie: true };

    function triggerUpload(key) {
      document.getElementById('file-' + key).click();
    }

    function handleUpload(key, input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      uploadState[key] = true;

      const statusEl = document.getElementById('status-' + key);
      const cardEl = document.getElementById('card-' + key);

      statusEl.className = 'upload-status uploaded';
      statusEl.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 16 12 12 8 16"/>
        <line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
      </svg>
      Uploaded`;
      cardEl.classList.remove('error');

      showToast(file.name.length > 24 ? file.name.slice(0, 24) + '…' : file.name + ' uploaded');
    }

    function handleSubmit() {
      const name = document.getElementById('nameInput').value.trim();
      let valid = true;

      // Validate name
      const nameCard = document.querySelector('.input-card');
      if (!name) {
        nameCard.style.borderColor = '#EF4444';
        nameCard.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.1)';
        valid = false;
        setTimeout(() => {
          nameCard.style.borderColor = '';
          nameCard.style.boxShadow = '';
        }, 2000);
      } else {
        nameCard.style.borderColor = '';
        nameCard.style.boxShadow = '';
      }

      // Validate uploads
      ['aadhaar', 'pan', 'selfie'].forEach(key => {
        const card = document.getElementById('card-' + key);
        if (!uploadState[key]) {
          card.classList.add('error');
          valid = false;
          setTimeout(() => card.classList.remove('error'), 2000);
        }
      });

      if (!valid) {
        showToast('Please fill all required fields');
        return;
      }

      // Success
      const overlay = document.getElementById('successOverlay');
      overlay.classList.add('show');
      setTimeout(() => overlay.classList.remove('show'), 2200);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>

</body>

</html>
