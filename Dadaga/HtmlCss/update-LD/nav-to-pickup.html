<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigating to Pick-up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
        }

        .back-btn {
            font-size: 28px;
            color: #4a90e2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            transition: background 0.3s;
            border-radius: 50%;
        }

        .back-btn:hover {
            background: #f0f0f0;
        }

        .trip-id {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            flex: 1;
            text-align: center;
        }

        .truck-icon {
            font-size: 32px;
            color: #2e7d32;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            padding: 30px 20px;
            color: #222;
        }

        .map-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: #f0ebe5;
            margin: 0 20px;
            width: calc(100% - 40px);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .map-bg {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(135deg, #f5f5f0 0%, #e8e8e0 100%);
        }

        .route-line {
            position: absolute;
            top: 45%;
            left: 25%;
            width: 45%;
            height: 4px;
            background: #4a90e2;
            transform: translateY(-50%);
            border-radius: 2px;
            animation: drawRoute 2s ease-in-out;
        }

        @keyframes drawRoute {
            from {
                width: 0;
            }
            to {
                width: 45%;
            }
        }

        .map-marker {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .marker-pin {
            width: 40px;
            height: 40px;
            background: #4a90e2;
            border: 4px solid #fff;
            border-radius: 50%;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .marker-pin::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 12px solid #4a90e2;
        }

        .current-marker {
            left: 25%;
            top: 45%;
            transform: translate(-50%, -50%);
        }

        .pickup-marker {
            right: 25%;
            top: 45%;
            transform: translate(50%, -50%);
        }

        .pickup-marker .marker-pin {
            background: #666;
            border-color: #fff;
        }

        .pickup-marker .marker-pin::after {
            border-top-color: #666;
        }

        .current-label {
            position: absolute;
            left: 25%;
            top: 25%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .pickup-label {
            position: absolute;
            right: 25%;
            top: 28%;
            transform: translateX(50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            color: #333;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .eta-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.98);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .eta-text {
            font-size: 15px;
            font-weight: 600;
            color: #666;
            margin-bottom: 5px;
        }

        .eta-value {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .navigate-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 90px;
            height: 90px;
            background: #ff7043;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(255, 112, 67, 0.4);
            transition: all 0.3s;
            border: none;
            color: #fff;
        }

        .navigate-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(255, 112, 67, 0.5);
        }

        .navigate-btn:active {
            transform: scale(1.02);
        }

        .navigate-icon {
            font-size: 36px;
            margin-bottom: 5px;
        }

        .navigate-text {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-buttons {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-primary {
            background: #4a90e2;
            color: #fff;
        }

        .btn-primary:hover {
            background: #357abd;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(74, 144, 226, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-icon {
            font-size: 24px;
        }

        @media (max-width: 600px) {
            .page-title {
                font-size: 28px;
                padding: 20px;
            }

            .map-container {
                height: 350px;
            }

            .navigate-btn {
                width: 75px;
                height: 75px;
            }

            .navigate-icon {
                font-size: 30px;
            }

            .navigate-text {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="back-btn" onclick="goBack()">←</div>
            <div class="trip-id">TRIP ID: #TRP-12345</div>
            <div class="truck-icon">🚚</div>
        </div>

        <h1 class="page-title">1. Navigating to Pick-up</h1>

        <div class="map-container">
            <div class="map-bg">
                <div class="route-line"></div>
                
                <div class="current-label">Current Cur</div>
                <div class="pickup-label">PICK UP</div>
                
                <div class="map-marker current-marker">
                    <div class="marker-pin"></div>
                </div>
                
                <div class="map-marker pickup-marker">
                    <div class="marker-pin"></div>
                </div>

                <div class="eta-box">
                    <div class="eta-text">ETA: <span class="eta-value">12 mins</span></div>
                    <div class="eta-text">Distance: <span class="eta-value">7.8 KM</span></div>
                </div>

                <button class="navigate-btn" onclick="openNavigation()">
                    <div class="navigate-icon">🧭</div>
                    <div class="navigate-text">Navigate</div>
                </button>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" onclick="arrivedAtPickup()">
                <span>Arrived at Pick Up</span>
            </button>
            <button class="btn btn-primary" onclick="callCustomer()">
                <span class="btn-icon">📞</span>
                <span>Call Customer</span>
            </button>
        </div>
    </div>

    <script>
        function goBack() {
            alert('Going back to previous page...');
        }

        function openNavigation() {
            alert('Opening navigation app...');
        }

        function arrivedAtPickup() {
            alert('Marked as arrived at pickup location!');
        }

        function callCustomer() {
            alert('Calling customer...');
        }

        // Simulate real-time ETA update
        let minutes = 12;
        let distance = 7.8;

        setInterval(() => {
            if (minutes > 0) {
                minutes -= 0.1;
                distance -= 0.065;
                
                const minuteDisplay = Math.ceil(minutes);
                const distanceDisplay = Math.max(0, distance).toFixed(1);
                
                const etaElements = document.querySelectorAll('.eta-value');
                if (etaElements[0]) etaElements[0].textContent = minuteDisplay + ' mins';
                if (etaElements[1]) etaElements[1].textContent = distanceDisplay + ' KM';
            }
        }, 6000); // Update every 6 seconds
    </script>
</body>
</html>
