<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Vehicles</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f2f3f5;
      --card-bg: #ffffff;
      --primary: #1a56db;
      --primary-light: #e8effe;
      --error: #e02424;
      --error-light: #fde8e8;
      --text-main: #111928;
      --text-sub: #6b7280;
      --border: #e5e7eb;
      --disabled: #9ca3af;
      --disabled-bg: #f3f4f6;
      --shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.07);
      --radius: 14px;
      --bar-height: 56px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      /* background: var(--bg); */
      background-color: #6b7280;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ── Wrapper — responsive, not fixed mobile ── */
    .app-wrapper {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    /* ── Top Bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      transition: background .15s;
    }

    .back-btn:hover {
      background: var(--bg);
    }

    .back-btn svg {
      width: 22px;
      height: 22px;
    }

    .top-bar h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -.2px;
      color: var(--text-main);
    }

    .top-bar-icons {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      position: relative;
      transition: background .15s;
    }

    .icon-btn:hover {
      background: var(--bg);
    }

    .icon-btn svg {
      width: 22px;
      height: 22px;
    }

    .notif-dot {
      width: 8px;
      height: 8px;
      background: var(--error);
      border-radius: 50%;
      position: absolute;
      top: 6px;
      right: 6px;
      border: 2px solid #fff;
    }

    /* ── Content ── */
    .content {
      flex: 1;
      padding: 20px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    /* ── Vehicle Card ── */
    .vehicle-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      animation: fadeSlideIn .35s ease both;
    }

    .vehicle-card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 18px rgba(26, 86, 219, .1);
      transform: translateY(-1px);
    }

    .vehicle-card:active {
      transform: scale(.98);
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-left {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .plate-number {
      font-family: 'DM Mono', monospace;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: .5px;
      color: var(--text-main);
    }

    .card-meta {
      font-size: .82rem;
      color: var(--text-sub);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .card-meta span {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .error-badge {
      background: var(--error);
      color: #fff;
      font-size: .73rem;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 999px;
      white-space: nowrap;
      letter-spacing: .2px;
      cursor: pointer;
      transition: background .15s, transform .15s;
      flex-shrink: 0;
    }

    .error-badge:hover {
      background: #c81e1e;
      transform: scale(1.05);
    }

    .success-badge {
      background: #def7ec;
      color: #03543f;
      font-size: .73rem;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* ── Empty State ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 14px;
      color: var(--text-sub);
      text-align: center;
      animation: fadeSlideIn .4s ease;
    }

    .empty-state svg {
      opacity: .35;
    }

    .empty-state p {
      font-size: .95rem;
      line-height: 1.5;
    }

    /* ── Bottom Bar ── */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-top: 1px solid var(--border);
      padding: 12px 16px 16px;
      display: flex;
      gap: 10px;
      z-index: 100;
    }

    .btn {
      flex: 1;
      height: 48px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }

    .btn-outline:hover {
      background: var(--primary-light);
    }

    .btn-outline:active {
      transform: scale(.97);
    }

    .btn-solid {
      background: var(--primary);
      color: #fff;
    }

    .btn-solid:hover {
      background: #1648c7;
    }

    .btn-solid:active {
      transform: scale(.97);
    }

    .btn-solid:disabled,
    .btn-solid[disabled] {
      background: var(--disabled-bg);
      color: var(--disabled);
      cursor: not-allowed;
      border: none;
      transform: none;
    }

    /* ── Modal Overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-sheet {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 0 0 30px;
      animation: slideUp .3s cubic-bezier(.22, .68, 0, 1.2) both;
      max-height: 92vh;
      overflow-y: auto;
    }

    @keyframes slideUp {
      from {
        transform: translateY(60px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 999px;
      margin: 12px auto 0;
    }

    .modal-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 {
      font-size: 1.05rem;
      font-weight: 700;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-sub);
      font-size: 1.1rem;
      transition: background .15s;
    }

    .modal-close:hover {
      background: var(--error-light);
      color: var(--error);
    }

    .modal-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      height: 46px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--text-main);
      background: #fff;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      appearance: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26, 86, 219, .12);
    }

    .form-group input::placeholder {
      color: #c0c4cc;
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-sub);
      font-size: .85rem;
    }

    .modal-footer {
      padding: 0 20px;
      display: flex;
      gap: 10px;
    }

    .modal-footer .btn {
      height: 46px;
      font-size: .9rem;
    }

    /* ── Error Detail Modal ── */
    .error-list {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .error-item {
      background: var(--error-light);
      border: 1.5px solid #fca5a5;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .error-item-title {
      font-weight: 700;
      font-size: .9rem;
      color: var(--error);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .error-item-desc {
      font-size: .82rem;
      color: #7f1d1d;
      line-height: 1.4;
    }

    .error-item-title svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #111928;
      color: #fff;
      font-size: .88rem;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 99px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      z-index: 500;
      pointer-events: none;
      max-width: calc(100vw - 40px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Notification Panel ── */
    .notif-list {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .notif-item {
      background: var(--bg);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: .85rem;
      line-height: 1.45;
    }

    .notif-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .notif-time {
      font-size: .75rem;
      color: var(--text-sub);
      margin-top: 3px;
    }

    /* ── Pay Fees Modal ── */
    .fee-summary {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .fee-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .9rem;
      padding-bottom: 10px;
      border-bottom: 1px dashed var(--border);
    }

    .fee-row:last-of-type {
      border-bottom: none;
      font-weight: 700;
      font-size: 1rem;
    }

    .fee-label {
      color: var(--text-sub);
    }

    .fee-amount {
      font-weight: 600;
      font-family: 'DM Mono', monospace;
    }

    .fee-amount.red {
      color: var(--error);
    }

    /* ── Support ── */
    .support-links {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .support-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--bg);
      border-radius: 12px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 500;
      transition: background .15s;
      border: none;
      text-align: left;
      width: 100%;
      color: var(--text-main);
    }

    .support-link:hover {
      background: var(--primary-light);
      color: var(--primary);
    }

    .support-link svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {

      .app-wrapper,
      .bottom-bar {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="app-wrapper">

    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="back-btn" onclick="goBack()" title="Go Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <h1>My Vehicles</h1>
      </div>
      <div class="top-bar-icons">
        <button class="icon-btn" onclick="openNotifications()" title="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="notif-dot" id="notifDot"></span>
        </button>
        <button class="icon-btn" onclick="openSupport()" title="Help & Support">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M3 18v-6a9 9 0 0 1 18 0v6" />
            <path
              d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Content -->
    <div class="content" id="vehicleList">
      <!-- Cards rendered by JS -->
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <button class="btn btn-outline" onclick="openAddVehicle()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Another Vehicle
      </button>
      <button class="btn btn-solid" id="payFeesBtn" onclick="openPayFees()">Pay Fees</button>
    </div>

  </div>

  <!-- ── Add Vehicle Modal ── -->
  <div class="modal-overlay" id="addModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2>Add New Vehicle</h2>
        <button class="modal-close" onclick="closeModal('addModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Registration Number</label>
          <input id="regInput" type="text" placeholder="e.g. MH 04 AB 1234" maxlength="20"
            oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="form-group">
          <label>Owner Name</label>
          <input id="ownerInput" type="text" placeholder="Full name as on RC">
        </div>
        <div class="form-group">
          <label>Vehicle Type</label>
          <div class="select-wrap">
            <select id="typeSelect">
              <option value="">Select type</option>
              <option>2 Wheeler</option>
              <option>4 Wheeler</option>
              <option>Commercial Vehicle</option>
              <option>Electric Vehicle</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <input id="mobileInput" type="tel" placeholder="10-digit mobile number" maxlength="10">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" style="flex:.45" onclick="closeModal('addModal')">Cancel</button>
        <button class="btn btn-solid" onclick="addVehicle()">Add Vehicle</button>
      </div>
    </div>
  </div>

  <!-- ── Error Detail Modal ── -->
  <div class="modal-overlay" id="errorModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2>⚠ Vehicle Errors</h2>
        <button class="modal-close" onclick="closeModal('errorModal')">✕</button>
      </div>
      <div class="error-list" id="errorList"></div>
    </div>
  </div>

  <!-- ── Pay Fees Modal ── -->
  <div class="modal-overlay" id="payModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2>Pay Fees</h2>
        <button class="modal-close" onclick="closeModal('payModal')">✕</button>
      </div>
      <div class="fee-summary" id="feeSummary"></div>
      <div class="modal-footer" style="margin-top:4px">
        <button class="btn btn-outline" style="flex:.45" onclick="closeModal('payModal')">Cancel</button>
        <button class="btn btn-solid" onclick="processPayment()">Pay Now</button>
      </div>
    </div>
  </div>

  <!-- ── Notifications Modal ── -->
  <div class="modal-overlay" id="notifModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2>Notifications</h2>
        <button class="modal-close" onclick="closeModal('notifModal'); clearNotifDot()">✕</button>
      </div>
      <div class="notif-list" id="notifList"></div>
    </div>
  </div>

  <!-- ── Support Modal ── -->
  <div class="modal-overlay" id="supportModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2>Help & Support</h2>
        <button class="modal-close" onclick="closeModal('supportModal')">✕</button>
      </div>
      <div class="support-links">
        <button class="support-link" onclick="supportAction('Call us: 1800-XXX-XXXX')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path
              d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.88 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.79 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17z" />
          </svg>
          Call Support
        </button>
        <button class="support-link" onclick="supportAction('Email: support@parivahan.in')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
          Email Support
        </button>
        <button class="support-link" onclick="supportAction('Opening FAQ...')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
          FAQs
        </button>
        <button class="support-link" onclick="supportAction('Raising a ticket...')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
          Raise a Ticket
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── State ──
    let vehicles = [
      {
        id: 1,
        plate: "MH 04 AB 1234",
        owner: "Amol Sawant",
        mobile: "7387654321",
        type: "4 Wheeler",
        errors: [
          { title: "Insurance Expired", desc: "Vehicle insurance policy expired on 12 March 2024. Renew immediately to avoid penalty." },
          { title: "Pending Tax", desc: "Road tax payment of ₹2,450 is overdue since January 2024." }
        ],
        fees: [
          { label: "Road Tax", amount: 2450 },
          { label: "Late Fee", amount: 200 },
          { label: "Insurance (1 year)", amount: 3800 }
        ]
      }
    ];

    // ── Render ──
    function render() {
      const list = document.getElementById('vehicleList');
      const payBtn = document.getElementById('payFeesBtn');

      if (vehicles.length === 0) {
        list.innerHTML = `
        <div class="empty-state">
          <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="3" width="15" height="13" rx="2"/>
            <path d="M16 8h4l3 3v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
          <p>No vehicles added yet.<br>Tap <strong>+ Another Vehicle</strong> to get started.</p>
        </div>`;
        payBtn.disabled = true;
        return;
      }

      const totalFees = vehicles.reduce((sum, v) =>
        sum + (v.fees || []).reduce((s, f) => s + f.amount, 0), 0);
      payBtn.disabled = totalFees === 0;

      list.innerHTML = vehicles.map((v, i) => {
        const errCount = v.errors.length;
        const badge = errCount > 0
          ? `<span class="error-badge" onclick="event.stopPropagation(); openErrors(${i})">${errCount} Error${errCount > 1 ? 's' : ''}</span>`
          : `<span class="success-badge">✓ OK</span>`;

        return `
        <div class="vehicle-card" onclick="openErrors(${i})" style="animation-delay:${i * 0.07}s">
          <div class="card-left">
            <div class="plate-number">${v.plate}</div>
            <div class="card-meta">
              <span>👤 ${v.owner}</span>
              <span>📱 ${v.mobile}</span>
              <span>🚗 ${v.type}</span>
            </div>
          </div>
          ${badge}
        </div>`;
      }).join('');
    }

    // ── Add Vehicle ──
    function openAddVehicle() { openModal('addModal'); }

    function addVehicle() {
      const reg = document.getElementById('regInput').value.trim();
      const owner = document.getElementById('ownerInput').value.trim();
      const type = document.getElementById('typeSelect').value;
      const mobile = document.getElementById('mobileInput').value.trim();

      if (!reg) { showToast('Enter registration number'); return; }
      if (!owner) { showToast('Enter owner name'); return; }
      if (!type) { showToast('Select vehicle type'); return; }
      if (!/^\d{10}$/.test(mobile)) { showToast('Enter valid 10-digit mobile'); return; }
      if (vehicles.find(v => v.plate.replace(/\s/g, '') === reg.replace(/\s/g, ''))) {
        showToast('Vehicle already added'); return;
      }

      vehicles.push({ id: Date.now(), plate: reg, owner, mobile, type, errors: [], fees: [] });
      closeModal('addModal');
      clearForm();
      render();
      showToast('✓ Vehicle added successfully');
    }

    function clearForm() {
      ['regInput', 'ownerInput', 'mobileInput'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('typeSelect').value = '';
    }

    // ── Errors ──
    function openErrors(idx) {
      const v = vehicles[idx];
      const el = document.getElementById('errorList');
      if (v.errors.length === 0) {
        el.innerHTML = `<div style="padding:20px 0;text-align:center;color:var(--text-sub);font-size:.9rem;">✅ No errors found for this vehicle.</div>`;
      } else {
        el.innerHTML = v.errors.map(e => `
        <div class="error-item">
          <div class="error-item-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            ${e.title}
          </div>
          <div class="error-item-desc">${e.desc}</div>
        </div>`).join('');
      }
      openModal('errorModal');
    }

    // ── Pay Fees ──
    function openPayFees() {
      const allFees = vehicles.flatMap(v =>
        (v.fees || []).map(f => ({ ...f, plate: v.plate }))
      );
      if (allFees.length === 0) { showToast('No pending fees'); return; }

      const total = allFees.reduce((s, f) => s + f.amount, 0);
      const el = document.getElementById('feeSummary');
      el.innerHTML = allFees.map(f => `
      <div class="fee-row">
        <span class="fee-label">${f.label} <span style="font-size:.78rem;color:#9ca3af">(${f.plate})</span></span>
        <span class="fee-amount red">₹${f.amount.toLocaleString('en-IN')}</span>
      </div>`).join('') + `
      <div class="fee-row">
        <span class="fee-label">Total Payable</span>
        <span class="fee-amount">₹${total.toLocaleString('en-IN')}</span>
      </div>`;

      openModal('payModal');
    }

    function processPayment() {
      closeModal('payModal');
      vehicles = vehicles.map(v => ({ ...v, errors: [], fees: [] }));
      render();
      showToast('✓ Payment successful! All dues cleared.');
    }

    // ── Notifications ──
    const notifications = [
      { icon: '⚠️', text: 'Vehicle insurance for MH 04 AB 1234 expired. Please renew.', time: '2 hrs ago' },
      { icon: '💰', text: 'Road tax overdue. Pay before 31st May to avoid penalty.', time: '1 day ago' },
      { icon: '✅', text: 'RC details successfully verified for MH 04 AB 1234.', time: '3 days ago' },
    ];

    function openNotifications() {
      const el = document.getElementById('notifList');
      el.innerHTML = notifications.map(n => `
      <div class="notif-item">
        <span class="notif-icon">${n.icon}</span>
        <div>
          <div>${n.text}</div>
          <div class="notif-time">${n.time}</div>
        </div>
      </div>`).join('');
      openModal('notifModal');
    }

    function clearNotifDot() {
      document.getElementById('notifDot').style.display = 'none';
    }

    // ── Support ──
    function openSupport() { openModal('supportModal'); }
    function supportAction(msg) { closeModal('supportModal'); showToast(msg); }

    // ── Back ──
    function goBack() { showToast('← Navigating back...'); }

    // ── Modal helpers ──
    function openModal(id) {
      document.getElementById(id).classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
      document.body.style.overflow = '';
    }

    // Close modal on overlay click
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target === el) { el.classList.remove('open'); document.body.style.overflow = ''; }
      });
    });

    // ── Toast ──
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
    }

    // ── Init ──
    render();
  </script>
</body>

</html>
