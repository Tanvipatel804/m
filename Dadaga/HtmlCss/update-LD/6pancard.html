<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Capture PAN Card</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      background: #1c1c2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }

    .phone {
      width: 100%;
      max-width: 390px;
      min-height: 100dvh;
      max-height: 844px;
      background: #111;
      border-radius: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.7);
      position: relative;
    }

    @media (max-width: 430px) {
      .phone {
        border-radius: 0;
        max-height: 100dvh;
      }

      html,
      body {
        background: #111;
      }
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px 8px;
      background: #fff;
      flex-shrink: 0;
    }

    .status-time {
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #111;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      color: #111;
    }

    .cam-pill {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #22C55E;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      background: #fff;
      border-bottom: 1px solid #E5E7EB;
      flex-shrink: 0;
      position: relative;
    }

    .back-btn {
      position: absolute;
      left: 12px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #111;
      font-size: 26px;
      font-weight: 300;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .back-btn:hover {
      background: #F3F4F6;
    }

    .top-title {
      flex: 1;
      text-align: center;
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #111;
    }

    /* ── Viewfinder ── */
    .viewfinder-wrap {
      flex: 0 0 auto;
      background: #2e2e2e;
      width: 100%;
      aspect-ratio: 16/9;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .cam-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #d4c9b8 0%, #cbbfa8 35%, #ddd5c2 60%, #c8baa5 100%);
    }

    /* subtle crease lines */
    .cam-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(80deg, transparent 60%, rgba(255, 255, 255, 0.06) 61%, transparent 62%),
        linear-gradient(100deg, transparent 40%, rgba(0, 0, 0, 0.04) 41%, transparent 42%);
    }

    /* live video */
    #videoEl {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    /* captured image */
    #capturedImg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    /* frame overlay */
    .frame-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .frame-box {
      position: relative;
      width: 84%;
      aspect-ratio: 85/54;
    }

    .corner {
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: #F97316;
      border-style: solid;
    }

    .corner.tl {
      top: 0;
      left: 0;
      border-width: 3px 0 0 3px;
    }

    .corner.tr {
      top: 0;
      right: 0;
      border-width: 3px 3px 0 0;
    }

    .corner.bl {
      bottom: 0;
      left: 0;
      border-width: 0 0 3px 3px;
    }

    .corner.br {
      bottom: 0;
      right: 0;
      border-width: 0 3px 3px 0;
    }

    /* scan line */
    .scan-line {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent 0%, #F97316 50%, transparent 100%);
      animation: scan 2.6s ease-in-out infinite;
      opacity: 0.75;
    }

    @keyframes scan {
      0% {
        left: 2px;
        opacity: 0;
      }

      10% {
        opacity: 0.75;
      }

      90% {
        opacity: 0.75;
      }

      100% {
        left: calc(100% - 2px);
        opacity: 0;
      }
    }

    /* ── Lower dark section ── */
    .lower-section {
      flex: 1;
      background: #1f1f1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 20px 16px;
      gap: 14px;
      overflow-y: auto;
    }

    .lower-section::-webkit-scrollbar {
      width: 0;
    }

    .sample-label {
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
    }

    /* ── PAN Card ── */
    .pan-card {
      width: 100%;
      max-width: 310px;
      background: linear-gradient(135deg, #7b8fa8 0%, #a0b4cc 30%, #b8cce0 55%, #8fa8c0 80%, #6b8098 100%);
      border-radius: 14px;
      overflow: hidden;
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
    }

    /* Top row: आयकर / emblem / भारत सरकार */
    .pan-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .pan-dept {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .pan-dept-hi {
      font-size: 11px;
      font-weight: 700;
      color: #1a1a1a;
      font-family: 'DM Sans', sans-serif;
    }

    .pan-dept-en {
      font-size: 7.5px;
      font-weight: 600;
      color: #2a2a2a;
      letter-spacing: 0.5px;
      font-family: 'DM Sans', sans-serif;
    }

    .pan-emblem {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pan-govt {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .pan-govt-hi {
      font-size: 11px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .pan-govt-en {
      font-size: 7.5px;
      font-weight: 600;
      color: #2a2a2a;
      letter-spacing: 0.3px;
    }

    /* Middle: QR + PAN number + photo/box */
    .pan-middle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 2px;
      position: relative;
    }

    .pan-qr {
      width: 42px;
      height: 42px;
      background: rgba(255, 255, 255, 0.35);
      border-radius: 4px;
      padding: 3px;
      flex-shrink: 0;
    }

    .pan-qr-inner {
      width: 100%;
      height: 100%;
      background:
        repeating-linear-gradient(0deg, #333 0, #333 2px, transparent 2px, transparent 5px),
        repeating-linear-gradient(90deg, #333 0, #333 2px, transparent 2px, transparent 5px);
      background-size: 5px 5px;
      border-radius: 2px;
    }

    .pan-number-wrap {
      flex: 1;
      text-align: center;
      position: relative;
    }

    .pan-number {
      font-size: 14px;
      font-weight: 800;
      color: #111;
      letter-spacing: 2px;
      font-family: 'Sora', sans-serif;
    }

    /* SAMPLE stamp */
    .sample-stamp {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-10deg);
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      width: 52px;
      height: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      background: rgba(255, 255, 255, 0.12);
      z-index: 2;
    }

    .stamp-stars {
      font-size: 7px;
      color: #fff;
      letter-spacing: 2px;
    }

    .stamp-text {
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1.5px;
    }

    /* Photo placeholder box */
    .pan-photo-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }

    .pan-photo-box {
      width: 42px;
      height: 32px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pan-photo-box svg {
      opacity: 0.5;
    }

    /* Bottom row: data lines + signature + person icon */
    .pan-bottom {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .pan-data-lines {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .pan-line {
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.3);
    }

    .pl-full {
      width: 85%;
    }

    .pl-med {
      width: 65%;
    }

    .pl-short {
      width: 45%;
    }

    .pan-sig {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .sig-line {
      font-size: 18px;
      color: #1a1a1a;
      font-style: italic;
      font-family: serif;
      transform: rotate(-5deg);
      margin-bottom: 2px;
      line-height: 1;
    }

    .sig-label {
      font-size: 6px;
      color: #2a2a2a;
      letter-spacing: 0.3px;
      font-weight: 600;
    }

    .pan-person {
      width: 36px;
      height: 44px;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    /* ── Camera controls ── */
    .cam-controls {
      background: #111;
      padding: 14px 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-shrink: 0;
    }

    .gallery-btn {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: #333;
      border: 2px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .gallery-btn:hover {
      border-color: #aaa;
    }

    .shutter-btn {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid #888;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s, background 0.12s;
    }

    .shutter-btn:active {
      transform: scale(0.92);
      background: #ccc;
    }

    .shutter-inner {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #bbb;
    }

    .ctrl-right {
      width: 46px;
      height: 46px;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      height: 52px;
      border-top: 1px solid #E5E7EB;
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: #fff;
      flex-shrink: 0;
    }

    .nav-sq {
      width: 22px;
      height: 22px;
      border: 2px solid #374151;
      border-radius: 3px;
      cursor: pointer;
    }

    .nav-circ {
      width: 24px;
      height: 24px;
      border: 2px solid #374151;
      border-radius: 50%;
      cursor: pointer;
    }

    .nav-tri {
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-right: 18px solid #374151;
      cursor: pointer;
    }

    /* ── Flash ── */
    .flash {
      position: absolute;
      inset: 0;
      z-index: 99;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.07s;
      border-radius: inherit;
    }

    .flash.snap {
      opacity: 1;
    }

    /* ── Banner ── */
    .banner {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(34, 197, 94, 0.95);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 22px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 50;
    }

    .banner.show {
      opacity: 1;
    }

    .retake-btn {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 22px;
      border-radius: 30px;
      white-space: nowrap;
      cursor: pointer;
      z-index: 50;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      display: none;
      font-family: 'DM Sans', sans-serif;
    }

    .retake-btn:hover {
      background: rgba(0, 0, 0, 0.85);
    }
  </style>
</head>

<body>

    <div class="banner" id="banner">✓ PAN Card (Front) Captured!</div>
    <button class="retake-btn" id="retakeBtn" onclick="retake()">↺ Retake</button>

    <!-- Top bar -->

      <div class="back-btn" onclick="stopCamera(); window.history.back();">&#8249;</div>
      <span class="top-title">Capture PAN Card (Front Side)</span>
    </div>

    <!-- Viewfinder -->
    <div class="viewfinder-wrap">
      <div class="cam-bg" id="camBg"></div>
      <video id="videoEl" autoplay playsinline muted></video>
      <img id="capturedImg" alt="Captured PAN">
      <div class="frame-overlay">
        <div class="frame-box">
          <div class="corner tl"></div>

              <line x1="30" y1="20" x2="30" y2="40" stroke="#1a3a6b" stroke-width="1" />
              <line x1="20" y1="30" x2="40" y2="30" stroke="#1a3a6b" stroke-width="1" />
              <line x1="23" y1="23" x2="37" y2="37" stroke="#1a3a6b" stroke-width="0.8" />
              <line x1="37" y1="23" x2="23" y2="37" stroke="#1a3a6b" stroke-width="0.8" />

        <input type="file" id="galleryInput" accept="image/*" style="display:none" onchange="handleGallery(this)">

  <script>
    let stream = null;
    let captured = false;

    async function startCamera() {
      const videoEl = document.getElementById('videoEl');
      const camBg = document.getElementById('camBg');
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 800 } },
          audio: false
        });
        videoEl.srcObject = stream;
        videoEl.style.display = 'block';
        camBg.style.display = 'none';
      } catch (e) {
        console.log('Camera unavailable, using simulated feed.');
      }
    }

    function stopCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    }

    function capturePhoto() {
      if (captured) return;
      const flash = document.getElementById('flash');
      const banner = document.getElementById('banner');
      const retake = document.getElementById('retakeBtn');
      const videoEl = document.getElementById('videoEl');
      const capImg = document.getElementById('capturedImg');
      const camBg = document.getElementById('camBg');
      const scanLine = document.getElementById('scanLine');

      flash.classList.add('snap');
      setTimeout(() => flash.classList.remove('snap'), 160);

      if (stream && videoEl.style.display !== 'none') {
        const canvas = document.createElement('canvas');
        canvas.width = videoEl.videoWidth || 800;
        canvas.height = videoEl.videoHeight || 500;
        canvas.getContext('2d').drawImage(videoEl, 0, 0);
        capImg.src = canvas.toDataURL('image/jpeg', 0.92);
        capImg.style.display = 'block';
        videoEl.style.display = 'none';
      } else {
        scanLine.style.animationPlayState = 'paused';
        camBg.style.filter = 'brightness(0.85)';
        setTimeout(() => {
          scanLine.style.animationPlayState = 'running';
          camBg.style.filter = '';
        }, 900);
      }

      captured = true;
      banner.classList.add('show');
      setTimeout(() => {
        banner.classList.remove('show');
        retake.style.display = 'block';
      }, 1800);
    }

    function retake() {
      const videoEl = document.getElementById('videoEl');
      const capImg = document.getElementById('capturedImg');
      const camBg = document.getElementById('camBg');
      const retake = document.getElementById('retakeBtn');
      capImg.src = ''; capImg.style.display = 'none';
      retake.style.display = 'none';
      captured = false;
      if (stream) { videoEl.style.display = 'block'; camBg.style.display = 'none'; }
      else { camBg.style.display = 'block'; }
    }

    function openGallery() { document.getElementById('galleryInput').click(); }

    function handleGallery(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const capImg = document.getElementById('capturedImg');
        const videoEl = document.getElementById('videoEl');
        const camBg = document.getElementById('camBg');
        const retake = document.getElementById('retakeBtn');
        const banner = document.getElementById('banner');
        capImg.src = e.target.result;
        capImg.style.display = 'block';
        videoEl.style.display = 'none';
        camBg.style.display = 'none';
        captured = true;
        banner.textContent = '✓ Image Selected!';
        banner.classList.add('show');
        setTimeout(() => {
          banner.classList.remove('show');
          banner.textContent = '✓ PAN Card (Front) Captured!';
          retake.style.display = 'block';
        }, 1800);
      };
      reader.readAsDataURL(input.files[0]);
    }

    window.addEventListener('load', startCamera);
    window.addEventListener('beforeunload', stopCamera);
  </script>

</body>

</html>
