<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vehicle Details</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #1A56DB;
      --blue-dark: #1447B4;
      --blue-bg: #EBF2FF;
      --green: #16A34A;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --dark: #111827;
      --red: #EF4444;
      --white: #FFFFFF;
    }

    html,
    body {
      min-height: 100%;
      background: #1c1c2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }

    .phone {
      width: 100%;
      /* max-width: 390px; */
      min-height: 100dvh;
      max-height: 844px;
      background: #F3F4F6;
      border-radius: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.55);
      position: absolute;
    }

    @media (max-width: 430px) {
      .phone {
        border-radius: 0;
        max-height: 100dvh;
      }

      html,
      body {
        background: #F3F4F6;
      }
    }

    /* ── Status bar ── */


    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
      position: relative;
    }

    .back-btn {
      position: absolute;
      left: 12px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--dark);
      font-size: 26px;
      font-weight: 300;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .back-btn:hover {
      background: var(--gray-100);
    }

    .top-title {
      flex: 1;
      text-align: left;
      padding-left: 34px;
      font-family: 'Sora', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
    }

    .headset-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--dark);
      border-radius: 50%;
      transition: background 0.15s;
    }

    .headset-btn:hover {
      background: var(--gray-100);
    }

    /* ── Stepper ── */
    .stepper {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 24px 16px;
      background: #fff;
      flex-shrink: 0;
      gap: 0;
      border-bottom: 1px solid var(--gray-200);
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .step-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
      position: relative;
      z-index: 1;
    }

    /* Step 1 done — blue filled with checkmark */
    .step.done .step-circle {
      background: var(--blue);
      color: #fff;
      border: none;
    }

    /* Step 2 active — blue outline */
    .step.active .step-circle {
      border: 2.5px solid var(--blue);
      color: var(--blue);
      background: #fff;
    }

    /* Step 3 inactive */
    .step.inactive .step-circle {
      border: 2px solid var(--gray-400);
      color: var(--gray-400);
      background: #fff;
    }

    .step-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-500);
    }

    .step.done .step-label {
      color: var(--blue);
    }

    .step.active .step-label {
      color: var(--blue);
      font-weight: 700;
    }

    .step-line {
      flex: 1;
      height: 2px;
      margin-top: 17px;
      background-image: repeating-linear-gradient(to right, var(--gray-300, #D1D5DB) 0, var(--gray-300, #D1D5DB) 5px, transparent 5px, transparent 10px);
    }

    .step-line.solid {
      background-image: none;
      background: var(--blue);
    }

    /* ── Scrollable body ── */
    .body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 110px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .body::-webkit-scrollbar {
      width: 0;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .req {
      color: var(--red);
      font-size: 15px;
    }

    /* ── Input card ── */
    .input-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-card:focus-within {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.09);
    }

    .input-card.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.09);
    }

    .text-input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      background: transparent;
      text-transform: uppercase;
    }

    .text-input::placeholder {
      color: var(--gray-400);
      text-transform: none;
      font-weight: 400;
    }

    /* ── Vehicle RC card ── */
    .rc-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .rc-card:hover {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.07);
    }

    .rc-card.uploaded {
      border-color: var(--green);
    }

    .rc-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .rc-status {
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
      margin-top: 3px;
      display: none;
    }

    .rc-status.show {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .upload-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--blue);
      font-size: 14px;
      font-weight: 700;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .upload-btn:hover {
      background: var(--blue-bg);
    }

    /* ── City dropdown ── */
    .city-section {
      margin-bottom: 20px;
    }

    .dropdown-wrap {
      position: relative;
    }

    .dropdown-btn {
      width: 100%;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .dropdown-btn:hover {
      border-color: var(--blue);
    }

    .dropdown-btn.open {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.09);
      border-radius: 10px 10px 0 0;
    }

    .dropdown-btn.error {
      border-color: var(--red);
    }

    .dropdown-text {
      font-size: 15px;
      color: var(--gray-400);
      font-weight: 400;
    }

    .dropdown-text.selected {
      color: var(--dark);
      font-weight: 600;
    }

    .dropdown-arrow {
      color: var(--gray-500);
      transition: transform 0.25s ease;
      flex-shrink: 0;
    }

    .dropdown-arrow.open {
      transform: rotate(180deg);
    }

    .dropdown-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid var(--blue);
      border-top: none;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      z-index: 20;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
      overflow-y: auto;
    }

    .dropdown-list.open {
      max-height: 220px;
    }

    .dropdown-item {
      padding: 13px 16px;
      font-size: 14px;
      color: var(--dark);
      font-weight: 500;
      cursor: pointer;
      border-bottom: 1px solid var(--gray-100);
      transition: background 0.12s;
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .dropdown-item:hover {
      background: var(--blue-bg);
      color: var(--blue);
    }

    .dropdown-item.selected {
      color: var(--blue);
      font-weight: 700;
      background: var(--blue-bg);
    }

    /* ── Submit bar ── */
    .bottom-bar {
      position: absolute;
      bottom: 52px;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #F3F4F6 80%, transparent);
      padding: 10px 16px 12px;
    }

    .btn-submit {
      width: 100%;
      padding: 17px;
      border: none;
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
      background: var(--gray-200);
      color: var(--gray-500);
      box-shadow: none;
    }

    .btn-submit.active {
      background: linear-gradient(135deg, #2563EB 0%, #1447B4 100%);
      color: #fff;
      box-shadow: 0 6px 22px rgba(26, 86, 219, 0.35);
    }

    .btn-submit.active:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(26, 86, 219, 0.44);
    }

    .btn-submit.active:active {
      transform: scale(0.97);
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 52px;
      border-top: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: #fff;
    }

    .nav-sq {
      width: 22px;
      height: 22px;
      border: 2px solid var(--gray-700);
      border-radius: 3px;
      cursor: pointer;
    }

    .nav-circ {
      width: 24px;
      height: 24px;
      border: 2px solid var(--gray-700);
      border-radius: 50%;
      cursor: pointer;
    }

    .nav-tri {
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-right: 18px solid var(--gray-700);
      cursor: pointer;
    }

    /* ── Toast ── */
    .toast {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 50;
    }

    .toast.show {
      opacity: 1;
    }

    /* Success overlay */
    .success-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 60;
      background: rgba(22, 163, 74, 0.96);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      border-radius: inherit;
    }

    .success-overlay.show {
      display: flex;
      animation: flashIn 0.35s ease;
    }

    @keyframes flashIn {
      from {
        opacity: 0;
        transform: scale(0.95)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    .success-overlay p {
      font-family: 'Sora', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .success-overlay span {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>

    <!-- Top bar -->
    <div class="top-bar">
      <div class="back-btn" onclick="window.history.back()">&#8249;</div>
      <span class="top-title">Vehicle Details</span>
      <div class="headset-btn" onclick="showToast('Support coming soon')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

          <path d="M3 18v-6a9 9 0 0 1 18 0v6" />
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z" />
          <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" />
        </svg>
      </div>
    </div>

    <!-- Stepper -->
    <div class="stepper">
      <!-- Step 1: Done -->
      <div class="step done">
        <div class="step-circle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </div>

      </div>

      <div class="step-line solid"></div>

      <!-- Step 2: Active -->
      <div class="step active">
        <div class="step-circle">2</div>
        <span class="step-label">Vehicle</span>
      </div>

      <div class="step-line"></div>

      <!-- Step 3: Inactive -->
      <div class="step inactive">
        <div class="step-circle">3</div>
        <span class="step-label">Driver</span>
      </div>
    </div>

    <!-- Scrollable body -->
    <div class="body">

      <!-- Vehicle Number -->
      <p class="section-label">Vehicle Number <span class="req">*</span></p>
      <div class="input-card" id="vehicleNumCard">
        <input class="text-input" type="text" id="vehicleNum" placeholder="Vehicle Number" maxlength="11"
          oninput="handleVehicleInput(this); checkForm()" />
      </div>

      <!-- Vehicle RC -->
      <div class="rc-card" id="rcCard" onclick="triggerRCUpload()">
        <div>
          <div class="rc-title">Vehicle RC</div>
          <div class="rc-status" id="rcStatus">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"

            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
            <circle cx="12" cy="13" r="4" />
          </svg>
          Upload
        </button>
        <input type="file" id="rcInput" accept="image/*,.pdf" style="display:none" onchange="handleRCUpload(this)">
      </div>

      <!-- City of operation -->
      <div class="city-section">
        <p class="section-label">Select the city of operation</p>
        <div class="dropdown-wrap">
          <div class="dropdown-btn" id="dropdownBtn" onclick="toggleDropdown()">
            <span class="dropdown-text" id="dropdownText">Select the city of operation</span>
            <svg class="dropdown-arrow" id="dropdownArrow" width="18" height="18" viewBox="0 0 24 24" fill="none"

            <div class="dropdown-item" onclick="selectCity('Kolkata')">Kolkata</div>
            <div class="dropdown-item" onclick="selectCity('Pune')">Pune</div>
            <div class="dropdown-item" onclick="selectCity('Ahmedabad')">Ahmedabad</div>
            <div class="dropdown-item" onclick="selectCity('Jaipur')">Jaipur</div>
            <div class="dropdown-item" onclick="selectCity('Surat')">Surat</div>
            <div class="dropdown-item" onclick="selectCity('Lucknow')">Lucknow</div>
            <div class="dropdown-item" onclick="selectCity('Chandigarh')">Chandigarh</div>
          </div>
        </div>

    </div>

  <script>
    let rcUploaded = false;
    let citySelected = '';
    let dropdownOpen = false;

    // ── Vehicle number: auto-format like MH01AB1234
    function handleVehicleInput(el) {
      let val = el.value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
      el.value = val;
      checkForm();
    }

    // ── RC upload ──
    function triggerRCUpload() {
      document.getElementById('rcInput').click();
    }

    function handleRCUpload(input) {
      if (!input.files || !input.files[0]) return;
      rcUploaded = true;
      const card = document.getElementById('rcCard');
      const status = document.getElementById('rcStatus');
      const btn = document.getElementById('uploadBtn');
      card.classList.add('uploaded');
      status.classList.add('show');
      btn.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Change`;
      const name = input.files[0].name;
      showToast(name.length > 22 ? name.slice(0, 22) + '…' : name + ' uploaded');
      checkForm();
    }

    // ── Dropdown ──
    function toggleDropdown() {
      dropdownOpen = !dropdownOpen;
      document.getElementById('dropdownList').classList.toggle('open', dropdownOpen);
      document.getElementById('dropdownBtn').classList.toggle('open', dropdownOpen);
      document.getElementById('dropdownArrow').classList.toggle('open', dropdownOpen);
    }

    function selectCity(city) {
      citySelected = city;
      const text = document.getElementById('dropdownText');
      text.textContent = city;
      text.classList.add('selected');
      // mark selected
      document.querySelectorAll('.dropdown-item').forEach(i => {
        i.classList.toggle('selected', i.textContent === city);
      });
      toggleDropdown();
      checkForm();
    }

    // Close dropdown on outside click
    document.addEventListener('click', (e) => {
      const wrap = document.querySelector('.dropdown-wrap');
      if (wrap && !wrap.contains(e.target) && dropdownOpen) toggleDropdown();
    });

    // ── Form validation & submit button activation ──
    function checkForm() {
      const vehicleNum = document.getElementById('vehicleNum').value.trim();
      const valid = vehicleNum.length >= 5 && rcUploaded && citySelected !== '';
      document.getElementById('submitBtn').classList.toggle('active', valid);
    }

    function handleSubmit() {
      const vehicleNum = document.getElementById('vehicleNum').value.trim();
      let valid = true;

      if (vehicleNum.length < 5) {
        const card = document.getElementById('vehicleNumCard');
        card.classList.add('error');
        setTimeout(() => card.classList.remove('error'), 2000);
        valid = false;
      }
      if (!rcUploaded) {
        const rc = document.getElementById('rcCard');
        rc.style.borderColor = '#EF4444';
        rc.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.09)';
        setTimeout(() => { rc.style.borderColor = ''; rc.style.boxShadow = ''; }, 2000);
        valid = false;
      }
      if (!citySelected) {
        const btn = document.getElementById('dropdownBtn');
        btn.classList.add('error');
        setTimeout(() => btn.classList.remove('error'), 2000);
        valid = false;
      }
      if (!valid) { showToast('Please fill all required fields'); return; }

      document.getElementById('successOverlay').classList.add('show');
      setTimeout(() => document.getElementById('successOverlay').classList.remove('show'), 2200);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>

</body>
