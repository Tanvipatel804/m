<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruckUp - Driver Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            padding: 10px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            color: white;
            display: flex;
            align-items: center;
        }
        .header h1 { font-size: 1.4rem; }

        /* ── Trip card: 3 columns ── */
        .trip-card {
            background: white;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            transition: all 0.2s;
            border-left: 4px solid #ddd;
            display: grid;
            grid-template-columns: 100px 1fr 130px;
            gap: 14px;
            align-items: center;
        }
        .trip-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transform: translateX(2px);
        }
        .trip-card.single    { border-left-color: #f093fb; }
        .trip-card.allotment { border-left-color: #4facfe; }
        .trip-card.contract  { border-left-color: #43e97b; }
        .trip-card.return    { border-left-color: #ffa94d; }

        /* ── LEFT: type label → SVG image → dimensions ── */
        .vehicle-compact {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .truck-model-name {
            font-size: 0.62rem;
            font-weight: 800;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            text-align: center;
        }

        .vehicle-compact svg {
            width: 96px;
            height: 54px;
        }

        .truck-dims {
            font-size: 0.62rem;
            font-weight: 600;
            color: #aaa;
            text-align: center;
        }

        /* ── MIDDLE ── */
        .trip-middle {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .price-badge-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-compact {
            font-size: 1.45rem;
            font-weight: 800;
            color: #2c3e50;
            line-height: 1;
        }

        .badge-mini {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            color: white;
            white-space: nowrap;
        }
        .badge-single    { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .badge-allotment { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .badge-contract  { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a5c38; }
        .badge-return    { background: linear-gradient(135deg, #ffa94d, #ff6b35); }

        /* Route: pickup — [centered duration] — dropoff */
        .route-stack {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .route-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.78rem;
        }
        .route-item .r-icon { font-size: 0.82rem; width: 16px; flex-shrink: 0; }
        .route-item .location { font-weight: 700; color: #2c3e50; }
        .route-item .r-time  { color: #aaa; font-size: 0.7rem; margin-left: 5px; }

        /* connector line + centered duration pill */
        .route-connector {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 0 3px 7px;
        }
        .connector-line {
            width: 2px;
            height: 24px;
            background: #d0d0d0;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .duration-pill {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            color: #667eea;
            background: #f0f2ff;
            border: 1px solid #d0d6ff;
            padding: 2px 10px;
            border-radius: 10px;
        }

        /* Return trip styling - bidirectional route */
        .return-route-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .trip-direction {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .direction-label {
            font-size: 0.62rem;
            font-weight: 800;
            color: #ff8c42;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
            padding-left: 2px;
        }

        .return-separator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            margin: 2px 0;
        }

        .separator-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, #ffd4a3, #ffb366, #ffd4a3);
        }

        .separator-icon {
            font-size: 0.9rem;
            color: #ff8c42;
        }

        /* Contract middle */
        .contract-middle {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
        .contract-mini {
            background: #fffbf0;
            padding: 8px 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            border-left: 3px solid #ffc107;
        }
        .contract-mini .ctitle {
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .contract-mini .details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }
        .contract-mini .item { display: flex; flex-direction: column; gap: 1px; }
        .contract-mini .item-label {
            font-size: 0.62rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .contract-mini .item-value { font-weight: 700; color: #333; font-size: 0.73rem; }

        /* ── RIGHT: material block ── */
        .material-block {
            background: linear-gradient(160deg, #fff9e6 0%, #ffeab8 100%);
            padding: 9px 10px 8px;
            border-radius: 7px;
            border: 1px solid #ffd680;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            text-align: center;
        }

        /* photo box */
        .mat-photo-box {
            width: 54px;
            height: 46px;
            background: rgba(255,255,255,0.78);
            border-radius: 6px;
            border: 1px solid #ffc84a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            line-height: 1;
            margin-bottom: 3px;
        }

        .mat-divider {
            width: 72%;
            height: 1px;
            background: #ffd680;
            margin: 2px 0;
        }

        .mat-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
            width: 100%;
        }

        .mat-label {
            font-size: 0.56rem;
            font-weight: 700;
            color: #c08020;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .mat-value {
            font-size: 0.7rem;
            font-weight: 700;
            color: #333;
            line-height: 1.25;
        }

        .mat-kg {
            font-size: 0.72rem;
            font-weight: 800;
            color: #555;
            background: rgba(255,255,255,0.65);
            border: 1px solid #ffd27a;
            padding: 2px 10px;
            border-radius: 8px;
            margin-top: 2px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .trip-card { grid-template-columns: 90px 1fr; }
            .material-block { grid-column: 1 / 3; flex-direction: row; justify-content: center; gap: 12px; }
        }
        @media (max-width: 500px) {
            .trip-card { grid-template-columns: 1fr; }
            .material-block { grid-column: 1; flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>🚛 TruckUp - Available Trips</h1>
    </div>

    <div id="tripsContainer"></div>
</div>

<script>
/* ─────────────────────────────────────────
   Truck SVG generators — three distinct types
───────────────────────────────────────── */

// 1. Flatbed Truck — open flat platform, no side walls
function flatbedSVG(color) {
    return `<svg viewBox="0 0 220 110" xmlns="http://www.w3.org/2000/svg">
        <!-- chassis frame -->
        <rect x="10" y="66" width="196" height="7" fill="#444" rx="2"/>
        <!-- flatbed platform -->
        <rect x="58" y="54" width="146" height="13" fill="${color}" rx="2"/>
        <!-- platform edge highlight -->
        <rect x="58" y="54" width="146" height="3" fill="rgba(255,255,255,0.2)" rx="1"/>
        <!-- support beams under bed -->
        <rect x="80"  y="63" width="5" height="5" fill="${color}" rx="1"/>
        <rect x="130" y="63" width="5" height="5" fill="${color}" rx="1"/>
        <rect x="180" y="63" width="5" height="5" fill="${color}" rx="1"/>
        <!-- cab body -->
        <rect x="10" y="34" width="52" height="34" fill="${color}" rx="4"/>
        <!-- cab roof curve -->
        <rect x="10" y="34" width="52" height="7" fill="rgba(255,255,255,0.15)" rx="3"/>
        <!-- windshield -->
        <rect x="16" y="38" width="28" height="18" fill="#aee6f7" rx="2" opacity="0.9"/>
        <!-- headlight -->
        <rect x="11" y="58" width="8" height="5" fill="#FFD700" rx="1"/>
        <!-- grille -->
        <rect x="11" y="46" width="5" height="10" fill="rgba(0,0,0,0.2)" rx="1"/>
        <!-- exhaust pipe -->
        <rect x="57" y="26" width="4" height="22" fill="#777" rx="2"/>
        <!-- rear dual wheels -->
        <circle cx="172" cy="81" r="13" fill="#222"/><circle cx="172" cy="81" r="6" fill="#555"/>
        <circle cx="190" cy="81" r="13" fill="#222"/><circle cx="190" cy="81" r="6" fill="#555"/>
        <!-- front wheel -->
        <circle cx="38"  cy="81" r="13" fill="#222"/><circle cx="38"  cy="81" r="6" fill="#555"/>
    </svg>`;
}

// 2. Container Truck — fully enclosed high-wall box
function containerSVG(color) {
    return `<svg viewBox="0 0 220 110" xmlns="http://www.w3.org/2000/svg">
        <!-- chassis -->
        <rect x="10" y="68" width="200" height="7" fill="#444" rx="2"/>
        <!-- container box body -->
        <rect x="58" y="25" width="148" height="45" fill="${color}" rx="3"/>
        <!-- container roof highlight -->
        <rect x="58" y="25" width="148" height="8" fill="rgba(255,255,255,0.2)" rx="2"/>
        <!-- vertical ribs -->
        <line x1="96"  y1="25" x2="96"  y2="70" stroke="rgba(0,0,0,0.13)" stroke-width="2"/>
        <line x1="134" y1="25" x2="134" y2="70" stroke="rgba(0,0,0,0.13)" stroke-width="2"/>
        <line x1="172" y1="25" x2="172" y2="70" stroke="rgba(0,0,0,0.13)" stroke-width="2"/>
        <!-- door lines on rear -->
        <line x1="198" y1="28" x2="198" y2="68" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        <line x1="188" y1="28" x2="188" y2="68" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
        <!-- cab body -->
        <rect x="10" y="35" width="52" height="35" fill="${color}" rx="4"/>
        <rect x="10" y="35" width="52" height="7" fill="rgba(255,255,255,0.15)" rx="3"/>
        <!-- windshield -->
        <rect x="16" y="39" width="28" height="19" fill="#aee6f7" rx="2" opacity="0.9"/>
        <!-- headlight -->
        <rect x="11" y="60" width="8" height="5" fill="#FFD700" rx="1"/>
        <!-- grille -->
        <rect x="11" y="47" width="5" height="11" fill="rgba(0,0,0,0.2)" rx="1"/>
        <!-- exhaust -->
        <rect x="57" y="22" width="4" height="24" fill="#777" rx="2"/>
        <!-- rear dual wheels -->
        <circle cx="170" cy="83" r="13" fill="#222"/><circle cx="170" cy="83" r="6" fill="#555"/>
        <circle cx="188" cy="83" r="13" fill="#222"/><circle cx="188" cy="83" r="6" fill="#555"/>
        <!-- front wheel -->
        <circle cx="38"  cy="83" r="13" fill="#222"/><circle cx="38"  cy="83" r="6" fill="#555"/>
    </svg>`;
}

// 3. Open-Box Truck — box with visible open top, side walls, no roof
function openBoxSVG(color) {
    return `<svg viewBox="0 0 220 110" xmlns="http://www.w3.org/2000/svg">
        <!-- chassis -->
        <rect x="10" y="68" width="200" height="7" fill="#444" rx="2"/>
        <!-- box floor -->
        <rect x="58" y="57" width="148" height="12" fill="${color}" rx="1"/>
        <!-- left (front) wall -->
        <rect x="58" y="32" width="7" height="27" fill="${color}" rx="1"/>
        <!-- right (rear) wall -->
        <rect x="199" y="32" width="7" height="27" fill="${color}" rx="1"/>
        <!-- top rail / rim -->
        <rect x="58" y="30" width="148" height="6" fill="${color}" rx="2"/>
        <!-- top rail highlight -->
        <rect x="58" y="30" width="148" height="3" fill="rgba(255,255,255,0.25)" rx="1"/>
        <!-- inner floor shadow -->
        <rect x="65" y="42" width="134" height="16" fill="rgba(0,0,0,0.07)" rx="1"/>
        <!-- cab body -->
        <rect x="10" y="35" width="52" height="35" fill="${color}" rx="4"/>
        <rect x="10" y="35" width="52" height="7" fill="rgba(255,255,255,0.15)" rx="3"/>
        <!-- windshield -->
        <rect x="16" y="39" width="28" height="19" fill="#aee6f7" rx="2" opacity="0.9"/>
        <!-- headlight -->
        <rect x="11" y="60" width="8" height="5" fill="#FFD700" rx="1"/>
        <!-- grille -->
        <rect x="11" y="47" width="5" height="11" fill="rgba(0,0,0,0.2)" rx="1"/>
        <!-- exhaust -->
        <rect x="57" y="24" width="4" height="24" fill="#777" rx="2"/>
        <!-- rear dual wheels -->
        <circle cx="170" cy="83" r="13" fill="#222"/><circle cx="170" cy="83" r="6" fill="#555"/>
        <circle cx="188" cy="83" r="13" fill="#222"/><circle cx="188" cy="83" r="6" fill="#555"/>
        <!-- front wheel -->
        <circle cx="38"  cy="83" r="13" fill="#222"/><circle cx="38"  cy="83" r="6" fill="#555"/>
    </svg>`;
}

function getTruckSVG(truckType, color) {
    if (truckType === 'Flatbed Truck')   return flatbedSVG(color);
    if (truckType === 'Container Truck') return containerSVG(color);
    return openBoxSVG(color);
}

/* ─────────────────────────────────────────
   Trip data
───────────────────────────────────────── */
const tripsData = [
    {
        type: 'single',
        price: '₹80,000',
        tripType: 'Single',
        truckType: 'Flatbed Truck',
        pickupLocation: 'Surat, NCR',
        pickupDate: '26-10-2024, 10:00am',
        dropLocation: 'Delhi, DL',
        dropDate: '26-10-2024, 08:00pm',
        durationHours: '10 hrs',
        weight: '18,000 KG',
        dimensions: '15m × 2.5 × 4m',
        materialType: 'solid',
                materialName: 'books',
        materialEmoji: '📦',
        vehicleColor: '#d64545'
    },
    {
        type: 'allotment',
        price: '₹80,000',
        tripType: 'Allotment',
        truckType: 'Container Truck',
        pickupLocation: 'Delhi, NCR',
        pickupDate: '26-10-2024, 10:00am',
        dropLocation: 'Delhi, DL',
        dropDate: '26-10-2024, 11:00pm',
        durationHours: '10 hrs',
        weight: '18,000 KG',
        dimensions: '15m × 2.5 × 4m',
        materialType: 'Liquid',
                materialName: 'juice-bottles',
        materialEmoji: '📦',
        vehicleColor: '#5a9fb5'
    },
    {
        type: 'return',
        price: '₹1,20,000',
        tripType: 'Return',
        truckType: 'Open-Box Truck',
        // Outbound journey
        pickupLocation: 'Mumbai, MH',
        pickupDate: '27-10-2024, 08:00am',
        dropLocation: 'Bangalore, KA',
        dropDate: '27-10-2024, 06:00pm',
        durationHours: '10 hrs',
        // Return journey
        returnPickupLocation: 'Bangalore, KA',
        returnPickupDate: '28-10-2024, 09:00am',
        returnDropLocation: 'Mumbai, MH',
        returnDropDate: '28-10-2024, 07:00pm',
        returnDurationHours: '10 hrs',
        weight: '18,000 KG',
        dimensions: '15m × 2.5 × 4m',
         materialType: 'liquid',
                materialName: 'body-wash bottles',
        materialEmoji: '📦',
        vehicleColor: '#e07b39'
    },
    {
        type: 'contract',
        price: '₹1,50,000',
        priceNote: '/ 30 Days',
        tripType: 'Contract',
        truckType: 'Container Truck',
        companyAddress: 'GMDC, Mandvi-Gujarat',
        durationPerDay: '8 hrs/day (6 days/week)',
        contractPeriod: 'Yearly (24-08-2024 to 23-08-2025)',
        billingCycle: 'Every 30 days',
        weight: '18,000 KG',
        dimensions: '15m × 2.5 × 4m',
        materialType: 'glass',
                materialName: 'boxes,cosmetic items',
        materialEmoji: '📦',
        vehicleColor: '#5a9fb5'
    }
];

/* ─────────────────────────────────────────
   Card builder
───────────────────────────────────────── */
function createTripCard(trip) {

    /* LEFT: truck type name → SVG image → dimensions */
    const leftCol = `
        <div class="vehicle-compact">
            <div class="truck-model-name">${trip.truckType}</div>
            ${getTruckSVG(trip.truckType, trip.vehicleColor)}
            <div class="truck-dims">${trip.dimensions}</div>
        </div>`;

    /* MIDDLE */
    let middleCol = '';

    if (trip.type === 'contract') {
        middleCol = `
            <div class="contract-middle">
                <div class="price-badge-row">
                    <div class="price-compact">${trip.price}<span style="font-size:0.8rem;font-weight:600;color:#999;"> ${trip.priceNote || ''}</span></div>
                    <div class="badge-mini badge-${trip.type}">${trip.tripType}</div>
                </div>
                <div class="contract-mini">
                    <div class="ctitle">Contract Details</div>
                    <div class="details">
                        <div class="item">
                            <div class="item-label">Company</div>
                            <div class="item-value">${trip.companyAddress}</div>
                        </div>
                        <div class="item">
                            <div class="item-label">Duration / Day</div>
                            <div class="item-value">${trip.durationPerDay}</div>
                        </div>
                        <div class="item">
                            <div class="item-label">Billing</div>
                            <div class="item-value">${trip.billingCycle}</div>
                        </div>
                        <div class="item">
                            <div class="item-label">Period</div>
                            <div class="item-value">${trip.contractPeriod}</div>
                        </div>
                    </div>
                </div>
            </div>`;
    } else if (trip.type === 'return') {
        // Return trip - bidirectional route display
        middleCol = `
            <div class="trip-middle">
                <div class="price-badge-row">
                    <div class="price-compact">${trip.price}</div>
                    <div class="badge-mini badge-${trip.type}">${trip.tripType}</div>
                </div>
                <div class="return-route-wrapper">
                    <!-- Outbound Journey -->
                    <div class="trip-direction">
                        <div class="direction-label">⟶ Outbound</div>
                        <div class="route-stack">
                            <div class="route-item">
                                <span class="r-icon">📍</span>
                                <span class="location">${trip.pickupLocation}</span>
                                <span class="r-time">${trip.pickupDate}</span>
                            </div>
                            <div class="route-connector">
                                <div class="connector-line"></div>
                                <div class="duration-pill">⏱ ${trip.durationHours}</div>
                            </div>
                            <div class="route-item">
                                <span class="r-icon">🎯</span>
                                <span class="location">${trip.dropLocation}</span>
                                <span class="r-time">${trip.dropDate}</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Separator -->
                    <div class="return-separator">
                        <div class="separator-line"></div>
                        <span class="separator-icon">🔄</span>
                        <div class="separator-line"></div>
                    </div>
                    
                    <!-- Return Journey -->
                    <div class="trip-direction">
                        <div class="direction-label">⟵ Return</div>
                        <div class="route-stack">
                            <div class="route-item">
                                <span class="r-icon">📍</span>
                                <span class="location">${trip.returnPickupLocation}</span>
                                <span class="r-time">${trip.returnPickupDate}</span>
                            </div>
                            <div class="route-connector">
                                <div class="connector-line"></div>
                                <div class="duration-pill">⏱ ${trip.returnDurationHours}</div>
                            </div>
                            <div class="route-item">
                                <span class="r-icon">🎯</span>
                                <span class="location">${trip.returnDropLocation}</span>
                                <span class="r-time">${trip.returnDropDate}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
    } else {
        // Single/Allotment trips - standard route
        middleCol = `
            <div class="trip-middle">
                <div class="price-badge-row">
                    <div class="price-compact">${trip.price}</div>
                    <div class="badge-mini badge-${trip.type}">${trip.tripType}</div>
                </div>
                <div class="route-stack">
                    <div class="route-item">
                        <span class="r-icon">📍</span>
                        <span class="location">${trip.pickupLocation}</span>
                        <span class="r-time">${trip.pickupDate}</span>
                    </div>
                    <div class="route-connector">
                        <div class="connector-line"></div>
                        <div class="duration-pill">⏱ ${trip.durationHours}</div>
                    </div>
                    <div class="route-item">
                        <span class="r-icon">🎯</span>
                        <span class="location">${trip.dropLocation}</span>
                        <span class="r-time">${trip.dropDate}</span>
                    </div>
                </div>
            </div>`;
    }

    /* RIGHT: material block — photo → type → name → dims → kg */
    const rightCol = `
        <div class="material-block">
            <div class="mat-photo-box">${trip.materialEmoji}</div>
            <div class="mat-row">
                 
                <div class="mat-value">${trip.materialType}</div>
            </div>
             
            <div class="mat-row">
                
                <div class="mat-value">${trip.materialName}</div>
            </div> 
            <div class="mat-row">
                
                <div class="mat-value">${trip.dimensions}</div>
            </div> 
            <div class="mat-kg">${trip.weight}</div>
        </div>`;

    return `
        <div class="trip-card ${trip.type}" data-type="${trip.type}">
            ${leftCol}
            ${middleCol}
            ${rightCol}
        </div>`;
}

function renderTrips() {
    document.getElementById('tripsContainer').innerHTML =
        tripsData.map(trip => createTripCard(trip)).join('');
}

renderTrips();
</script>
</body>
</html>
