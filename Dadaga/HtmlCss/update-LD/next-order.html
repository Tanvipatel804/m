<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Future Trip - Delivery & Pay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #e8e8e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #3a3a3a;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        /* .check-btn {
            background: #5cb85c;
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 28px;
            transition: all 0.3s;
        }

        .check-btn:hover {
            background: #4a9d4a;
            transform: scale(1.05);
        } */

        .content {
            padding: 30px 25px;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        .star-icon {
            color: #5cb85c;
            font-size: 48px;
        }

        .main-title {
            font-size: 32px;
            font-weight: 700;
        }

        .section-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .delivery-section {
            margin-bottom: 35px;
        }

        .delivery-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .delivery-btn {
            background: white;
            border: 3px solid #d0d0d0;
            border-radius: 50px;
            padding: 18px 35px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .delivery-btn:hover {
            border-color: #5cb85c;
            transform: translateY(-2px);
        }

        .delivery-btn.active {
            background: #5cb85c;
            color: white;
            border-color: #5cb85c;
        }

        .delivery-btn .icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .delivery-btn.active .icon {
            background: #4a7c4a;
            color: white;
        }

        .lightning-icon {
            color: #5cb85c;
        }

        .delivery-btn.active .lightning-icon {
            color: white;
        }

        .money-section {
            margin-bottom: 35px;
        }

        .money-input-wrapper {
            background: white;
            border: 4px solid #5cb85c;
            border-radius: 15px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .rupee-icon {
            font-size: 32px;
            font-weight: 700;
            color: #333;
        }

        .money-input {
            border: none;
            outline: none;
            font-size: 20px;
            font-weight: 500;
            width: 100%;
            color: #888;
        }

        .payment-options {
            display: flex;
            gap: 15px;
        }

        .payment-btn {
            background: white;
            border: 3px solid #d0d0d0;
            border-radius: 15px;
            padding: 18px 35px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            position: relative;
        }

        .payment-btn:hover {
            border-color: #5cb85c;
        }

        .payment-btn.active {
            background: #5cb85c;
            color: white;
            border-color: #5cb85c;
        }

        .payment-btn.active::after {
            content: '✓';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
        }

        .next-btn {
            background: #5cb85c;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 22px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            margin-top: 350px;
        }

        .next-btn:hover {
            background: #4a9d4a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(92, 184, 92, 0.3);
        }

        @media (max-width: 768px) {
            .delivery-options {
                flex-direction: column;
            }

            .delivery-btn {
                width: 100%;
                justify-content: center;
            }

            .payment-options {
                flex-direction: column;
            }

            .next-btn {
                margin-top: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()">‹</button>
            <h1>Post Future Trip</h1>
        </div>
        <!-- <button class="check-btn" onclick="handleSubmit()">✓</button> -->
    </div>

    <div class="content">
        <div class="title-section">
            <div class="star-icon">★</div>
            <h2 class="main-title">Delivery, Pay & Ratings</h2>
        </div>

        <div class="delivery-section">
            <h3 class="section-title">Delivery Mode</h3>
            <div class="delivery-options">
                <button class="delivery-btn active" onclick="selectDelivery(this)">
                    <span class="icon">✓</span>
                    <span>Regular</span>
                </button>
                <button class="delivery-btn" onclick="selectDelivery(this)">
                    <span class="lightning-icon">⚡</span>
                    <span>Express</span>
                </button>
                <button class="delivery-btn" onclick="selectDelivery(this)">
                    <span class="lightning-icon">⚡</span>
                    <span>Both</span>
                </button>
            </div>
        </div>

        <div class="money-section">
            <h3 class="section-title">How Much Money?</h3>
            <div class="money-input-wrapper">
                <span class="rupee-icon">₹</span>
                <input type="text" class="money-input" placeholder="Min. Rate Per KM (₹)" id="rateInput">
            </div>

            <div class="payment-options">
                <button class="payment-btn active" onclick="selectPayment(this)">Cash Preferred</button>
                <button class="payment-btn" onclick="selectPayment(this)">Digital Pay</button>
            </div>
        </div>

        <button class="next-btn" onclick="handleNext()">Next: Order Time & Comments</button>
    </div>

    <script>
        function selectDelivery(btn) {
            const buttons = document.querySelectorAll('.delivery-btn');
            buttons.forEach(b => {
                b.classList.remove('active');
                const icon = b.querySelector('.icon');
                if (icon && icon.textContent === '✓') {
                    icon.remove();
                }
            });
            
            btn.classList.add('active');
            
            if (!btn.querySelector('.icon')) {
                const checkIcon = document.createElement('span');
                checkIcon.className = 'icon';
                checkIcon.textContent = '✓';
                btn.insertBefore(checkIcon, btn.firstChild);
            }
        }

        function selectPayment(btn) {
            const buttons = document.querySelectorAll('.payment-btn');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function handleNext() {
            const selectedDelivery = document.querySelector('.delivery-btn.active span:last-child');
            const selectedPayment = document.querySelector('.payment-btn.active');
            const rate = document.getElementById('rateInput').value;

            console.log('Delivery Mode:', selectedDelivery?.textContent);
            console.log('Payment Method:', selectedPayment?.textContent);
            console.log('Rate:', rate);

            alert('Proceeding to Order Time & Comments...\nThis is a demo - form data would be submitted here.');
        }

        function handleSubmit() {
            const selectedDelivery = document.querySelector('.delivery-btn.active span:last-child');
            const selectedPayment = document.querySelector('.payment-btn.active');
            const rate = document.getElementById('rateInput').value;

            if (!rate) {
                alert('Please enter a minimum rate per KM.');
                return;
            }

            console.log('Form submitted!');
            console.log('Delivery Mode:', selectedDelivery?.textContent);
            console.log('Payment Method:', selectedPayment?.textContent);
            console.log('Rate:', rate);

            alert('Trip posted successfully! ✓');
        }
    </script>
</body>
</html>
