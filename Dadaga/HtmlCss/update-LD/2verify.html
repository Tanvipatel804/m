<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LorryGo Pilot – Verify OTP</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --orange: #F97316;
      --blue: #1A56DB;
      --blue-dark: #1447B4;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --dark: #111827;
      --white: #FFFFFF;
    }

    html,
    body {
      min-height: 100%;
      background: #1c1c2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }

    .phone {
      width: 100%;
      /* max-width: 390px; */
      min-height: 100dvh;
      max-height: 844px;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.55);
      position: absolute;
    }

    @media (max-width: 430px) {
      .phone {
        border-radius: 0;
        max-height: 100dvh;
      }

      html,
      body {
        background: #fff;
      }
    }

    /* Top nav */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 12px;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 8px;
      color: var(--dark);
      transition: background 0.15s;
      font-size: 22px;
      font-weight: 300;
    }

    .back-btn:hover {
      background: var(--gray-100);
    }

    .nav-logo {
      font-family: 'Sora', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: 2px;
    }

    .nav-icons {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .nav-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--gray-500);
      transition: color 0.15s;
    }

    .nav-icon:hover {
      color: var(--dark);
    }

    /* Content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 28px 24px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Phone number row */
    .phone-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .masked-number {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .dot-group {
      display: flex;
      gap: 2px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gray-400);
    }

    .slash {
      color: var(--gray-400);
      font-size: 16px;
      margin: 0 2px;
      font-weight: 300;
    }

    .change-link {
      font-size: 14px;
      font-weight: 700;
      color: var(--blue);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.15s;
    }

    .change-link:hover {
      color: var(--blue-dark);
      text-decoration: underline;
    }

    .otp-sent-text {
      font-size: 14px;
      color: var(--gray-500);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    /* Auto-read spinner row */
    .auto-read-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2.5px solid var(--gray-200);
      border-top-color: var(--gray-500);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .auto-read-text {
      font-size: 14px;
      color: var(--gray-700);
      font-weight: 500;
    }

    /* OTP input section */
    .otp-section {
      width: 100%;
      position: relative;
    }

    .otp-input-wrap {
      border-left: 3px solid var(--orange);
      padding-left: 12px;
    }

    .otp-input-wrap.error {
      border-left-color: #EF4444;
    }

    .otp-input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 22px;
      font-weight: 600;
      color: var(--dark);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 8px;
      caret-color: var(--orange);
      padding: 2px 0;
    }

    .otp-input::placeholder {
      font-size: 14px;
      color: var(--gray-400);
      letter-spacing: 0;
      font-weight: 400;
    }

    .otp-underline {
      width: 100%;
      height: 1.5px;
      background: var(--gray-200);
      margin-top: 10px;
      border-radius: 1px;
      transition: background 0.2s;
    }

    .otp-section:focus-within .otp-underline {
      background: var(--blue);
    }

    /* Floating edit FAB */
    .edit-fab {
      position: absolute;
      right: 0;
      top: -4px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #7C3AED;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.38);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .edit-fab:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.45);
    }

    /* Verify button */
    .btn-verify {
      width: 100%;
      margin-top: 42px;
      padding: 17px;
      border: none;
      border-radius: 50px;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, #2563EB 0%, #1447B4 100%);
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(26, 86, 219, 0.38);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-verify::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.14), transparent);
    }

    .btn-verify:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(26, 86, 219, 0.46);
    }

    .btn-verify:active {
      transform: scale(0.97);
    }

    /* Resend */
    .resend-wrap {
      margin-top: 24px;
      text-align: center;
    }

    .resend-btn {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--blue);
      cursor: pointer;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .resend-btn:hover:not(:disabled) {
      background: #EFF6FF;
    }

    .resend-btn:disabled {
      color: var(--gray-400);
      cursor: default;
    }

    .timer-text {
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 6px;
    }

    .spacer {
      flex: 1;
    }

    /* Bottom nav */

    /* Success overlay */
    .success-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 50;
      background: rgba(34, 197, 94, 0.96);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      border-radius: inherit;
    }

    .success-overlay.show {
      display: flex;
      animation: flashIn 0.35s ease;
    }

    @keyframes flashIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .success-overlay p {
      font-family: 'Sora', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
  </style>
</head>

<body>

    <!-- Success overlay -->
    <div class="success-overlay" id="successOverlay">
      <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <polyline points="9 12 11 14 15 10" />
      </svg>
      <p>Verified Successfully!</p>
    </div>

      <span style="border:1.5px solid #111;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;position:relative;">87
        <span style="position:absolute;right:-4px;top:50%;transform:translateY(-50%);display:block;width:2.5px;height:6px;background:#111;border-radius:0 1px 1px 0;"></span>

  </div> -->

    <!-- Top nav -->
    <div class="top-nav">
      <div class="back-btn" onclick="window.history.back()">&#8249;</div>

      <div class="nav-logo">LORRYGO</div>

      <div class="nav-icons">
        <!-- screen-cast / eye-play icon -->
        <div class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <polygon points="10,10 16,12 10,14" fill="currentColor" stroke="none" />
          </svg>
        </div>
        <!-- eye icon -->
        <div class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </div>
        <!-- settings wheel -->
        <div class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </div>
        <!-- more -->
        <div class="nav-icon" style="font-size:20px;color:var(--gray-700);letter-spacing:-1px;font-weight:600;">⋮</div>
      </div>
    </div>

    <!-- Main content -->
    <div class="content">

      <!-- Masked number + Change -->
      <div class="phone-row">
        <div class="masked-number">
          <div class="dot-group">
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="dot-group">
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="dot-group">
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="dot-group">
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <span class="slash">/</span>
        </div>
        <button class="change-link" onclick="window.history.back()">Change</button>
      </div>

      <p class="otp-sent-text">One Time Password (OTP) is sent to this number</p>

      <!-- Auto-read row -->
      <div class="auto-read-row" id="autoReadRow">
        <div class="spinner"></div>
        <span class="auto-read-text">Waiting to auto read OTP</span>
      </div>

      <!-- OTP input -->
      <div class="otp-section">
        <div class="otp-input-wrap" id="otpWrap">
          <input class="otp-input" type="tel" id="otpInput" placeholder="Enter OTP" maxlength="6"
            autocomplete="one-time-code" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')" />
        </div>
        <div class="otp-underline"></div>

        <!-- FAB -->
        <div class="edit-fab" onclick="document.getElementById('otpInput').focus()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
        </div>
      </div>

      <!-- Verify -->
      <button class="btn-verify" onclick="handleVerify()">VERIFY</button>

      <!-- Resend -->
      <div class="resend-wrap">
        <button class="resend-btn" id="resendBtn" disabled onclick="handleResend()">RESEND OTP</button>
        <p class="timer-text" id="timerText">Resend available in <span id="countdown">30</span>s</p>
      </div>

      <div class="spacer"></div>
    </div>

    <!-- Bottom nav -->
    <!-- <div class="bottom-nav">
    <div class="nav-sq"></div>
    <div class="nav-circ"></div>
    <div class="nav-tri"></div>
  </div> -->

  </div>

  <script>
    // ── Countdown ──
    let secs = 30;
    const cdEl = document.getElementById('countdown');
    const timerEl = document.getElementById('timerText');
    const resendBtn = document.getElementById('resendBtn');
    const autoRow = document.getElementById('autoReadRow');

    const startTimer = (duration) => {
      secs = duration;
      cdEl.textContent = secs;
      const t = setInterval(() => {
        secs--;
        cdEl.textContent = secs;
        if (secs <= 0) {
          clearInterval(t);
          resendBtn.disabled = false;
          timerEl.style.display = 'none';
          autoRow.style.display = 'none';
        }
      }, 1000);
    };

    startTimer(30);

    // ── Verify ──
    function handleVerify() {
      const otp = document.getElementById('otpInput').value.trim();
      const wrap = document.getElementById('otpWrap');

      if (otp.length < 4) {
        wrap.classList.add('error');
        document.getElementById('otpInput').focus();
        setTimeout(() => wrap.classList.remove('error'), 1800);
        return;
      }

      const overlay = document.getElementById('successOverlay');
      overlay.classList.add('show');
      setTimeout(() => overlay.classList.remove('show'), 2000);
    }

    // ── Resend ──
    function handleResend() {
      document.getElementById('otpInput').value = '';
      resendBtn.disabled = true;
      timerEl.style.display = 'block';
      autoRow.style.display = 'flex';
      startTimer(30);
      // Optionally show a toast here
    }
  </script>

</body>

</html>
