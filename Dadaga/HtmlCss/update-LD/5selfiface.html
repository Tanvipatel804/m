<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Take Selfie</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Sora:wght@600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      background: #1c1c2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }

    .phone {
      width: 100%;
      max-width: 390px;
      min-height: 100dvh;
      max-height: 844px;
      background: #3a3a3a;
      border-radius: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.7);
      position: relative;
    }

    @media (max-width: 430px) {
      .phone {
        border-radius: 0;
        max-height: 100dvh;
      }

      html,
      body {
        background: #3a3a3a;
      }
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px 8px;
      background: #fff;
      flex-shrink: 0;
    }

    .status-time {
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #111;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      color: #111;
    }

    .green-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22C55E;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      background: #fff;
      border-bottom: 1px solid #E5E7EB;
      flex-shrink: 0;
      position: relative;
    }

    .back-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #111;
      font-size: 26px;
      font-weight: 300;
      border-radius: 8px;
      transition: background 0.15s;
      position: absolute;
      left: 12px;
    }

    .back-btn:hover {
      background: #F3F4F6;
    }

    .top-bar-title {
      flex: 1;
      text-align: center;
      font-family: 'Sora', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #111;
    }

    /* ── Camera dark area ── */
    .camera-area {
      flex: 1;
      background: #3d3d3d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 24px 30px;
      position: relative;
      gap: 28px;
    }

    /* ── Circular viewfinder ── */
    .circle-wrap {
      position: relative;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Simulated front-camera feed */
    .cam-feed {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(170deg, #e8e2dc 0%, #d4cfc9 30%, #c8c2bc 55%, #a89890 80%, #6b5545 100%);
      transition: background 0.4s ease;
      overflow: hidden;
    }

    /* Subtle face silhouette at bottom */
    .cam-feed::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 110px;
      background: radial-gradient(ellipse at 50% 60%, #3a2a20 60%, transparent 100%);
      border-radius: 50% 50% 0 0;
    }

    /* Live video element (used when camera is active) */
    #videoEl {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: none;
      transform: scaleX(-1);
      /* mirror front cam */
    }

    /* Captured photo */
    #capturedImg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: none;
    }

    /* Pulsing ring */
    .circle-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.18);
      animation: ringPulse 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes ringPulse {

      0%,
      100% {
        border-color: rgba(255, 255, 255, 0.18);
        transform: scale(1);
      }

      50% {
        border-color: rgba(255, 255, 255, 0.32);
        transform: scale(1.012);
      }
    }

    /* ── Instruction text ── */
    .instruction {
      color: rgba(255, 255, 255, 0.85);
      font-size: 14px;
      font-weight: 400;
      text-align: center;
      line-height: 1.6;
      max-width: 260px;
    }

    /* ── Camera controls bar ── */
    .cam-controls {
      background: #222;
      padding: 14px 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-shrink: 0;
    }

    /* Gallery / placeholder left side */
    .ctrl-side {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .gallery-btn {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #666;
      cursor: pointer;
      transition: border-color 0.15s;
      overflow: hidden;
    }

    .gallery-btn:hover {
      border-color: #aaa;
    }

    /* Shutter */
    .shutter-btn {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid #888;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s, background 0.12s;
      position: relative;
    }

    .shutter-btn:active {
      transform: scale(0.92);
      background: #ccc;
    }

    .shutter-inner {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #bbb;
    }

    /* Right side placeholder */
    .ctrl-right {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      height: 52px;
      border-top: 1px solid #E5E7EB;
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: #fff;
      flex-shrink: 0;
    }

    .nav-sq {
      width: 22px;
      height: 22px;
      border: 2px solid #374151;
      border-radius: 3px;
      cursor: pointer;
    }

    .nav-circ {
      width: 24px;
      height: 24px;
      border: 2px solid #374151;
      border-radius: 50%;
      cursor: pointer;
    }

    .nav-tri {
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-right: 18px solid #374151;
      cursor: pointer;
    }

    /* ── Flash overlay ── */
    .flash {
      position: absolute;
      inset: 0;
      z-index: 99;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.07s;
      border-radius: inherit;
    }

    .flash.snap {
      opacity: 1;
    }

    /* ── Banner ── */
    .banner {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(34, 197, 94, 0.95);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 22px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 50;
    }

    .banner.show {
      opacity: 1;
    }

    /* Retake button (shown after capture) */
    .retake-btn {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 22px;
      border-radius: 30px;
      white-space: nowrap;
      cursor: pointer;
      z-index: 50;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      display: none;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }

    .retake-btn:hover {
      background: rgba(0, 0, 0, 0.8);
    }
  </style>
</head>

<body>

  <div class="phone">

    <!-- Flash -->
    <div class="flash" id="flash"></div>

    <!-- Banner -->
    <div class="banner" id="banner">✓ Selfie Captured!</div>

    <!-- Retake -->
    <button class="retake-btn" id="retakeBtn" onclick="retakePhoto()">↺ Retake</button>

    <!-- Status bar -->
    <!-- <div class="status-bar">
      <span class="status-time">4:06</span>
      <div class="status-icons">
        <!-- bluetooth 
        <svg width="10" height="14" viewBox="0 0 10 18" fill="none" stroke="#111" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="2,4 8,10 2,16" />
          <polyline points="8,4 2,10 8,16" />
        </svg>
        <!-- 5G badge
        <span
          style="font-size:9px;background:#111;color:#fff;padding:1px 3px;border-radius:2px;font-weight:700;letter-spacing:0;">5G+</span>
        <!-- signal bars 
        <svg width="15" height="11" viewBox="0 0 24 18">
          <rect x="0" y="6" width="3" height="12" rx="1" fill="#111" />
          <rect x="5" y="4" width="3" height="14" rx="1" fill="#111" />
          <rect x="10" y="2" width="3" height="16" rx="1" fill="#111" />
          <rect x="15" y="0" width="3" height="18" rx="1" fill="#111" />
        </svg>
        <!-- battery 
        <span
          style="border:1.5px solid #111;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;position:relative;">86
          <span
            style="position:absolute;right:-4px;top:50%;transform:translateY(-50%);display:block;width:2.5px;height:6px;background:#111;border-radius:0 1px 1px 0;"></span>
        </span>
        <!-- green dot 
        <div class="green-dot"></div>
      </div>
    </div> -->

    <!-- Top bar -->
    <div class="top-bar">
      <div class="back-btn" onclick="stopCamera(); window.history.back();">&#8249;</div>
      <span class="top-bar-title">Take Selfie</span>
    </div>

    <!-- Camera area -->
    <div class="camera-area">

      <!-- Circular viewfinder -->
      <div class="circle-wrap" id="circleWrap">
        <div class="cam-feed" id="camFeed"></div>
        <video id="videoEl" autoplay playsinline muted></video>
        <img id="capturedImg" alt="Captured selfie">
        <div class="circle-ring"></div>
      </div>

      <!-- Instruction -->
      <p class="instruction">
        Make sure that image has enough light, is clear and your entire face is visible
      </p>

    </div>

    <!-- Camera controls -->
    <div class="cam-controls">

      <!-- Gallery -->
      <div class="ctrl-side">
        <div class="gallery-btn" onclick="openGallery()" title="Open gallery">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
          <input type="file" id="galleryInput" accept="image/*" style="display:none" onchange="handleGallery(this)">
        </div>
      </div>

      <!-- Shutter -->
      <div class="shutter-btn" id="shutterBtn" onclick="capturePhoto()" title="Take selfie">
        <div class="shutter-inner"></div>
      </div>

      <!-- Right placeholder (no flip for front cam selfie) -->
      <div class="ctrl-right"></div>

    </div>

    <!-- Bottom nav -->
    <!-- <div class="bottom-nav">
      <div class="nav-sq"></div>
      <div class="nav-circ"></div>
      <div class="nav-tri"></div>
    </div> -->

  </div>

  <script>
    let stream = null;
    let captured = false;

    // Try to start front camera automatically
    async function startCamera() {
      const videoEl = document.getElementById('videoEl');
      const camFeed = document.getElementById('camFeed');
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 400 }, height: { ideal: 400 } },
          audio: false
        });
        videoEl.srcObject = stream;
        videoEl.style.display = 'block';
        camFeed.style.display = 'none';
      } catch (e) {
        // Camera not available (desktop/no permission) — keep simulated feed
        console.log('Camera not available, using simulated feed');
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
    }

    function capturePhoto() {
      if (captured) return;

      const flash = document.getElementById('flash');
      const banner = document.getElementById('banner');
      const videoEl = document.getElementById('videoEl');
      const capImg = document.getElementById('capturedImg');
      const camFeed = document.getElementById('camFeed');
      const retake = document.getElementById('retakeBtn');

      // Flash
      flash.classList.add('snap');
      setTimeout(() => flash.classList.remove('snap'), 160);

      // If live video active — capture frame
      if (stream && videoEl.style.display !== 'none') {
        const canvas = document.createElement('canvas');
        canvas.width = videoEl.videoWidth || 400;
        canvas.height = videoEl.videoHeight || 400;
        const ctx = canvas.getContext('2d');
        // mirror the capture
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(videoEl, 0, 0);
        capImg.src = canvas.toDataURL('image/jpeg', 0.92);
        capImg.style.display = 'block';
        videoEl.style.display = 'none';
      } else {
        // Simulated capture — freeze the feed look
        camFeed.style.animation = 'none';
      }

      captured = true;

      // Show banner then retake button
      banner.classList.add('show');
      setTimeout(() => {
        banner.classList.remove('show');
        retake.style.display = 'block';
      }, 1800);
    }

    function retakePhoto() {
      const videoEl = document.getElementById('videoEl');
      const capImg = document.getElementById('capturedImg');
      const camFeed = document.getElementById('camFeed');
      const retake = document.getElementById('retakeBtn');

      capImg.src = '';
      capImg.style.display = 'none';
      retake.style.display = 'none';
      captured = false;

      if (stream) {
        videoEl.style.display = 'block';
        camFeed.style.display = 'none';
      } else {
        camFeed.style.display = 'block';
      }
    }

    function openGallery() {
      document.getElementById('galleryInput').click();
    }

    function handleGallery(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const capImg = document.getElementById('capturedImg');
        const videoEl = document.getElementById('videoEl');
        const camFeed = document.getElementById('camFeed');
        const retake = document.getElementById('retakeBtn');
        const banner = document.getElementById('banner');

        capImg.src = e.target.result;
        capImg.style.display = 'block';
        videoEl.style.display = 'none';
        camFeed.style.display = 'none';
        captured = true;

        banner.textContent = '✓ Photo Selected!';
        banner.classList.add('show');
        setTimeout(() => {
          banner.classList.remove('show');
          banner.textContent = '✓ Selfie Captured!';
          retake.style.display = 'block';
        }, 1800);
      };
      reader.readAsDataURL(input.files[0]);
    }

    // Auto-start camera on load
    window.addEventListener('load', startCamera);
    window.addEventListener('beforeunload', stopCamera);
  </script>

</body>

</html>
