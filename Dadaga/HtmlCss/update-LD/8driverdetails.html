<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Add Driver Details</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #1A56DB;
      --blue-dark: #1447B4;
      --blue-bg: #EBF2FF;
      --green: #16A34A;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --dark: #111827;
      --red: #EF4444;
      --white: #FFFFFF;
    }

    html,
    body {
      min-height: 100%;
      background: var(--gray-100);
      font-family: 'DM Sans', sans-serif;
      color: var(--dark);
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px 8px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
    }

    .status-time {
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      color: var(--dark);
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      position: relative;
    }

    .back-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--dark);
      font-size: 28px;
      font-weight: 300;
      line-height: 1;
      border-radius: 8px;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: var(--gray-100);
    }

    .top-title {
      flex: 1;
      padding-left: 10px;
      font-family: 'Sora', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
    }

    .headset-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--dark);
      border-radius: 50%;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .headset-btn:hover {
      background: var(--gray-100);
    }

    /* ── Stepper ── */
    .stepper {
      display: flex;
      align-items: flex-start;
      padding: 20px 32px 16px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .step-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
    }

    .step.done .step-circle {
      background: var(--blue);
      color: var(--white);
    }

    .step.active .step-circle {
      border: 2.5px solid var(--blue);
      color: var(--blue);
      background: var(--white);
    }

    .step.inactive .step-circle {
      border: 2px solid var(--gray-400);
      color: var(--gray-400);
      background: var(--white);
    }

    .step-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-500);
    }

    .step.done .step-label {
      color: var(--blue);
    }

    .step.active .step-label {
      color: var(--blue);
      font-weight: 700;
    }

    .step-line {
      flex: 1;
      height: 2px;
      margin-top: 18px;
      background: var(--blue);
    }

    .step-line.dashed {
      background-image: repeating-linear-gradient(to right, var(--gray-300) 0, var(--gray-300) 5px, transparent 5px, transparent 10px);
      background-color: transparent;
    }

    /* ── Scrollable content ── */
    .content {
      padding: 20px 16px 110px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .req {
      color: var(--red);
      font-size: 15px;
    }

    /* ── Yes/No toggle ── */
    .toggle-card {
      background: var(--white);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      gap: 0;
      width: fit-content;
      border: 1px solid var(--gray-200);
    }

    .toggle-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      color: var(--dark);
      transition: background 0.15s;
      user-select: none;
    }

    .toggle-option:hover {
      background: var(--gray-100);
    }

    .radio-outer {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--gray-400);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s;
      background: var(--white);
    }

    .radio-inner {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--blue);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .toggle-option.selected .radio-outer {
      border-color: var(--blue);
    }

    .toggle-option.selected .radio-inner {
      opacity: 1;
    }

    /* ── Input card ── */
    .input-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 15px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-card:focus-within {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.09);
    }

    .input-card.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.09);
    }

    .text-input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      background: transparent;
    }

    .text-input::placeholder {
      color: var(--gray-400);
      font-weight: 400;
    }

    /* ── Driving licence upload card ── */
    .licence-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .licence-card:hover {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.07);
    }

    .licence-card.uploaded {
      border-color: var(--green);
    }

    .licence-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .licence-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .licence-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
    }

    .licence-status.hidden {
      display: none;
    }

    .edit-icon {
      color: var(--blue);
      flex-shrink: 0;
      padding: 4px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .edit-icon:hover {
      background: var(--blue-bg);
    }

    /* ── Submit button ── */
    .submit-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, var(--white) 80%, transparent);
      padding: 12px 16px 20px;
      display: flex;
      justify-content: center;
      z-index: 30;
    }

    .btn-submit {
      width: 100%;
      max-width: 600px;
      padding: 17px;
      border: none;
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.25s, transform 0.15s, box-shadow 0.2s;
      background: var(--gray-200);
      color: var(--gray-500);
    }

    .btn-submit.active {
      background: linear-gradient(135deg, #2563EB 0%, var(--blue-dark) 100%);
      color: var(--white);
      box-shadow: 0 6px 22px rgba(26, 86, 219, 0.35);
    }

    .btn-submit.active:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(26, 86, 219, 0.44);
    }

    .btn-submit.active:active {
      transform: scale(0.98);
    }

    /* Bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 52px;
      border-top: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: var(--white);
      z-index: 20;
    }

    .nav-sq {
      width: 22px;
      height: 22px;
      border: 2px solid var(--gray-700);
      border-radius: 3px;
      cursor: pointer;
    }

    .nav-circ {
      width: 24px;
      height: 24px;
      border: 2px solid var(--gray-700);
      border-radius: 50%;
      cursor: pointer;
    }

    .nav-tri {
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-right: 18px solid var(--gray-700);
      cursor: pointer;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: var(--white);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 80;
    }

    .toast.show {
      opacity: 1;
    }

    /* ── Success overlay ── */
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 90;
      background: rgba(22, 163, 74, 0.96);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .success-overlay.show {
      display: flex;
      animation: popIn 0.35s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.95)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    .success-overlay p {
      font-family: 'Sora', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      padding: 0 24px;
    }

    .success-overlay span {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
    }

    /* ── Responsive layout ── */
    @media (min-width: 600px) {
      .status-bar {
        padding: 14px 24px 10px;
      }

      .top-bar {
        padding: 14px 24px;
      }

      .stepper {
        padding: 20px 60px 16px;
      }

      .content {
        padding: 24px 24px 120px;
      }
    }

    @media (min-width: 900px) {

      .top-bar,
      .stepper,
      .status-bar {
        max-width: 700px;
        margin: 0 auto;
        width: 100%;
      }

      .stepper {
        padding: 20px 80px 16px;
      }

      .content {
        max-width: 700px;
        padding: 28px 0 120px;
      }
    }
  </style>
</head>

<body>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="back-btn" onclick="window.history.back()">&#8249;</div>
    <span class="top-title">Add Driver Details</span>
    <div class="headset-btn" onclick="showToast('Support coming soon')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 18v-6a9 9 0 0 1 18 0v6" />
        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z" />
        <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" />
      </svg>
    </div>
  </div>

  <!-- Stepper -->
  <div class="stepper">
    <!-- Step 1: Done -->
    <div class="step done">
      <div class="step-circle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>
      <span class="step-label">Owner</span>
    </div>
    <div class="step-line"></div>
    <!-- Step 2: Done -->
    <div class="step done">
      <div class="step-circle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>
      <span class="step-label">Vehicle</span>
    </div>
    <div class="step-line dashed"></div>
    <!-- Step 3: Active -->
    <div class="step active">
      <div class="step-circle">3</div>
      <span class="step-label">Driver</span>
    </div>
  </div>

  <!-- Main content -->
  <div class="content">

    <!-- I will be driving -->
    <div>
      <p class="section-label">I will be driving this vehicle <span class="req">*</span></p>
      <div class="toggle-card">
        <div class="toggle-option" id="optYes" onclick="selectDriving('yes')">
          <div class="radio-outer">
            <div class="radio-inner"></div>
          </div>
          yes
        </div>
        <div class="toggle-option selected" id="optNo" onclick="selectDriving('no')">
          <div class="radio-outer">
            <div class="radio-inner"></div>
          </div>
          no
        </div>
      </div>
    </div>

    <!-- Driver Name -->
    <div>
      <p class="section-label">Driver Name <span class="req">*</span></p>
      <div class="input-card" id="nameCard">
        <input class="text-input" type="text" id="driverName" placeholder="Enter driver name" oninput="checkForm()" />
      </div>
    </div>

    <!-- Driver Phone Number -->
    <div>
      <p class="section-label">Driver Phone Number <span class="req">*</span></p>
      <div class="input-card" id="phoneCard">
        <input class="text-input" type="tel" id="driverPhone" placeholder="Enter 10-digit phone number" maxlength="10"
          oninput="this.value=this.value.replace(/\D/g,''); checkForm()" />
      </div>
    </div>

    <!-- Upload Driver License -->
    <div>
      <p class="section-label">Upload Driver License <span class="req">*</span></p>
      <div class="licence-card" id="licenceCard" onclick="triggerLicence()">
        <div class="licence-info">
          <span class="licence-title">Driving Licence</span>
          <div class="licence-status" id="licenceStatus">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 16 12 12 8 16" />
              <line x1="12" y1="12" x2="12" y2="21" />
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
            </svg>
            Uploaded
          </div>
        </div>
        <div class="edit-icon" onclick="event.stopPropagation(); triggerLicence()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
        </div>
        <input type="file" id="licenceInput" accept="image/*,.pdf" style="display:none" onchange="handleLicence(this)">
      </div>
    </div>

  </div>

  <!-- Submit bar -->
  <div class="submit-wrap">
    <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">Submit</button>
  </div>

  <!-- Bottom nav -->
  <!-- <div class="bottom-nav">
    <div class="nav-sq"></div>
    <div class="nav-circ"></div>
    <div class="nav-tri"></div>
  </div> -->

  <script>
    let driving = 'no';
    let licenceUploaded = false;

    // Pre-select "no" as per screenshot
    document.getElementById('optNo').classList.add('selected');
    document.getElementById('licenceStatus').classList.remove('hidden');
    licenceUploaded = true;
    document.getElementById('licenceCard').classList.add('uploaded');
    checkForm();

    function selectDriving(val) {
      driving = val;
      document.getElementById('optYes').classList.toggle('selected', val === 'yes');
      document.getElementById('optNo').classList.toggle('selected', val === 'no');

      // If "yes" — auto-fill driver name from owner (simulated)
      if (val === 'yes') {
        const inp = document.getElementById('driverName');
        if (!inp.value) inp.value = '';
      }
      checkForm();
    }

    function triggerLicence() {
      document.getElementById('licenceInput').click();
    }

    function handleLicence(input) {
      if (!input.files || !input.files[0]) return;
      licenceUploaded = true;
      document.getElementById('licenceCard').classList.add('uploaded');
      document.getElementById('licenceStatus').classList.remove('hidden');
      const n = input.files[0].name;
      showToast((n.length > 24 ? n.slice(0, 24) + '…' : n) + ' uploaded');
      checkForm();
    }

    function checkForm() {
      const name = document.getElementById('driverName').value.trim();
      const phone = document.getElementById('driverPhone').value.trim();
      const valid = name.length >= 2 && phone.length === 10 && licenceUploaded && driving;
      document.getElementById('submitBtn').classList.toggle('active', valid);
    }

    function handleSubmit() {
      const name = document.getElementById('driverName').value.trim();
      const phone = document.getElementById('driverPhone').value.trim();
      let ok = true;

      if (name.length < 2) {
        const c = document.getElementById('nameCard');
        c.classList.add('error');
        setTimeout(() => c.classList.remove('error'), 2000);
        ok = false;
      }
      if (phone.length !== 10) {
        const c = document.getElementById('phoneCard');
        c.classList.add('error');
        setTimeout(() => c.classList.remove('error'), 2000);
        ok = false;
      }
      if (!licenceUploaded) {
        const c = document.getElementById('licenceCard');
        c.style.borderColor = '#EF4444';
        c.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.09)';
        setTimeout(() => { c.style.borderColor = ''; c.style.boxShadow = ''; }, 2000);
        ok = false;
      }
      if (!ok) { showToast('Please fill all required fields'); return; }

      document.getElementById('successOverlay').classList.add('show');
      setTimeout(() => document.getElementById('successOverlay').classList.remove('show'), 2500);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>

</body>
